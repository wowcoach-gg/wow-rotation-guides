resourceManagement:
  primaryResource: Energy
  secondaryResource: Combo Points
  resourceNotes: 'Energy regenerates at a baseline rate of 10 per second, increased by Haste, Venomous Wounds, and Thistle Tea. Spend Energy on builders (Mutilate, Fan of Knives, Crimson Tempest) to generate Combo Points. Spend Combo Points on finishers (Envenom, Rupture). Avoid "resource overflow" (capping Energy or overcapping Combo Points). Pooling Energy (auto-attacking while regenerating) is beneficial before burst windows or add spawns.'

