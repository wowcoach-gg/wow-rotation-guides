    spellName: Garrote
    targetUptimePct: 100
    importance: critical
    coachingTip: 'Maintain Garrote at all times for damage and Energy generation via Venomous Wounds. Use Vanish-empowered Garrote before Deathmark.'
  - spellId: 0
    spellName: Rupture
    targetUptimePct: 100
    importance: critical
    coachingTip: 'Maintain Rupture with 5+ Combo Points at all times to ensure consistent Energy flow.'
