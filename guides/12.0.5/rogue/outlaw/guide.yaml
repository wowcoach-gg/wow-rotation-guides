  resourceNotes: 'Energy is generated passively (base 10/sec) and increased by Haste, Combat Potency, and Adrenaline Rush. Spend Energy on builders (Sinister Strike, Pistol Shot, Ambush, Blade Rush) to generate Combo Points. Spend Combo Points on finishers (Dispatch, Between the Eyes, Roll the Bones). Restless Blades reduces cooldowns by 1s per Combo Point spent; overcapping Combo Points or wasting them on low-value finishers significantly reduces your cooldown cycling and overall DPS.'

