guideVersion: 2

resourceManagement:
  primaryResource: Soul Shards
  secondaryResource: Mana
  resourceNotes: 'Soul Shards are the primary resource, capped at 5. They are generated primarily through Agony (main source) and Soul Shard sniping using Unstable Affliction or Drain Soul on dying targets. Soul Harvester also generates shards via Dark Harvest. Shards are spent on Unstable Affliction (Single Target) and Seed of Corruption (AoE). Overcapping shards is a significant DPS loss; they should be spent aggressively unless pooling for a damage window like Summon Darkglare or Malevolence.'

maintenanceBuffs:
  - spellId: 0
    spellName: Agony
    targetUptimePct: 100
    importance: critical
    coachingTip: 'Agony is your most important spell and sole source of Soul Shard generation. It has a ramp-up period; letting it drop causes a massive loss in DPS and resource flow.'
  - spellId: 0
    spellName: Corruption / Wither
    targetUptimePct: 100
    importance: high
    coachingTip: 'Maintain Corruption (or Wither if Hellcaller) at all times. Use Seed of Corruption to apply/maintain this on 3+ targets.'
  - spellId: 0
    spellName: Unstable Affliction
    targetUptimePct: 95
    importance: high
    coachingTip: 'Unstable Affliction is now the baseline single-target shard spender. Ensure it is active, especially during Summon Darkglare windows.'
  - spellId: 0
    spellName: Haunt
    targetUptimePct: 90
    importance: medium
    coachingTip: 'Cast Haunt on cooldown. It provides a damage amplification effect that is central to your priority.'

