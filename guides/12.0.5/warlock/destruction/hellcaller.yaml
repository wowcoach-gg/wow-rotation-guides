specId: 267
className: Warlock
specName: Destruction
role: DPS
heroTalent: Hellcaller
patch: "12.0.5"
guideVersion: 3
resourceManagement:
  primaryResource: Soul Shards
  secondaryResource: Soul Shard Fragments
  resourceNotes: 'Destruction uses a granular shard system where 10 fragments equal 1 Soul Shard. Generate fragments via Wither
    (Hellcaller replacement for Immolate), Conflagrate, and Incinerate. Spend shards on Chaos Bolt for single-target
    or Rain of Fire for AoE. Hellcaller focuses on a methodical approach to shard expenditure, particularly during Malevolence
    windows.'
maintenanceBuffs:
- spellId: 0
  spellName: Wither
  targetUptimePct: 100
  importance: critical
  coachingTip: Wither replaces Immolate for Hellcallers. It is your primary source of Shadowflame damage and shard generation.
    Maintain it on all targets.
- spellId: 0
  spellName: Blackened Soul
  targetUptimePct: 90
  importance: high
  coachingTip: This secondary Shadowflame DoT is generated by Wither. Ensure Wither is active to trigger and maintain Blackened
    Soul stacks.
rotation:
  singleTarget: |
    1. Maintain Wither at all times.
    2. Cast Summon Infernal on cooldown.
    3. Cast Shadowburn whenever available (usable below 20% health or via Fiendish Cruelty procs).
    4. Cast Soul Fire when available if below 4 shards.
    5. Cast Chaos Bolt if you are about to cap Soul Shards (5 shards).
    6. Cast Cataclysm on cooldown to refresh Wither (if talented).
    7. Cast Channel Demonfire whenever available (if talented).
    8. Cast Conflagrate if you have 2 charges to avoid overcapping and generate Backdraft.
    9. Cast Conflagrate to generate Soul Shards.
    10. Cast Incinerate to generate Soul Shards.
  aoe: |
    1. Maintain Wither on as many targets as possible.
    2. Cast Summon Infernal.
    3. Cast Malevolence when as many targets as possible are affected by Wither.
    4. Use Conflagrate on the main target to spread Wither to secondary targets (via Roaring Blaze).
    5. Cast Cataclysm on cooldown to apply Wither to all targets in the area (if talented).
    6. Cast Shadowburn when available during Malevolence windows.
    7. Cast Rain of Fire if there are 5+ targets with Havoc active, or 3+ targets if Havoc is on cooldown.
    8. Cast Rain of Fire if there are 8+ targets outside of the Havoc window.
    9. Cast Shadowburn whenever available on low-health targets.
    10. Cast Soul Fire when available if below 4 shards.
    11. Cast Chaos Bolt if you have 5 Soul Shards and Rain of Fire thresholds are not met.
    12. Apply Havoc if a secondary target is present to duplicate single-target spells.
    13. Cast Channel Demonfire when available (if talented).
    14. Cast Conflagrate to generate Soul Shards and Backdraft stacks.
    15. Cast Incinerate to generate Soul Shards.
  opener: |
    1. Pre-cast Soul Fire.
    2. Pre-cast Incinerate.
    3. Pre-cast Cataclysm (if talented).
    4. Cast Wither.
    5. Cast Conflagrate.
    6. Cast Summon Infernal.
    7. Use trinkets and racials.
    8. Cast Malevolence.
    9. Cast Chaos Bolt.
    10. Cast Conflagrate.
cooldowns:
- name: Summon Infernal
  cooldown: 2min
  description: Your primary cooldown. Deals AoE damage on impact, pulses damage, and generates Soul Shard fragments passively.
    Best used on cooldown.
- name: Malevolence
  cooldown: 1min
  description: 'Hellcaller-specific burst cooldown. Increases Haste and adds Wither stacks. Use when Wither is active on maximum
    targets.'
- name: Cataclysm (if talented)
  cooldown: 30s
  description: Primarily used to apply Wither to all targets in an area. In single target, use it to refresh Wither duration.
- name: Havoc
  cooldown: 30s
  description: 'Marks a secondary target to receive 60% of single-target spell damage. Use to double shard generation from
    builders and efficiency of spenders.'
concepts:
- 'Wither Management: Hellcaller replaces Immolate with Wither. It deals Shadowflame damage and is the foundation of your
  rotation.'
- 'Malevolence Windows: This 1-minute cooldown is your primary burst phase. It empowers your shard spenders and benefits from
  having Wither active on multiple targets.'
- 'Shard Fragments: Unlike other specs, Destruction shards are 10 fragments each. Precision in generation is key to avoid
  overcapping (max 5 shards).'
- 'Pandemic Mechanic: Refresh Wither when it has less than 30% of its duration remaining (approx 5.4s baseline) to add the
  durations together.'
- 'Havoc Efficiency: Always try to have high Soul Shards before casting Havoc to maximize the number of Chaos Bolts duplicated.'
- 'Mastery (Chaotic Energies): Increases damage dealt by a random amount and reduces damage taken.'
- 'Dimensional Rift (passive): If talented, Chaos Bolt and Shadowburn have a 10% chance to open a portal that damages your
  target and generates Soul Shard Fragments. This is passive and requires no action from the player.'
- 'Movement: Destruction is highly immobile. Use Conflagrate and Shadowburn to cover movement. Use Demonic Gateway and Circle
  proactively to minimize travel time.'
- 'Pet Choice: Use Felhunter for interrupts (Spell Lock). Use Imp for defensive dispel (Singe Magic).'
- 'Blackened Soul: A secondary DoT effect unique to Hellcaller that triggers from Wither, adding to your sustained damage
  profile.'
removedMechanics:
- Ritual of Ruin (removed in 12.0)
- Decimation (removed in 12.0)
- Dimension Ripper (removed in 12.0)
- Unstable Rifts (removed in 12.0)
- Health Funnel (removed in 12.0; healing moved to Drain Life)
commonMistakes:
- Overcapping Soul Shards (wasting fragments generated by Wither or builders)
- Letting Wither drop off targets, losing both damage and shard generation
- Using Malevolence when Wither is not applied to targets
- 'Casting Rain of Fire on low target counts (below 3-5 depending on Havoc status)'
- 'Unnecessary movement that interrupts hard-casting fillers like Incinerate'
- Failing to pool shards before a Havoc window
patchChanges:
  12.0.5: 'Conflagration of Chaos reworked: Conflagrate and Shadowburn have 100% chance to guarantee
    next cast of either ability to critically strike and increase damage by your crit chance. Chaos Incarnate
    and Inferno swapped positions in talent tree. April 17 hotfixes: Hellcaller - Through the Felvine
    Chaos Bolt bonus to 35% (was 10%); Blackened Soul -50%; Rain of Fire bonus to 6% (was 8%).'
  12.0.1: 'Through the Felvine: Increases damage of shard spenders, effect doubled during Malevolence. Devil Fruit: Wither
    now has a chance to grant Malevolence. Alzzin''s Iniquity: Malevolence grants additional Haste and adds Wither stacks
    on cast.'
  '12.0': 'Shadowburn: Now baseline usable only on targets below 20% health (unless Fiendish Cruelty procs). Roaring Blaze:
    Redesigned to spread Immolate/Wither to nearby targets.'
