    targetUptimePct: 95
    importance: high
    coachingTip: 'Maintain Rend on the target at all times. Refresh when there are four seconds or less remaining on the duration.'
  - spellId: 0
    spellName: Battle Stance
    targetUptimePct: 100
    importance: critical
    coachingTip: 'Ensure Battle Stance is always toggled on for optimal damage output.'
  - spellId: 0
