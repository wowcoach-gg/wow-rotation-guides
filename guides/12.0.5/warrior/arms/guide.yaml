resourceManagement:
  primaryResource: Rage
  secondaryResource: None
  resourceNotes: 'Rage is generated primarily through auto-attack swings. Nearly every active ability spends Rage. In Midnight, Rage generation has been significantly reduced, making auto-attack uptime critical. Players must manage the flow to avoid overcapping (reaching 100 Rage) while ensuring they have enough Rage to cast Mortal Strike on cooldown. High or dry streaks can occur; skipping a Slam is preferable to missing a Mortal Strike.'

