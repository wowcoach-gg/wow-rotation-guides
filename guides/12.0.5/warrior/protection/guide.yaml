specId: 73
className: Warrior
specName: Protection
role: Tank
patch: "12.0.5"
guideVersion: 2

resourceManagement:
  primaryResource: Rage
  secondaryResource: None
  resourceNotes: 'Rage has a maximum capacity of 100. It is generated passively via auto-attacks (2 Rage) and taking damage from enemy auto-attacks (3 Rage). Active generation comes from Ravager (up to 60), Shield Charge (20-40), Charge (20), Demoralizing Shout (20 with Booming Voice), Shield Slam (15), and Thunder Clap (5). Spend Rage on Shield Block (30) for mitigation, and use Ignore Pain or Revenge to dump excess Rage to avoid capping at 100. During Avatar, Rage generation increases significantly, requiring faster spending.'

maintenanceBuffs:
  - spellId: 0
    spellName: Shield Block
    targetUptimePct: 95
    importance: critical
    coachingTip: 'Maintain Shield Block whenever actively tanking melee hits. It is your primary mitigation against physical damage and increases Shield Slam damage by 30%.'
  - spellId: 0
    spellName: Defensive Stance
    targetUptimePct: 100
    importance: high
    coachingTip: 'Stay in Defensive Stance for a constant 16% damage reduction unless damage intake is low enough to swap to Battle Stance for damage.'
  - spellId: 0
    spellName: Ignore Pain
    targetUptimePct: 0
    importance: high
    coachingTip: 'Use Ignore Pain to smooth out damage and as a primary Rage dump to prevent overcapping. It should take priority if your next cast would put you over 100 Rage.'

playstyles:
  - id: mountain_thane
    name: Mountain Thane
    detectionCriteria:
      heroTalents:
        - "Mountain Thane"
  - id: colossus
    name: Colossus
    detectionCriteria:
      heroTalents:
        - "Colossus"

