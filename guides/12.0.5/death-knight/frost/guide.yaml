specId: 251
className: Death Knight
specName: Frost
role: DPS
patch: "12.0.5"
guideVersion: 2

resourceManagement:
  primaryResource: Runes
  secondaryResource: Runic Power
  resourceNotes: 'Frost uses a dual resource system. You have 6 Runes; spending them generates 10 Runic Power per Rune and triggers Rune recharge (max 3 charging at once). Runic Power (max 100) is spent on Frost Strike or Glacial Advance, which can trigger Runic Empowerment to restore Runes. The goal is to keep at least 3 runes on cooldown to maximize recharge and spend Runic Power to avoid overcapping while ensuring you have enough for Breath of Sindragosa (60 RP required to start).'

maintenanceBuffs:
  - spellId: 0
    spellName: Remorseless Winter
    targetUptimePct: 90
    importance: high
    coachingTip: 'In AoE, Remorseless Winter is critical to enable Cleaving Strikes, which buffs Frostscythe. In Single Target, maintain it to stack Gathering Storm or Everfrost debuffs.'
  - spellId: 0
    spellName: Razorice
    targetUptimePct: 100
    importance: high
    coachingTip: 'Maintain 5 stacks of Razorice on the target to maximize damage from Shattering Blade and Frostbane procs.'

