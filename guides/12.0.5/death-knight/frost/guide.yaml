# ── Text fields (AI reads raw) ───────────────────────────────────────────────

removedMechanics: |
  - Soul Reaper (Moved to Unholy tree in 12.0)
  - Sacrificial Pact (Removed in 12.0)
  - Unholy Ground (Removed in 12.0)
  - Cleaving Strikes (Reworked: No longer causes Obliterate to cleave; now buffs Frostscythe during Remorseless Winter)
  - Empower Rune Weapon (Reworked: Now off-GCD and instant with no projectile travel time)
  - Breath of Sindragosa (Reworked: No longer drains Runic Power; now 90s CD with duration extended by KM/Rime procs)
  - Frostwyrm's Fury (Reworked: Now 90s CD and includes a stun)
  - Exterminate (Reworked: No longer resets Reaper's Mark; now grants Killing Machine procs)

rotation:
  singleTarget: |
    1. Use Obliterate if you have a proc of Killing Machine (consume ASAP if 2 stacks). Nuance: if 3+ Runes, prioritize KM; if low on Runes and 70+ RP, prefer Rime-Howling Blast or Frost Strike first.
    2. Use Frost Strike if you have 5 stacks of Razorice (Shattering Blade / Frostbane synergy).
    3. Use Frost Strike / Frostbane if you have 5 stacks of Razorice.
    4. Use Howling Blast if you have a proc of Rime.
    5. Use Frost Strike to spend Runic Power.
    6. Use Empower Rune Weapon to generate a Killing Machine proc and 40 Runic Power (avoid casting a no-KM Obliterate).
    7. Use a no-KM Obliterate (bottom priority; only as a builder for Runic Power when nothing else is up).
    Note: A non-Killing-Machine Obliterate does very little damage and generates no procs — always spend Runic Power on Frost Strike before pressing no-KM Obliterate.
  aoe: |
    Swap to Frostscythe and Glacial Advance at 3+ targets.
    1. Use Frostscythe if you have a proc of Killing Machine.
    2. Use Remorseless Winter (required for Cleaving Strikes buff to Frostscythe).
    3. Use Howling Blast if you have a proc of Rime.
    4. Use Glacial Advance.
    5. Use Empower Rune Weapon to generate a Killing Machine proc and 40 Runic Power.
    6. Use a no-KM Obliterate.
    Note: If at two stacks of Killing Machine, always consume ASAP.
  opener: |
    [Single Target Opener]
    1. Remorseless Winter
    2. Pillar of Frost + Trinket + Potion + Raise Dead + Obliterate
    3. Frost Strike

    [Multi-Target Opener]
    1. Remorseless Winter
    2. Pillar of Frost + Trinket + Potion + Raise Dead + Obliterate
    3. Howling Blast

cooldowns: |
  - Reaper's Mark (45s): Align with every Pillar of Frost window. Generates Killing Machines via Exterminate procs.
  - Pillar of Frost (45s): Grants 30% Strength for 12s. Use on cooldown, ideally macroed with off-GCD abilities.
  - Remorseless Winter (Variable): Deals AoE damage and slows. With Frozen Dominion, it casts automatically with Pillar. Otherwise, use on cooldown and align with Pillar.
  - Empower Rune Weapon (30s recharge, 2 charges): Off-GCD resource generator. Generates a Killing Machine proc and 40 Runic Power per use. Use frequently to avoid naked Obliterates. Tier set (4pc) makes it recharge 20% faster and Pillar of Frost grants 1 extra charge. This is a core rotational button — use on cooldown, not a long-term cooldown to hold.
  - Breath of Sindragosa (90s): Costs 60 RP to start. Duration is extended by consuming KM and Rime procs. Use with Obliteration.
  - Frostwyrm's Fury (90s): Major burst damage and stun. Recastable at 50% effectiveness within 45s via Apex talents. Use both charges within Pillar windows.
  - Obliteration (Talent): During Pillar, Frost Strike/Glacial Advance/Howling Blast generate KM procs. Follow a "weaving" pattern: Generator -> KM Spender.

concepts: |
  - Killing Machine: Auto-attack crits guarantee the next Obliterate/Frostscythe crits and converts their damage to Frost.
  - Rime: Frost Strike and Glacial Advance have a 45% chance to make the next Howling Blast free and deal extra damage.
  - Resource Loop: Spend Runes to build Runic Power; spend Runic Power to trigger Runic Empowerment and restore Runes.
  - Obliteration Weaving: During Pillar of Frost, alternate between KM generators (Frost Strike, Glacial Advance, or Rime Howling Blast) and KM spenders (Obliterate or Frostscythe).
  - Apex Talents (Chosen of Frostbrood): Buffs Frostwyrm's Fury damage, grants Haste, extends Pillar of Frost duration, and allows a second cast of the dragon.
  - Cleaving Strikes: Remorseless Winter is the trigger for AoE; it allows Frostscythe to deal significantly more damage.
  - Mastery (Frozen Heart): Increases all Frost damage. Since KM converts Obliterate to Frost damage, Mastery is highly valuable.
  - Breath Management: Breath of Sindragosa is no longer an RP drain; it is a fixed window extended by active gameplay (consuming procs).
  - Deathbringer: Focuses on the 45s burst cycle using Reaper's Mark and Exterminate to flood the rotation with KM procs.
  - Rider of the Apocalypse: Focuses on 90s windows with Frostwyrm's Fury summoning the Four Horsemen and provides high mobility via Death Charge.

commonMistakes:
  - 'Casting naked Obliterates (without Killing Machine) when you have Runic Power or Empower Rune Weapon available'
  - 'Overcapping Killing Machine by generating a new proc while already at 2 stacks'
  - "Desyncing Reaper's Mark from Pillar of Frost windows (they should always be used together)"
  - 'Wasting Rime procs by casting another Frost Strike or Glacial Advance before using Howling Blast'
  - 'Failing to pool 60 Runic Power before activating Pillar of Frost when talented into Breath of Sindragosa'
  - 'Using Frost Strike in AoE instead of Glacial Advance (unless Frostbane procs are active)'
  - 'Letting Remorseless Winter drop during AoE, which removes the Cleaving Strikes buff from Frostscythe'

patchChanges: |
  12.0.1:
  - Updated rotation layout and Frostwyrm's Fury priority.
  12.0:
  - Obliterate now deals a portion of damage as Frost by default.
  - Frostbane main target damage increased by 300%.
  - Empower Rune Weapon is now instant with no projectile travel time.
  - New Apex Talents: Chosen of Frostbrood (Levels 80-90) added to buff Frostwyrm's Fury and Pillar of Frost.
  - Breath of Sindragosa reworked: 90s cooldown, no longer drains RP, duration extended by KM/Rime.
  - Hero Talent updates: Rider of the Apocalypse and Deathbringer received three new talents each.
  - Soul Reaper and Sacrificial Pact removed from the spec/class tree.