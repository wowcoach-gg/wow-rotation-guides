removedMechanics: |
  - Festering Wound (Removed in 12.0 - replaced by Lesser Ghoul stacks on the player)
  - Apocalypse (Removed in 12.0)
  - Legion of Souls (Removed in 12.0)
  - Defile (Removed in 12.0)
  - Unholy Assault (Removed in 12.0)
  - Sacrificial Pact (Removed in 12.0)
  - Clawing Shadows Range (Reworked: Scourge Strike is now 30 yards by default; talent now enables AoE cleave)
  - Sudden Doom Melee Proc (Reworked: Now procs off Dread Plague ticks instead of auto-attacks)
  - SPEC BOUNDARY: Unholy's ONLY Rune spender is Scourge Strike. Unholy's ONLY Runic Power spenders are Death Coil (single target) and Epidemic (AoE). Any ability not listed in this guide does NOT exist for Unholy.
  - Death and Decay (NOT worth pressing for damage in 12.0 - only use for the slow via Grip of the Dead; Blood-Soaked Ground and Desecrate talents are too weak to justify pressing it)

rotation:
  singleTarget: |
    [Rider of the Apocalypse Priority]
    1. Maintain Plagues: Use Putrefy (with Blightburst) or Outbreak to keep Virulent Plague and Dread Plague on the target. Prioritize Putrefy to avoid wasting GCDs on Outbreak.
    2. Use Festering Scythe if its debuff has fallen off the target.
    3. Cast Soul Reaper if the target is below 35% health or you have a free use from Dark Transformation (Reaping). With Pestilence talented, hold Soul Reaper until 5 seconds before Dark Transformation ends to overlap the plague damage debuff with your Pestilence consume.
    4. Use Scourge Strike if you have 4+ Runes and at least one stack of Lesser Ghoul (prioritize avoiding Rune overcap over Runic Power overcap).
    5. Use Death Coil if you have a Sudden Doom proc or are at 80+ Runic Power. Use Sudden Doom procs ASAP to avoid waste.
    6. Use Putrefy (avoid sitting at 2 charges). Use Soul Reaper to auto-consume Putrefy charges in execute.
    7. Use Festering Strike if you have less than 3 stacks of Lesser Ghoul. Aim for 4-6 stacks to maintain flexibility for Trollbane's Icy Fury windows (which prioritize Scourge Strike spending).
    8. Use Scourge Strike if you have at least 1 stack of Lesser Ghoul to summon minions.
    9. Use Death Coil as a filler.

    [San'layn Priority]
    1. Maintain Plagues: Use Putrefy (with Blightburst) or Outbreak to keep Virulent Plague and Dread Plague on the target.
    2. Use Festering Scythe if its debuff has fallen off the target.
    3. Cast Soul Reaper if the target is below 35% health or you have a free use from Dark Transformation (Reaping).
    4. During Dark Transformation, prioritize Vampiric Strike (replaces Scourge Strike). Stack Essence of the Blood Queen to 7.
    5. Use Scourge Strike if you have 4+ Runes and at least one stack of Lesser Ghoul.
    6. Use Death Coil at 80+ Runic Power or with Sudden Doom proc. Spend aggressively to maintain Essence of the Blood Queen between Dark Transformation windows and to fish for Vampiric Strike procs.
    7. Use Putrefy (avoid sitting at 2 charges).
    8. Use Festering Strike if you have less than 3 stacks of Lesser Ghoul.
    9. Use Scourge Strike if you have at least 1 stack of Lesser Ghoul.
    10. Use Death Coil as a filler.

    [Summon Gargoyle Active - Both Playstyles]
    When Summon Gargoyle is active, Death Coil priority increases dramatically. Use Death Coil above 30 Runic Power or with Sudden Doom procs. Early Death Coils are more valuable than late ones (they buff more Gargoyle casts). Priority decreases as the Gargoyle window nears its end.
  aoe: |
    [Both Playstyles]
    1. Maintain Plagues: Use Putrefy (with Blightburst) or Outbreak. Scourge Strike auto-spreads plagues to nearby targets.
    2. Use Festering Scythe if its debuff has fallen off any target.
    3. Cast Soul Reaper if any target is below 35% health or you have a free use from Reaping. Snipe low-health mobs to auto-consume Putrefy charges.
    4. Use Epidemic at 80+ Runic Power or with Sudden Doom proc at 3+ targets. Use Death Coil instead below 3 targets (5 targets during Forbidden Knowledge).
    5. Use Putrefy (avoid sitting at 2 charges).
    6. Use Festering Strike if you have less than 3 stacks of Lesser Ghoul.
    7. Use Scourge Strike if you have at least 1 stack of Lesser Ghoul (cleaves by default).
    8. Use Epidemic as filler at 3+ targets. Use Death Coil below 3 targets.

    [San'layn Specific]
    - Use Pestilence immediately after Dark Transformation ends to consume high-duration plagues for burst. Follow up with Putrefy to reapply plagues.
    - Do NOT delay Soul Reaper for Pestilence in AoE (unlike single target).
  opener: |
    [Single Target Opener]
    1. Use Outbreak (skip if running Blightburst).
    2. Cast Festering Strike twice to build Lesser Ghoul stacks.
    3. Cast Army of the Dead + Dark Transformation + Trinkets + Racial + Potion.
    4. Cast Putrefy twice.
    5. Cast Death Coil.
    6. Cast Soul Reaper 5 seconds before Dark Transformation ends (if Pestilence is talented) to ensure the plague damage debuff overlaps with Pestilence consume. In execute, use the free Soul Reaper ASAP so it comes off cooldown before DT ends.

    [Multi-Target Opener]
    1. Use Outbreak.
    2. Cast Festering Strike twice.
    3. Cast Army of the Dead + Dark Transformation + Trinkets + Racial + Potion.
    4. Cast Putrefy twice.
    5. Cast Soul Reaper (no need to delay for Pestilence in AoE).

cooldowns: |
  - Army of the Dead (3 min): Major offensive cooldown. Summons ghouls and Magus. In Midnight, transforms Death Coil into Necrotic Coil and Epidemic into Graveyard for 30s.
  - Dark Transformation (45 sec): Buffs your primary pet, allowing its Claw to cleave. Buffs all minions via Commander of the Dead. Use on cooldown.
  - Summon Gargoyle (3 min): Summons a Gargoyle for 25s. Damage increases based on Runic Power spent while active.
  - Raise Abomination (1.5 min): Summons an Abomination that increases minion damage against nearby enemies by 20%.
  - Putrefy (2 charges): Sacrifices a ghoul for AoE damage and summons a Magus of the Dead (with Reanimation).
  - Anti-Magic Shell (1 min): Defensive that absorbs magic damage and generates Runic Power. Use proactively to gain resources.
  - Anti-Magic Zone (2 min): Raid defensive for magic damage.

concepts: |
  - SPEC IDENTITY: Unholy's primary Rune spender is Scourge Strike. Unholy spends Runic Power on Death Coil (single target) and Epidemic (AoE). Any ability not listed in this guide does not exist for Unholy.
  - The "Wound" system is replaced by Lesser Ghoul stacks on the player. Festering Strike builds stacks; Scourge Strike consumes them to summon ghouls.
  - 45-Second Cycle: Dark Transformation and many minor buffs align every 45 seconds. Army of the Dead aligns every second cycle (90s/1.5m). Use cooldowns on cooldown; any delay desynchs the cycle.
  - Pestilence Loop: During Dark Transformation, Outbreak becomes Pestilence. Stack up plague durations, then use Pestilence just after Dark Transformation ends to consume all remaining plague damage in one burst. Follow with Putrefy to reapply plagues.
  - Summon Gargoyle Priority: When Gargoyle is active, spending Runic Power is the absolute priority to buff its damage. Use Death Coil above 30 RP. Early casts are more valuable than late ones.
  - Forbidden Knowledge (Apex): Rank 1 transforms Death Coil into Necrotic Coil and Epidemic into Graveyard for 30s after Army of the Dead. Necrotic Coil is used up to 4 targets (Death Coil only up to 2). Rank 4 makes Dread Plague have a 20% chance to trigger Putrefy at 60% effectiveness.
  - Blightburst Synergy: Putrefy applies plagues to nearby targets, significantly reducing the need for manual Outbreak casts.
  - Ranged Effectiveness: Scourge Strike and most core abilities now have a 30-yard range, allowing Unholy to maintain high DPS while moving or at range.
  - Mastery (Dreadblade): Increases Shadow damage dealt by you and your minions.
  - Execute: Soul Reaper is critical below 35% health and automatically consumes Putrefy charges for efficiency.
  - Death and Decay: NOT worth pressing for damage in Midnight. Blood-Soaked Ground and Desecrate are too weak to justify the GCD. Only use for the slow via Grip of the Dead.
  - RIDER OF THE APOCALYPSE: All talents automatically adapt to Unholy. There are no wrong talent choices within this tree. Trollbane's Icy Fury procs from Scourge Strike — when it procs, prioritize Scourge Strike spending. Mawsworn Menace reduces Horn of Winter and Death and Decay cooldowns. Rider focuses on 90-second burst windows aligned with Army of the Dead.
  - SAN'LAYN (Unholy-specific effects): During Dark Transformation, Scourge Strike becomes Vampiric Strike. Stack Essence of the Blood Queen to 7, then spend Runic Power between DT windows to fish for Vampiric Strike procs and extend the buff. Dark Transformation lasts 20-35s; you only need one proc between uses to bridge the gap.
  - Festering Scythe: When talented, maintain this debuff on the target. Normal rotation usually handles uptime, but track it especially when new mobs join a pack.

commonMistakes:
  - 'Overcapping Runic Power (100) instead of spending it on Death Coil/Epidemic'
  - 'Overcapping Runes (sitting at 6) instead of using Scourge Strike/Festering Strike'
  - 'Letting Dread Plague or Virulent Plague drop, losing Sudden Doom procs and damage'
  - 'Using Death and Decay for damage (it is currently tuned as a utility/slow tool only even with Blood-Soaked Ground or Desecrate)'
  - 'Sitting on 2 charges of Putrefy instead of using them to summon Magus of the Dead'
  - 'Delaying Dark Transformation and desyncing the 45-second cooldown alignment'
  - 'Not spending Runic Power aggressively enough during Summon Gargoyle windows'
  - 'Letting Festering Scythe debuff drop off the target when it is talented'
  - 'Not timing Soul Reaper to overlap plague damage debuff with Pestilence consume (should cast 5 seconds before DT ends in single target)'
  - 'Running low on Lesser Ghoul stacks and having nothing for Scourge Strike to consume (aim for 4-6 stacks)'

patchChanges: |
  12.0.5:
  - Cycle of Death: NEW. Putrefy reduces Death and Decay cooldown by 1s; Death and Decay reduces Putrefy cooldown by 0.3s per enemy hit (up to 3s).
  - Raise Abomination reworked — Disease Cloud no longer causes increased damage vulnerability; now deals Plague damage periodically to nearby enemies.
  - Putrid Echoes buffed — Putrefy now consumes up to 2 available charges on cast.
  - Scourge Strike — now applies Virulent Plague in addition to spreading it.
  - Pestilence renamed to Blightfall. Blightfall (the new name) now overrides Dark Transformation instead of Outbreak.
  - Necrotic Coil — Shadowstrike damage now prefers primary target.
  - Lesser Ghoul damage reduced by 17%.
  - Rider of the Apocalypse - Unholy Armaments: Ghoul and skeletal archer +10%, Lesser Ghouls +20% damage.
  - Rider of the Apocalypse - A Feast of Souls reworked: with 2+ Horsemen aiding, Death Coil +20% and Epidemic +20% damage.
  - San'layn - Frenzied Bloodthirst reworked: Essence of the Blood Queen +3% Death Coil/Death Strike, +3% Epidemic per stack.
  - San'layn - Thrill of Blood: Dread Plague +5%, Virulent Plague +5%.
  - San'layn - Desecrate: Death and Decay deals damage 100% faster.
  - REMOVED: (original) Blightfall, March of Madness, Scythe of Decay.
  - NOTE: Because "Pestilence" was renamed to "Blightfall" in 12.0.5, combat-log abilities tagged Pestilence in older guides refer to the spell now called Blightfall. The rotation logic above is unchanged but the spell name differs in 12.0.5 logs.
  12.0.1:
  - General tuning and bug fixes for Midnight launch.
  - Opener updated to include an early Death Coil.
  12.0 (Midnight):
  - Complete rework: Festering Wounds removed from targets, replaced by Lesser Ghoul stacks on the player.
  - Apocalypse and Unholy Assault removed.
  - Putrefy and Pestilence added as core rotational abilities.
  - Scourge Strike cleave decoupled from Death and Decay.
  - New Apex Talents (Forbidden Knowledge) added for levels 80-90.