resourceManagement:
  primaryResource: Runes
  secondaryResource: Runic Power
  resourceNotes: 'Death Knights use a dual resource system. You have 6 Runes; spending them generates 10 Runic Power each. At most, 3 runes can recharge simultaneously, so keep at least 3 on cooldown. Spend Runic Power to avoid capping (100) or when 3+ runes are charging. A new tertiary resource is Lesser Ghoul stacks (max 8), generated by Festering Strike and consumed by Scourge Strike to summon minions.'

maintenanceBuffs:
  - spellId: 0
    spellName: Virulent Plague
    targetUptimePct: 100
    importance: high
    coachingTip: 'Your primary AoE disease. Maintain via Outbreak or Putrefy (if talented into Blightburst) to ensure consistent damage and resource generation.'
  - spellId: 0
    spellName: Dread Plague
    targetUptimePct: 100
    importance: critical
    coachingTip: 'Single-target disease and your primary source of Sudden Doom procs. Must be maintained at all times.'
  - spellId: 0
    spellName: Essence of the Blood Queen
    targetUptimePct: 95
    importance: high
    coachingTip: 'Sanlayn only: Stack this to 7 during Dark Transformation and extend it by spending Runic Power to bridge the gap between cooldown windows.'

