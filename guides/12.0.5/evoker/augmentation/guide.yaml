resourceManagement:
  primaryResource: Essence
  secondaryResource: Essence Burst
  resourceNotes: 'Generate Essence Burst by casting Living Flame (or Chrono Flame) and Azure Strike. Spend Essence or Essence Burst on Eruption to deal damage and extend the duration of Ebon Might. Essence Burst makes your next Eruption free, and with the Ignition Rush talent, it also reduces cast time by 40% and increases damage by 20%. Avoid overcapping Essence Burst (max 2 stacks) by spending it before casting generators.'

maintenanceBuffs:
  - spellId: 0
    spellName: Ebon Might
    targetUptimePct: 100
    importance: critical
    coachingTip: 'This is your highest priority. Maintain near 100% uptime by extending it with Empower spells (Fire Breath, Upheaval), Eruption, and Breath of Eons. Refresh when 3 seconds or less remain to utilize the Pandemic window.'
  - spellId: 0
    spellName: Prescience
    targetUptimePct: 95
    importance: high
    coachingTip: 'Use rotationally on co-DPS allies. It grants Critical Strike chance and triggers Fate Mirror for additional damage/healing. In Midnight, it no longer directs Ebon Might but remains vital for personal and ally throughput.'
  - spellId: 0
    spellName: Blistering Scales
    targetUptimePct: 100
    importance: medium
    coachingTip: 'Keep this active on the tank to provide bonus armor and physical damage reduction. Regenerative Chitin prevents it from losing charges.'
  - spellId: 0
    spellName: Shifting Sands
    targetUptimePct: 90
    importance: high
    coachingTip: 'Triggered by casting Empower spells. It provides Versatility to allies based on your Mastery. Ensure Ebon Might is active before casting Empowers to maximize the extension value.'

