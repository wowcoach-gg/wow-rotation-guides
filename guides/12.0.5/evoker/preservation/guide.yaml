guideVersion: 2

resourceManagement:
  primaryResource: Mana
  secondaryResource: Essence
  resourceNotes: 'Preservation Evokers manage Mana and Essence. Essence is spent on Echo (2), Emerald Blossom (3), and Disintegrate (3). Essence Burst procs (from Living Flame, Reversion, or Leaping Flames) make the next Essence spender free. Avoid wasting Essence during downtime, but prioritize spending Essence Burst on Emerald Blossom or Disintegrate for maximum efficiency.'

