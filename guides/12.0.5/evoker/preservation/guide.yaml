    spellName: Echo
    targetUptimePct: 0
    importance: critical
    coachingTip: 'Echo is your core mechanic. Ensure Echo is active on targets before casting high-value heals like Reversion or Merithra’s Blessing to replicate the effect.'
  - spellId: 0
    spellName: Reversion
    targetUptimePct: 90
    importance: high
    coachingTip: 'Keep Reversion active on as many players as possible to benefit from Grace Period healing bonuses and to proc Merithra’s Blessing.'
  - spellId: 0
