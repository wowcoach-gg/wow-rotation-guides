removedMechanics: |
  - Shattering Star (Removed in 12.0: Now a passive effect added to Eternity Surge via Shattering Stars talent)
  - Firestorm (Removed in 12.0: No longer a separate spell; now only procs passively from Feed the Flames talent)
  - Dense Energy (Removed in 12.0: Pyre now costs 3 Essence baseline unless Imminent Destruction is active)
  - Renewing Blaze (Removed in 12.0: Now a passive effect added to Obsidian Scales)
  - Unravel (Removed in 12.0: Now a passive effect added to Fire Breath)
  - Engulf (Removed in 12.0: Replaced by charges of Fire Breath for Flameshaper)
  - Lay Waste (Removed in 12.0: Replaced by Azure Sweep)
  - Raging Inferno (Removed in 12.0)

rotation:
  singleTarget: |
    [Scalecommander] Single Target Priority:
    1. Cast Fire Breath at empower level 1 on cooldown to maintain the DoT.
    2. Cast Eternity Surge on cooldown.
    3. Cast Deep Breath on cooldown, followed by its additional charge from Strafing Run 7-8 seconds later.
    4. Use Hover to maintain uptime whenever forced to move.
    5. Cast Azure Sweep when available.
    6. Cast Living Flame as a filler.
    7. Cast Azure Strike as a filler when moving if you have no Hover charges.

    [Flameshaper] Single Target Priority:
    1. Cast Fire Breath on cooldown, always at Empower level 1.
    2. Cast Eternity Surge on cooldown.
    3. Cast Disintegrate as your Essence spender.
    4. Cast Azure Sweep when available.
    5. Cast Living Flame as your filler.
    6. Cast Azure Strike if you have to cast whilst moving without any Hover charges.
  aoe: |
    [Scalecommander] AoE Priority:
    1. Cast Deep Breath once enemies are grouped.
    2. Cast Dragonrage.
    3. Cast Eternity Surge at rank 1 (or matching target count: 2/4/6 targets for rank 1/2/3 with Eternity's Span).
    4. Cast Fire Breath at rank 1 or with Tip the Scales.
    5. Cast Disintegrate after empowers to trigger Mass Disintegrate; cast on two different targets to spread Bombardments.
    6. Cast Pyre after channeling Mass Disintegrate when fighting 4 or more enemies.
    7. Cast Azure Sweep when available for damage and Essence Burst generation.
    8. Cast Azure Strike as filler to generate Essence Burst procs for Pyre.
    9. Cast Living Flame with Burnout procs when Leaping Flames stacks are active.
    10. Use empowered spells on cooldown and avoid overcapping Essence.

    [Flameshaper] AoE Priority:
    1. Cast Dragonrage on cooldown.
    2. Cast Fire Breath at Empower level 1 to maximize Consume Flame damage.
    3. Cast Pyre on 3+ targets; switch to Disintegrate if 2 targets or less.
    4. Cast Living Flame at least once between every Fire Breath to consume Leaping Flames.
    5. Cast Azure Sweep when available.
    6. Cast Eternity Surge when no other priority spells are available.
  opener: |
    [Scalecommander] Opener:
    1. Pre-cast Living Flame.
    2. Cast Deep Breath.
    3. Cast Dragonrage.
    4. Cast Fire Breath with Tip the Scales.
    5. Cast Eternity Surge.
    6. Cast Disintegrate until out of Essence.
    7. Cast Azure Sweep to gain Essence Burst.
    8. Cast Living Flame to gain Essence Burst if Azure Sweep is unavailable.
    9. Cast Deep Breath a second time (Strafing Run).

    [Flameshaper] Opener:
    1. Pre-cast Living Flame.
    2. Cast Dragonrage.
    3. Cast Fire Breath at Empower level 1.
    4. Cast Eternity Surge at Empower level 1.
    5. Cast Disintegrate three times.
    6. Cast Fire Breath at Empower level 1.
    7. Cast Disintegrate until out of Essence.
    8. Cast Azure Sweep.

cooldowns: |
  - Dragonrage (2min): Major offensive cooldown. Grants full Mastery effectiveness and guaranteed Essence Burst from fillers. Duration extended by Empowered spells via Animosity.
  - Deep Breath (Variable): High damage and mobility. Talented into Terror of the Skies, it provides a 3-second stun. Strafing Run allows a second cast within 18s.
  - Obsidian Scales (1.5min): Major defensive. Reduces damage taken and automatically triggers Renewing Blaze for self-healing.
  - Zephyr (2min): Group utility. Reduces AoE damage taken for the Evoker and 4 closest allies.
  - Time Spiral (2min): Utility. Grants the raid one free use of a movement ability.
  - Rescue (1min): Utility. Repositions an ally and provides a shield (Twin Guardian).
  - Quell (40s): Ranged interrupt.

concepts: |
  - Range: Devastation is limited to a 25-yard range, requiring careful positioning.
  - Empowered Spells: Fire Breath and Eternity Surge can be held to increase their effects. Generally, rank 1 is preferred for ST/DoT maintenance.
  - Animosity: Empowered spells cast during Dragonrage extend its duration. Extensions have diminishing returns after the 4th cast.
  - Power Swell: Leave a 4-5 second window between Empowered spell casts to maximize the Essence regeneration benefit.
  - Mastery (Giantkiller): Increases damage based on target health. Dragonrage allows you to always benefit from the maximum effect.
  - Essence Burst: Procs from fillers allow free Essence spenders. Dragonrage makes these procs guaranteed.
  - Azure Sweep: Replaces Lay Waste; Eternity Surge empowers the next Azure Strike into a high-damage AoE sweep.
  - Rising Fury: Apex talent providing stacking haste (up to 20%) and damage (15%) during Dragonrage, with a lingering buff after it ends.
  - Scalecommander Cleaving: Focuses on spreading Bombardments via Mass Disintegrate and using Strafing Run for frequent Deep Breaths.
  - Flameshaper Mechanics: Focuses on Consume Flame, where Essence spenders trigger explosions based on Fire Breath DoT duration.
  - Hover: Essential for maintaining 100% uptime. Can now be cast while already casting other spells.

commonMistakes:
  - 'Overcapping Essence instead of spending it on Disintegrate or Pyre'
  - 'Casting Empowered spells too close together and wasting Power Swell duration'
  - 'Using Pyre on fewer than 3 targets when Disintegrate would provide better priority damage'
  - 'Failing to use Hover to maintain DPS uptime while moving'
  - 'Not spreading Bombardments to multiple targets as Scalecommander'
  - 'Letting Dragonrage expire early by not prioritizing Empowered spells for Animosity extensions'
  - 'Standing idle instead of using Azure Strike as a filler when forced to move without Hover'

patchChanges: |
  12.0.1:
  - Adjusted rotations and added Apex Talent (Rising Fury) section.
  - Updated talent tree loadouts for Midnight Pre-season.
  12.0:
  - Midnight Launch: Substantial class and spec talent tree adjustments.
  - New Talent: Azure Sweep (replaces Lay Waste).
  - Rework: Shattering Star is now a passive effect on Eternity Surge.
  - Rework: Renewing Blaze is now a passive effect on Obsidian Scales.
  - Rework: Twin Guardian now provides movement speed and cast-while-moving instead of a shield.
  - New Mechanic: Hover can be cast while casting.
  - New Talent: Strafing Run allows re-casting Deep Breath within 18s.
  - Removed: Dense Energy (Pyre now costs 3 Essence baseline).
  - Removed: Firestorm as a separate spell (now only procs from Feed the Flames).
  - Flameshaper: Engulf removed; Consume Flame now triggered by Essence spenders.