resourceManagement:
  primaryResource: Essence
  secondaryResource: Essence Burst
  resourceNotes: 'Essence is the primary resource spent on Disintegrate (Single-Target) and Pyre (AoE). Essence Burst is a proc generated by filler spells (Living Flame, Azure Strike, Azure Sweep) that allows Essence abilities to be cast for free. Dragonrage guarantees Essence Burst from all filler spells. Spending Essence reduces the cooldown of Empowered spells via the Causality talent. Avoid overcapping Essence to prevent resource waste.'

