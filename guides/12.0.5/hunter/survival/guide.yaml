rotation:
  singleTarget: |
    [Sentinel] Single Target Priority:
    1. Cast Kill Command to generate Tip of the Spear stacks if you run out.
    2. Cast Boomstick as a high priority if Takedown isn't ready, and you have no Sentinel's Mark proc.
    3. Cast Wildfire Bomb with Sentinel's Mark, or if you have less than 4 seconds remaining until it reaches 2 charges.
    4. Activate Takedown. Try to do so with no Tip stacks, as it will generate 3, but consume one of those 3 on its own.
    5. Cast Boomstick. Aim the cone if other targets are nearby.
    6. Cast Moonlight Chakram.
    7. Cast Flamefang Pitch on cooldown.
    8. Cast Raptor Strike.
    9. Cast Kill Command as a filler.

    [Pack Leader] Single Target Priority:
    1. Cast Kill Command to generate Tip of the Spear stacks if you run out. You may also cast it with 1 Tip stack if you have a Howl of the Pack Leader proc (glowing).
    2. Activate Takedown. Try to do so with no Tip stacks.
    3. Cast Flamefang Pitch on cooldown.
    4. Cast Boomstick.
    5. Cast Wildfire Bomb only to extend Fury of the Wyvern (aim for two Bombs per Wyvern spawn).
    6. Cast Raptor Strike. If upgraded to Raptor Swipe, it must be Tipped.
    7. Cast Takedown regardless of conditions if you would otherwise have nothing to do.

  aoe: |
    [Sentinel] AoE Priority:
    1. Cast Kill Command to generate Tip of the Spear stacks if you run out.
    2. Cast Boomstick as a high priority if Takedown isn't ready, and you have no Sentinel's Mark proc.
    3. Cast Wildfire Bomb with Sentinel's Mark, or if you have less than 4 seconds remaining until it reaches 2 charges.
    4. Activate Takedown. Get to 1 stack of Tip of the Spear only before triggering it to avoid overcapping.
    5. Cast Boomstick. Aim the cone to hit as many targets as possible.
    6. Cast Moonlight Chakram.
    7. Cast Raptor Strike.
    8. Cast Kill Command as a filler.

    [Pack Leader] AoE Priority:
    1. Cast Kill Command to generate Tip of the Spear stacks if you run out. You may also cast it with 1 Tip stack if you have a Howl of the Pack Leader proc.
    2. Activate Takedown. Cast Kill Command to get to 3 Tip stacks before activating it.
    3. Cast Boomstick.
    4. Cast Wildfire Bomb if you have more than 1.5 charges.
    5. Cast Flamefang Pitch on cooldown.
    6. Cast Raptor Strike. If upgraded to Raptor Swipe, it must be Tipped.
    7. Cast Kill Command as a filler.

