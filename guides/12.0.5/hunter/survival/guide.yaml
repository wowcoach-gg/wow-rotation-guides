cooldowns: |
  - Takedown (1:30, can be 1:00): Primary cooldown. Increases damage by 20% for 10s and doubles auto-attack speed. Charges to target.
  - Boomstick (1:00): Channeled shotgun blasts in a cone. Replaces Fury of the Eagle.
  - Flamefang Pitch (1:00): Ground-targeted firebomb AoE.
  - Moonlight Chakram (Sentinel): Replaces Takedown button after use. Deals heavy AoE damage and can generate Wildfire Bomb charges.
  - Aspect of the Eagle (2min): Allows melee abilities to be used from range.
  - Aspect of the Turtle (2min): Major defensive immunity/DR.
  - Exhilaration (1min): 30% Max HP heal.
  - Roar of Sacrifice (1min): External defensive, 15% DR for 10s, pet takes 50% of the damage.

concepts: |
  - Always Be Tipping: Use Kill Command every third ability to ensure non-Kill Command abilities are buffed by Tip of the Spear.
  - Sentinel's Mark: Sentinel gameplay revolves around 'fishing' for 20% procs by spending Tip of the Spear on other abilities before using Wildfire Bomb.
  - Wyvernmaxxing: Pack Leader must track Wyvern spawns and ensure two Wildfire Bombs are used during the window to extend the damage buff by 10s.
  - Takedown Window: Takedown only lasts 10 seconds; you must pack your highest damage abilities (Boomstick, Chakram, Stampede) into this short window.
  - Wildfire Bomb Targeting: The bomb explodes in a cone behind the target relative to your position. Character angling is essential for AoE.
  - Stampede (Pack Leader): Triggered by the first Kill Command in Takedown. It is a 40-yard line that deals heavy damage; positioning is critical.
  - Raptor Swipe: Apex talent that randomly upgrades Raptor Strike to an AoE version with increased damage.
  - Mastery: Spirit Bond: Increases damage dealt by you and your pet and increases Focus regeneration.
  - Range Flexibility: Survival can perform much of its rotation from range using Wildfire Bomb, Boomstick, and Aspect of the Eagle.

commonMistakes:
  - 'Overcapping Tip of the Spear stacks (max 3) by casting Kill Command too frequently'
  - 'Casting Wildfire Bomb without a Tip of the Spear stack'
  - 'Sitting on 2 charges of Wildfire Bomb and wasting cooldown recovery'
  - 'Failing to use two Wildfire Bombs during a Pack Leader Wyvern spawn to extend the buff'
  - 'Poor positioning of Boomstick or Stampede, missing targets in the cone or line'
  - 'Using Takedown when already at 3 stacks of Tip of the Spear'
  - 'Ignoring Hunter’s Mark on the primary target'

