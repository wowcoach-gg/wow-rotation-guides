resourceManagement:
  primaryResource: Focus
  secondaryResource: Tip of the Spear
  resourceNotes: 'Focus is the primary resource, with a maximum of 125 for Sentinel. It is generated primarily through Kill Command and spent on abilities like Raptor Strike and Wildfire Bomb (10 Focus cost). Tip of the Spear is a stack-based buff (max 3) generated by Kill Command (2 stacks per cast). You must spend Tip of the Spear on non-Kill Command abilities to buff their damage. Overcapping Focus or Tip of the Spear stacks is a significant DPS loss.'

