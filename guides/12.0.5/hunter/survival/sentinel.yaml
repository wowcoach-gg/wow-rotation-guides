specId: 255
className: Hunter
specName: Survival
role: DPS
heroTalent: Sentinel
patch: "12.0.5"
guideVersion: 3
resourceManagement:
  primaryResource: Focus
  secondaryResource: Tip of the Spear
  resourceNotes: 'Focus is generated by Kill Command and spent on Wildfire Bomb (10 Focus) and Raptor Strike. Sentinel increases
    maximum Focus to 125. Tip of the Spear is generated by Kill Command and spent to buff the damage of other abilities. Sentinel
    gameplay revolves around "fishing" for Sentinel''s Mark procs by spending Tip of the Spear stacks.'
maintenanceBuffs:
- spellId: 0
  spellName: 'Hunter''s Mark'
  targetUptimePct: 100
  importance: high
  coachingTip: 'Ensure Hunter''s Mark is active on the target for a universal 3% damage increase.'
- spellId: 0
  spellName: Tip of the Spear
  targetUptimePct: 95
  importance: critical
  coachingTip: 'Follow the "Always Be Tipping" rule: every non-Kill Command cast should be affected by a Tip of the Spear
    stack.'
- spellId: 0
  spellName: 'Sentinel''s Mark'
  targetUptimePct: 0
  importance: high
  coachingTip: 'This proc reduces Wildfire Bomb cooldown and increases its direct damage by 130%. Fish for these procs by
    spending Tip of the Spear on other abilities.'
