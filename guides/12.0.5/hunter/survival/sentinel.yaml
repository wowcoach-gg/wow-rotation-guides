- Flanking Strike (removed in 12.0)
- Fury of the Eagle (removed in 12.0)
- Spearhead (removed in 12.0)
- Coordinated Assault (removed in 12.0)
- Alpha Predator (removed in 12.0)
- Bombardier (removed in 12.0)
rotation:
  singleTarget: |
    1. Cast Kill Command to generate Tip of the Spear stacks if you run out. It will generate 21.
    2. Cast Boomstick as a high priority if Takedown isn't ready, and you have no Sentinel's Mark proc.
    3. Cast Wildfire Bomb with Sentinel's Mark, or if you have less than 4 seconds remaining until it reaches 2 charges.
    4. Activate Takedown. Try to do so with no Tip stacks, as it will generate 3, but consume one of those 3 on its own.
    5. Cast Boomstick. It is a wide, long cone in front of you, so try to aim it.
    6. Cast Moonlight Chakram.
    7. Cast Flamefang Pitch on cooldown.
    8. Cast Raptor Strike.
    9. Cast Kill Command as a filler.
  aoe: |
    1. Cast Kill Command to generate Tip of the Spear stacks if you run out. It will generate 21.
    2. Cast Boomstick as a high priority if Takedown isn't ready, and you have no Sentinel's Mark proc.
    3. Cast Wildfire Bomb with Sentinel's Mark, or if you have less than 4 seconds remaining until it reaches 2 charges.
    4. Activate Takedown. Get yourself to 1 stack of Tip of the Spear only before triggering it to avoid overcapping.
    5. Cast Boomstick. Aim the cone to hit as many targets as possible.
    6. Cast Moonlight Chakram.
    7. Cast Raptor Strike.
    8. Cast Kill Command as a filler.
  opener: |
    1. Harpoon
    2. Kill Command
    3. Wildfire Bomb
    4. Wildfire Bomb
    5. Kill Command
    6. Wildfire Bomb
    7. Kill Command
    8. Takedown
    9. Wildfire Bomb
    10. Boomstick
    11. Kill Command
    12. Moonlight Chakram
    13. Kill Command
    14. Wildfire Bomb
    15. Takedown
    16. Wildfire Bomb
    17. Boomstick
    18. Kill Command
    19. Moonlight Chakram
cooldowns:
- name: Takedown
  cooldown: '1:30'
  description: 'Primary offensive cooldown. Deals heavy damage, charges to target, grants 50 Focus, and increases damage by
    20% for 10s.'
- name: Moonlight Chakram
  cooldown: Sentinel
  description: 'Replaces the Takedown button after activation. Deals heavy AoE damage and can trigger Sentinel''s Mark.'
- name: Boomstick
  cooldown: '1:00'
  description: Channeled shotgun blast. Deals high damage in a cone and has a longer range than pure melee.
- name: Flamefang Pitch
  cooldown: '1:00'
  description: 'Ground-targeted firebomb. Deals AoE damage to targets within the area.'
- name: Aspect of the Eagle
  cooldown: See description
  description: Allows melee abilities to be used from range for a duration.
concepts:
- 'Always Be Tipping: Generate and spend Tip of the Spear stacks constantly. Use Kill Command roughly every third ability.'
- 'Sentinel''s Mark Fishing: Spending Tip of the Spear has a 20% chance to proc Sentinel''s Mark. Use Raptor
  Strike to fish for this proc before using Wildfire Bomb.'
- 'Sentinel''s Mark Benefits: Reduces Wildfire Bomb cooldown by 4s (ST) or 6s (AoE) and increases its direct damage by 130%.'
- 'Bomb Cutoff: If Wildfire Bomb is within ~5.2s (ST) or ~7s (AoE) of reaching 2 charges, stop fishing and use the Bomb immediately
  to avoid wasting cooldown time.'
- 'Takedown Window: Takedown only lasts 10 seconds. Pack your heaviest damage-dealers (Boomstick, Moonlight Chakram) into
  this short window.'
- 'Strike as One: A powerful passive that rewards consistent Tip of the Spear usage.'
- 'Boomstick Aiming: Boomstick is a cone originating from your character; positioning is essential to hit all targets.'
- 'Wildfire Bomb Targeting: The bomb explodes in a cone behind the target relative to your position. Angle
  yourself to hit secondary targets.'
- 'Mastery (Spirit Bond): Increases damage dealt by you and your pet and provides health regeneration.'
- 'Survivability: Survival has 6% baseline DR and strong active defensives but weak passive mitigation.'
commonMistakes:
- Overcapping Tip of the Spear stacks (maximum is 3).
- Sitting on 2 charges of Wildfire Bomb, wasting cooldown recovery.
- Using Takedown while already having Tip of the Spear stacks in Single Target.
- Failing to aim Boomstick or Wildfire Bomb cones effectively in AoE.
- 'Not fishing for Sentinel''s Mark procs when Wildfire Bomb has charges available.'
- Using Moonlight Chakram before dumping Wildfire Bomb charges if running Stalk and Strike.
patchChanges:
  12.0.1: Small rotational updates and tuning for Sentinel.
  '12.0': Major spec rework. Added Takedown, Boomstick, and Flamefang Pitch. Sentinel Hero Talent tree introduced. Wildfire
    Bomb now costs 10 Focus. Raptor Strike upgraded to Raptor Swipe via Apex node.
