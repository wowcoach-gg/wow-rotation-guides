specId: 255
className: Hunter
specName: Survival
role: DPS
heroTalent: Pack Leader
patch: 12.0.1
guideVersion: 3
resourceManagement:
  primaryResource: Focus
  secondaryResource: Tip of the Spear
  resourceNotes: 'Focus is generated by Kill Command and spent on Raptor Strike and Wildfire Bomb. Tip of the Spear is a stacking
    buff (up to 3) generated by Kill Command that increases the damage of your next non-Kill Command ability. Pack Leader
    gameplay revolves around weaving Kill Commands to maintain Tip of the Spear and triggering Howl of the Pack Leader procs.'
maintenanceBuffs:
- spellId: 0
  spellName: 'Hunter''s Mark'
  targetUptimePct: 100
  importance: high
  coachingTip: 'Ensure Hunter’s Mark is active on the target for a universal 3% damage increase.'
- spellId: 0
  spellName: Tip of the Spear
  targetUptimePct: 95
  importance: critical
  coachingTip: 'The golden rule is that every non-Kill Command cast should be affected by a Tip of the Spear stack.'
- spellId: 0
  spellName: Fury of the Wyvern
  targetUptimePct: 0
  importance: high
  coachingTip: When a Wyvern is summoned, use two Wildfire Bombs to extend the damage buff by up to 10 seconds.
rotation:
  singleTarget: |
    1. Cast Kill Command to generate Tip of the Spear stacks if you run out.
    2. Cast Kill Command if you have a Howl of the Pack Leader proc (it glows), even with 1 Tip stack.
    3. Activate Takedown. Try to do so with no Tip stacks, as it will generate 3 (consuming one on its own).
    4. Cast Flamefang Pitch on cooldown.
    5. Cast Boomstick.
    6. Cast Wildfire Bomb only to extend Fury of the Wyvern (aim for two Bombs per Wyvern spawn).
    7. Cast Raptor Strike. If it is upgraded to Raptor Swipe, it must be Tipped.
    8. Cast Takedown regardless of conditions if you have nothing else to do.
  aoe: |
    1. Cast Kill Command to generate Tip of the Spear stacks if you run out.
    2. Cast Kill Command if you have a Howl of the Pack Leader proc (it glows).
    3. Activate Takedown. Cast Kill Command to get to 3 Tip stacks before activating it.
    4. Cast Boomstick.
    5. Cast Wildfire Bomb if you have more than 1.5 charges.
    6. Cast Flamefang Pitch on cooldown.
    7. Cast Raptor Strike. If it is upgraded to Raptor Swipe, it must be Tipped.
    8. Cast Kill Command as a filler.
  opener: |
    1. Hunter's Mark (Pre-pull)
    2. Harpoon
    3. Kill Command
    4. Takedown
    5. Kill Command
    6. Boomstick
    7. Raptor Strike
    8. Raptor Strike
    9. Kill Command
    10. Wildfire Bomb
    11. Wildfire Bomb
cooldowns:
- name: Takedown
  cooldown: '1:30 baseline'
  description: 'Primary offensive cooldown. Deals heavy damage, grants 50 Focus, and increases damage by 20% for 10s. For
    Pack Leader, it procs Howl of the Pack Leader and triggers Stampede on the first Kill Command used during its window.'
- name: Boomstick
  cooldown: 1min
  description: Channeled shotgun blast. High priority rotational ability that deals heavy damage in a cone.
- name: Flamefang Pitch
  cooldown: 1min
  description: 'Ground-targeted firebomb. Use on cooldown for AoE and single-target damage.'
- name: Aspect of the Eagle
  cooldown: See description
  description: Increases the range of your melee attacks, allowing you to play from range for a duration.
- name: Exhilaration
  cooldown: 1min
  description: 'Major self-heal.'
- name: Aspect of the Turtle
  cooldown: 2min
  description: Major defensive immunity/damage reduction.
concepts:
- 'Always Be Tipping: Weave Kill Commands so that every Raptor Strike, Boomstick, and Wildfire Bomb consumes a Tip of the
  Spear stack.'
- 'Wyvernmaxxing: Pack Leader summons a Wyvern that provides a damage buff. You must cast two Wildfire Bombs during this window
  to extend the buff by the maximum 10 seconds.'
- 'Howl of the Pack Leader: This proc causes your next Kill Command to summon a Beast. Takedown guarantees this proc.'
- 'Stampede Positioning: Your first Kill Command during Takedown launches a Stampede in a 40-yard line from your position.
  You must aim this line to cover as many targets as possible.'
- 'Raptor Swipe: This Apex talent randomly upgrades Raptor Strike into an AoE version that deals increased damage. It is essential
  to ensure these procs are "Tipped" with Tip of the Spear.'
- 'Strike as One: A passive that incentivizes high Tip of the Spear usage for maximum throughput.'
- 'Wildfire Bomb Targeting: The bomb explodes in a cone BEHIND the target relative to your position. Angle
  yourself so the cone hits secondary targets.'
- 'Mastery (Spirit Bond): Increases damage dealt by you and your pet and provides health regeneration.'
- 'Survivability: Survival has 6% baseline DR and strong active defensives but weak passive mitigation.'
removedMechanics:
- Explosive Shot
- Kill Shot
- Butchery
- Flanking Strike
- Fury of the Eagle
- Spearhead
- Coordinated Assault
- Alpha Predator
- Bombardier
commonMistakes:
- Overcapping Tip of the Spear stacks (more than 3) by casting Kill Command unnecessarily.
- Failing to extend the Fury of the Wyvern buff by not having Wildfire Bomb charges ready.
- Misaligning the Stampede line during Takedown, missing targets.
- Casting Raptor Swipe without a Tip of the Spear stack.
- 'Using Wildfire Bomb as a general filler in single-target instead of saving it for Wyvern extensions.'
patchChanges:
  12.0.1: 'Pack Leader: The Bear beast damage reduced by 40% to balance with other beasts. Takedown: New primary cooldown
    replacing Coordinated Assault and Flanking Strike. Boomstick: Replaces Fury of the Eagle as a channeled shotgun ability.
    Wildfire Bomb: Now costs 10 Focus. Strike as One: New passive added to incentivize Tip of the Spear usage.'
