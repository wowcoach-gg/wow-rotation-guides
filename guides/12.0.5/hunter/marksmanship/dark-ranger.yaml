heroTalent: Dark Ranger
patch: "12.0.5"
guideVersion: 3
resourceManagement:
  primaryResource: Focus
  secondaryResource: Deathblow Procs
  resourceNotes: 'Focus is generated by Steady Shot and spent on Aimed Shot, Arcane Shot, and Multi-Shot. Dark Ranger gameplay
    revolves around Deathblow procs, which allow the use of Black Arrow. Rapid Fire now guarantees a Deathblow proc.'
