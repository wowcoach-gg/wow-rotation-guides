rotation:
  singleTarget: |
    1. Cast Black Arrow whenever available (Deathblow proc).
    2. Cast Rapid Fire during Trueshot.
    3. Cast Arcane Shot to consume Precise Shots stacks. Follow every Aimed Shot or Rapid Fire with Arcane Shot.
    4. Cast Rapid Fire if the Bulletstorm buff would expire before you could finish an Aimed Shot cast.
    5. Activate Trueshot. Use the instant Black Arrow proc immediately.
    6. Cast Volley on cooldown to activate Double Tap.
    7. Cast Aimed Shot whenever possible.
    8. Cast Wailing Arrow (replaces Trueshot button). Treat as filler and always follow with Black Arrow.
    9. Cast Rapid Fire on cooldown.
    10. Cast Steady Shot as filler to generate Focus and reduce Aimed Shot cooldown.
  aoe: |
    1. Cast Black Arrow whenever available.
    2. Cast Rapid Fire during Trueshot.
    3. Cast Multi-Shot to consume Precise Shots stacks and activate Trick Shots. Follow every Aimed Shot or Rapid Fire with Multi-Shot.
    4. Cast Rapid Fire if the Bulletstorm buff would expire before you could finish an Aimed Shot cast.
    5. Activate Trueshot. Use the instant Black Arrow proc immediately.
    6. Cast Volley on cooldown to activate Double Tap and trigger Shrapnel Shot.
    7. Cast Aimed Shot whenever possible (ensure Trick Shots is active).
    8. Cast Wailing Arrow (replaces Trueshot button). Follow with Black Arrow.
    9. Cast Rapid Fire on cooldown.
    10. Cast Steady Shot as filler.
  opener: |
    1. Ensure Hunter's Mark is active.
    2. Pre-cast Aimed Shot (2.5 seconds before pull).
    3. Cast Black Arrow.
    4. Cast Arcane Shot.
    5. Cast Rapid Fire.
    6. Cast Black Arrow.
    7. Cast Arcane Shot.
    8. Cast Volley.
    9. Activate Trueshot.
    10. Cast Black Arrow (instant proc).
    11. Cast Aimed Shot.
    12. Cast Volley.
    13. Cast Arcane Shot.
    14. Cast Aimed Shot.
    15. Cast Arcane Shot.
    16. Cast Wailing Arrow.
    17. Cast Black Arrow.
    18. Continue normal rotation.
