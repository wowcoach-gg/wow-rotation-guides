concepts:
- 'Black Arrow Management: Black Arrow replaces Kill Shot for Dark Rangers. It is highly proc-dependent via Deathblow. Rapid
  Fire guarantees a proc, so always plan to Black Arrow after Rapid Fire.'
- 'Trueshot Sequence: The Dark Ranger opener is busy. The priority is Trueshot > Black Arrow > Wailing Arrow > Black Arrow
  to avoid overwriting procs.'
- 'Precise Shots Weaving: Always follow Aimed Shot and Rapid Fire with a spender (Arcane Shot or Multi-Shot).
  This engine buffs your next Aimed Shot via Spotter''s Mark.'
- 'Double Tap: Triggered by Volley and Trueshot. Never cast Volley and Trueshot back-to-back; always weave an Aimed Shot between
  them to avoid wasting the buff.'
- 'Planted Gameplay: With Streamline removed, Aimed Shot has a long 2.5s cast. You must plan movement carefully, though Aimed
  Shot''s two charges allow for some flexibility.'
- 'Smoke Screen: This talent makes Exhilaration a primary defensive tool. Use it proactively for heavy damage phases.'
- 'Trick Shots: In AoE, Multi-Shot must be used to allow Aimed Shot and Rapid Fire to ricochet to nearby targets.'
- 'Hunter''s Mark: Mandatory 3% damage debuff. Must be maintained on the primary target at all times.'
- 'Focus Management: Use Steady Shot to fill gaps. It generates Focus and reduces Aimed Shot cooldown.'
- 'Wailing Arrow Utility: Beyond damage, use Wailing Arrow as a coordinated AoE interrupt/silence during Trueshot windows.'
commonMistakes:
- Overwriting Black Arrow procs by casting Trueshot or Wailing Arrow while a proc is already active
- 'Casting Trueshot and Volley back-to-back, wasting the Double Tap activator'
- Failing to maintain Hunter’s Mark on the primary target
- Capping Aimed Shot charges instead of spending them
- 'Not weaving Multi-Shot in AoE, losing the Trick Shots ricochet effect'
- Neglecting Steady Shot filler, leading to Focus starvation and slower Aimed Shot recovery
patchChanges:
  12.0.1: 'Rapid Fire now guaranteed to grant Deathblow (Black Arrow proc). Trueshot button turns into Wailing Arrow after
    activation. Streamline removed; Aimed Shot cast time increased to 2.5s (1.5s in Trueshot). Explosive Shot and related
    talents removed. Shrapnel Shot now triggers off Volley. Hunter''s Mark is now a universal 3% damage boost. Exhilaration
    cooldown flattened to 1 minute.'
