- spellId: 0
  spellName: 'Hunter''s Mark'
  targetUptimePct: 100
  importance: critical
  coachingTip: 'Hunter’s Mark is a universal 3% damage increase. Ensure it is active on the highest-health target at all times.'
- spellId: 0
  spellName: Precise Shots
  targetUptimePct: 0
  importance: high
  coachingTip: 'Generated by Aimed Shot and Rapid Fire. Use Arcane Shot (ST) or Multi-Shot (AoE) to consume these stacks for
    increased damage and Focus efficiency.'
- spellId: 0
  spellName: Trick Shots
  targetUptimePct: 95
  importance: high
  coachingTip: 'In AoE (2+ targets), always cast Multi-Shot before Aimed Shot or Rapid Fire to ensure they ricochet.'
