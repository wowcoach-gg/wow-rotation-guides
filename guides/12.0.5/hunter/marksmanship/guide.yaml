  resourceNotes: 'Focus is generated by Steady Shot and spent on Arcane Shot (Single Target) or Multi-Shot (AoE). Aimed Shot and Rapid Fire are your primary hard-hitting abilities with independent cooldowns. Aimed Shot (and Rapid Fire with the No Scope talent) generates Precise Shots stacks, which significantly buff the damage and reduce the cost of your next Arcane or Multi-Shots. Overcapping Focus or Precise Shots stacks should be avoided; the goal is to weave spenders between your major shots to ensure no procs are wasted.'

