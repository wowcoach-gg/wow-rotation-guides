rotation:
  singleTarget: |
    [Sentinel] Single Target Priority:
    1. Cast Aimed Shot if it is about to reach 2 charges (avoid overcapping charges and losing cooldown reduction).
    2. Cast Volley on cooldown. Never cast Volley and Trueshot back-to-back (wastes Double Tap).
    3. Activate Trueshot. Ideally right before an Aimed Shot and shortly after a Rapid Fire to have a fresh Bulletstorm. Never back-to-back with Volley.
    4. Spend Precise Shots stacks generated by Aimed Shot and Rapid Fire. PS spender priority: Kill Shot > Arcane Shot.
    5. Cast Moonlight Chakram if Trueshot has less than 3 seconds remaining (guarantees a Chakram inside the window).
    6. Cast Aimed Shot whenever possible.
    7. Cast Moonlight Chakram as a filler — never let it lapse.
    8. Cast Rapid Fire.
    9. Cast Steady Shot as a filler (generates Focus + Aimed Shot cooldown reduction).

    [Dark Ranger] Single Target Priority:
    1. Cast Black Arrow as your primary Precise Shots spender. Always cast Black Arrow immediately after every Aimed Shot and Rapid Fire, provided a Black Arrow proc is available.
    2. Cast Aimed Shot if it is about to reach 2 charges.
    3. During Trueshot, cast Aimed Shot if you have a Black Arrow proc available but no Precise Shots to spend it with.
    4. Activate Trueshot. Ideally right before an Aimed Shot, shortly after a Rapid Fire. Never cast Trueshot and Volley back-to-back.
    5. Cast Rapid Fire if the enemy is above 80% or below 20% health (Unload windows).
    6. Cast Wailing Arrow if you do not have a Black Arrow proc available.
    7. Cast Arcane Shot as a backup Precise Shots spender if Black Arrow is not available.
    8. Cast Aimed Shot.
    9. Cast Rapid Fire as a filler.
    10. Cast Steady Shot as a filler.
  aoe: |
    [Sentinel] AoE Priority:
    1. Cast Multi-Shot to spend Precise Shots stacks. Always cast Multi-Shot immediately after every Aimed Shot and Rapid Fire. Also use it to activate Trick Shots if it is down, regardless of other conditions.
    2. Cast Rapid Fire if Bulletstorm is down, or if it would expire before your next Aimed Shot.
    3. Activate Trueshot. Ideally right before an Aimed Shot, shortly after a Rapid Fire. Never back-to-back with Volley.
    4. Cast Volley on cooldown. Never back-to-back with Trueshot.
    5. Cast Explosive Shot outside of Trueshot (and without a Lock and Load proc already active) if Aimed Shot has 1 or fewer charges available — gives you a Lock and Load via Shrapnel Shot.
    6. Cast Aimed Shot whenever possible.
    7. Cast Moonlight Chakram when you have no Aimed Shots remaining, or if Trueshot is about to run out.
    8. Cast Rapid Fire.
    9. Cast Explosive Shot as a filler.
    10. Cast Steady Shot as a filler.

    [Dark Ranger] AoE Priority:
    1. Cast Multi-Shot to activate Trick Shots if it is down.
    2. Cast Aimed Shot if it is at or about to reach 2 charges, provided Trick Shots is up.
    3. Spend Precise Shots stacks generated by Aimed Shot and Rapid Fire. PS spender priority: Black Arrow > Multi-Shot.
    4. Cast Rapid Fire on cooldown, provided Trick Shots is up.
    5. Activate Trueshot. Ideally right before an Aimed Shot, shortly after a Rapid Fire. Never back-to-back with Volley.
    6. Cast Wailing Arrow if you have no Black Arrow proc.
    7. Cast Volley on cooldown. Never back-to-back with Trueshot.
    8. Cast Aimed Shot.
    9. Cast Steady Shot as a filler.
  opener: |
    [Sentinel] Single-Target Opener:
    1. Pre-cast Aimed Shot ~2.5s before combat begins
    2. Arcane Shot
    3. Algeth'ar Puzzle Box (on-use trinket)
    4. Rapid Fire
    5. Arcane Shot
    6. Trueshot
    7. Aimed Shot
    8. Arcane Shot
    9. Volley
    10. Continue the Aimed Shot → Arcane Shot loop until you run out of Aimed Shots
    11. Cast Moonlight Chakram when out of Aimed Shots, or when Trueshot has less than 1 GCD remaining

    [Dark Ranger] Single-Target Opener:
    Note: Dark Ranger opener is sensitive to Black Arrow procs — consume them promptly with Precise Shots. This opener assumes no RNG procs.
    1. Pre-cast Algeth'ar Puzzle Box ~4.5s before combat begins
    2. Pre-cast Aimed Shot ~2.5s before combat begins
    3. Black Arrow
    4. Trueshot
    5. Aimed Shot
    6. Black Arrow
    7. Rapid Fire
    8. Black Arrow
    9. Aimed Shot
    10. Arcane Shot
    11. Wailing Arrow (if no Black Arrow proc available)
    12. Aimed Shot
    13. Continue normal priority

    [Sentinel] AoE Opener:
    1. Multi-Shot
    2. Algeth'ar Puzzle Box (or pre-cast if practical)
    3. Rapid Fire
    4. Multi-Shot
    5. Trueshot
    6. Aimed Shot
    7. Multi-Shot
    8. Volley
    9. Continue the Aimed Shot → Multi-Shot loop until you run out of Aimed Shots
    10. Cast Moonlight Chakram when out of Aimed Shots, or when Trueshot has less than 1 GCD remaining

    [Dark Ranger] AoE Opener:
    1. Black Arrow
    2. Algeth'ar Puzzle Box
    3. Rapid Fire
    4. Black Arrow
    5. Trueshot
    6. Aimed Shot
    7. Black Arrow
    8. Volley
    9. Wailing Arrow
    10. Aimed Shot
    11. Black Arrow
    12. Continue normal priority, spending Black Arrow procs with Precise Shots

cooldowns: |
  - Trueshot (1.5 - 2 min): Main offensive cooldown. Increases Crit chance/damage and reduces Aimed Shot/Rapid Fire cooldowns. Use right before an Aimed Shot.
  - Volley (30 - 45 sec): AoE damage and Double Tap activator. Use on cooldown, but never back-to-back with Trueshot.
  - Exhilaration (1 min): Major self-heal.
  - Aspect of the Turtle (2 min): Immunity/50% damage reduction. Cannot attack while active.
  - Aspect of the Cheetah (3 min): Major movement speed burst.
  - Roar of Sacrifice (1 min): External defensive for yourself or an ally (15% DR).
  - Survival of the Fittest: Major damage reduction "wall".
  - Intimidation (40 sec - 1 min): Single target or AoE stun (depending on talents).

concepts: |
  - Precise Shots Weaving: The core engine of the spec. Aimed Shot and Rapid Fire generate stacks that must be spent on Arcane/Multi-Shot to buff Aimed Shot via Spotter's Mark/Sentinel's Mark.
  - Trick Shots: Multi-Shot makes your next Aimed Shot or Rapid Fire ricochet to up to 7 additional targets. Essential for AoE.
  - Always Be Casting: Never wait for a cooldown. Use Steady Shot to fill every gap for Focus and Aimed Shot CDR.
  - Double Tap: Triggered by Trueshot and Volley. It does not stack, so you must weave an Aimed Shot or Rapid Fire between Trueshot and Volley casts.
  - Take Aim (Apex Talent): Rapid Fire reduces Aimed Shot's cooldown by 5 seconds over its channel. Aimed Shot always crits, with damage increased by your crit chance.
  - Sentinel's Mark: Generated by spending Precise Shots. Massively buffs Aimed Shot damage.
  - Black Arrow (Dark Ranger): Replaces Kill Shot. Procs frequently and is guaranteed after Rapid Fire.
  - Wailing Arrow: Replaces the Trueshot button after activation. Provides an AoE interrupt/silence and triggers Black Arrow.
  - Focus Management: Aimed Shot and Rapid Fire are priority; use Steady Shot to ensure you have enough Focus to cast them and their associated spenders.
  - Movement: While Aimed Shot has a long cast time, having two charges allows you to delay casts briefly for movement without losing DPS.

commonMistakes:
  - 'Casting Trueshot and Volley back-to-back, which wastes the Double Tap proc'
  - 'Overcapping Precise Shots stacks by casting Aimed Shot or Rapid Fire while stacks are still active'
  - 'Failing to weave Multi-Shot in AoE, resulting in Aimed Shot or Rapid Fire not cleaving via Trick Shots'
  - 'Letting Aimed Shot sit at 2 charges (capping), wasting potential cooldown reduction'
  - 'Not using Steady Shot as a filler, leading to empty globals and lost Focus/CDR'
  - 'Using Wailing Arrow without immediately following it with the Black Arrow proc it generates'
  - 'Forgetting to maintain Hunter’s Mark on the primary target'

patchChanges: |
  12.0.5:
  - Explosive Shot re-added (fires at target, detonates after 3s for Fire damage to enemies within 8 yards; reduced damage beyond 5 targets).
  - Shrapnel Shot re-added (casting Explosive Shot has 100% chance to grant Lock and Load).
  - Precision Detonation re-added (Aimed Shot on an Explosive Shot target instantly detonates it for +20% damage).
  - Precise Shots reworked (no longer reduces GCD; no longer provides auto-shot bonuses; damage bonus 50%, was 100%; now also affects Kill Shot and Black Arrow at 100% effectiveness).
  - Windrunner Quiver reworked (consuming Precise Shots has 30% chance to grant Precise Shots; +15% damage bonus).
  - Unmatched Precision nerfed to 10%/20% (was 20%/40%).
  - Small Game Hunter reworked (now +15% Explosive Shot, +25% Volley).
  - Eagle's Accuracy reworked (now +5%/+10% Aimed Shot, +10%/+20% Rapid Fire).
  - Steady Shot damage +100%, Arcane Shot +33%, Multi-Shot +33%.
  - Removed: Bullet Hell, In the Rhythm, Lethality, Target Acquisition.
  - Sentinel: Can't Miss Won't Miss Precise Shots damage nerfed from 40% to 10%.
  - Aspect of the Hydra effectiveness reduced to 35% (was 65%, April 17 hotfix).
  12.0.1:
  - Sentinel: Sentinel's Mark strengthened; Don't Look Back provides 10% absorb shield; Max Focus increased to 125.
  - Dark Ranger: Rapid Fire now guarantees a Deathblow proc; Trueshot button becomes Wailing Arrow.
  - General: Aimed Shot damage buffed to compensate for Streamline removal.
  12.0:
  - Streamline and Improved Streamline removed (Aimed Shot cast time increased to 2.5s).
  - Explosive Shot and all related talents removed (note: re-added in 12.0.5).
  - Exhilaration cooldown set to 1 minute flat.
  - Aspect of the Turtle cooldown reduced to 2 minutes; damage reduction increased to 50%.
  - Hunter's Mark now provides a 3% damage boost.
  - Kill Shot moved to Marksmanship-only tree.