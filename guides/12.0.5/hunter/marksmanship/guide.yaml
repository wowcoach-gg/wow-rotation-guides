rotation:
  singleTarget: |
    [Sentinel] Single Target Priority:
    1. Cast Arcane Shot to spend Precise Shots stacks generated by Aimed Shot and Rapid Fire. Rule of thumb: follow every Aimed Shot and Rapid Fire with Arcane Shot.
    2. Cast Rapid Fire if you do not have the Bulletstorm buff active.
    3. Activate Trueshot. Ideally right before an Aimed Shot and shortly after a Rapid Fire to have a fresh Bulletstorm. Never cast Trueshot and Volley back-to-back.
    4. Cast Volley on cooldown to activate Double Tap. Never cast Volley right before or after Trueshot.
    5. Cast Moonlight Chakram when you have fewer than 1.2 charges of Aimed Shot remaining, or if you have less than 35 Focus.
    6. Cast Aimed Shot whenever possible.
    7. Cast Rapid Fire whenever possible.
    8. Cast Steady Shot as a filler to generate Focus and Aimed Shot cooldown reduction.

    [Dark Ranger] Single Target Priority:
    1. Cast Black Arrow whenever available. Anticipate casting it immediately after every Rapid Fire (guaranteed proc).
    2. Cast Rapid Fire during Trueshot.
    3. Cast Arcane Shot to consume Precise Shots stacks. Follow every Aimed Shot or Rapid Fire with Arcane Shot.
    4. Cast Rapid Fire if the Bulletstorm buff would expire before you could finish an Aimed Shot cast.
    5. Activate Trueshot. Use the instant Black Arrow proc immediately. Avoid casting Trueshot and Volley back-to-back.
    6. Cast Volley on cooldown to activate Double Tap.
    7. Cast Aimed Shot whenever possible.
    8. Cast Wailing Arrow (replaces Trueshot button). Treat as filler and always follow with Black Arrow.
    9. Cast Rapid Fire on cooldown.
    10. Cast Steady Shot as a filler.
  aoe: |
    [Sentinel] AoE Priority:
    1. Cast Multi-Shot to spend Precise Shots stacks and activate Trick Shots. Follow every Aimed Shot and Rapid Fire with Multi-Shot.
    2. Cast Arcane Shot to spend Precise Shots stacks if Trick Shots is already active.
    3. Cast Rapid Fire if you do not have the Bulletstorm buff active.
    4. Activate Trueshot (ideally after Rapid Fire for Bulletstorm).
    5. Cast Volley on cooldown.
    6. Cast Moonlight Chakram when below 1.2 Aimed Shot charges or 35 Focus.
    7. Cast Aimed Shot whenever possible.
    8. Cast Rapid Fire whenever possible.
    9. Cast Steady Shot as a filler.

    [Dark Ranger] AoE Priority:
    1. Cast Black Arrow whenever available.
    2. Cast Rapid Fire during Trueshot.
    3. Cast Multi-Shot to consume Precise Shots stacks and maintain Trick Shots.
    4. Cast Rapid Fire if Bulletstorm would expire before an Aimed Shot finishes.
    5. Activate Trueshot and use the instant Black Arrow proc.
    6. Cast Volley on cooldown.
    7. Cast Aimed Shot whenever possible.
    8. Cast Wailing Arrow (filler, follow with Black Arrow).
    9. Cast Rapid Fire on cooldown.
    10. Cast Steady Shot as a filler.
  opener: |
    [Sentinel] Single Target Opener:
    1. Pre-cast Aimed Shot (2.5s before pull)
    2. Arcane Shot
    3. Rapid Fire
    4. Arcane Shot
    5. Volley
    6. Trueshot
    7. Aimed Shot
    8. Volley
    9. Arcane Shot
    10. Aimed Shot
    11. Arcane Shot
    12. Normal rotation (Moonlight Chakram when < 35 Focus)

    [Dark Ranger] Single Target Opener:
