    2. Black Arrow
    3. Arcane Shot
    4. Rapid Fire
    5. Black Arrow
    6. Arcane Shot
    7. Volley
    8. Trueshot
    9. Black Arrow
    10. Aimed Shot
    11. Volley
    12. Arcane Shot
    13. Aimed Shot
    14. Arcane Shot
    15. Wailing Arrow
    16. Black Arrow

    [Sentinel] AoE Opener:
    1. Multi-Shot
    2. Rapid Fire
