rotation:
  singleTarget: |
    1. Cast Arcane Shot to spend Precise Shots stacks generated by Aimed Shot and Rapid Fire.
    2. Cast Rapid Fire if you do not have the Bulletstorm buff active.
    3. Activate Trueshot (ideally right after a Rapid Fire and before an Aimed Shot).
    4. Cast Volley on cooldown to activate Double Tap (never cast back-to-back with Trueshot).
    5. Cast Moonlight Chakram when you have fewer than 1.2 charges of Aimed Shot or less than 35 Focus.
    6. Cast Aimed Shot whenever possible.
    7. Cast Rapid Fire whenever possible.
    8. Cast Steady Shot as a filler to generate Focus and reduce Aimed Shot cooldown.
  aoe: |
    1. Cast Multi-Shot to spend Precise Shots stacks and activate Trick Shots (2+ targets).
    2. Cast Arcane Shot to spend Precise Shots stacks if Trick Shots is already active.
    3. Cast Rapid Fire if you do not have the Bulletstorm buff active.
    4. Activate Trueshot.
    5. Cast Volley on cooldown to activate Double Tap and deal AoE damage.
    6. Cast Moonlight Chakram when you have fewer than 1.2 charges of Aimed Shot or less than 35 Focus.
    7. Cast Aimed Shot whenever possible (ensure Trick Shots is active).
    8. Cast Rapid Fire whenever possible (ensure Trick Shots is active).
    9. Cast Steady Shot as a filler.
  opener: |
    1. Ensure Hunter's Mark is active on the target.
    2. Pre-cast Aimed Shot (2.5 seconds before combat).
    3. Cast Arcane Shot.
    4. Cast Rapid Fire.
    5. Cast Arcane Shot.
    6. Cast Volley.
    7. Activate Trueshot.
    8. Cast Aimed Shot.
    9. Cast Volley.
    10. Cast Arcane Shot.
    11. Cast Aimed Shot.
    12. Cast Arcane Shot.
    13. Continue normal rotation, using Moonlight Chakram when Focus < 35 or Aimed Shot charges < 1.2.
