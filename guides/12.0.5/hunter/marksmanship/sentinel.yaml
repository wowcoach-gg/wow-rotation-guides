concepts:
- 'Sentinel''s Mark: The core of the Sentinel hero tree. Applied by spending Precise Shots, it significantly increases the
  damage of your next Aimed Shot.'
- 'Precise Shots Weaving: Always follow up Aimed Shot and Rapid Fire with Arcane Shot (ST) or Multi-Shot (AoE) to spend stacks.
  This is the "engine" that drives your damage.'
- 'Double Tap Management: Both Trueshot and Volley trigger Double Tap. You must weave an Aimed Shot or Rapid Fire between
  these two cooldowns to avoid overwriting the buff.'
- 'Always Be Casting: Never wait for a cooldown. If nothing is available, use Steady Shot to generate Focus and reduce the
  cooldown of Aimed Shot via Take Aim.'
- 'Take Aim: Rapid Fire reduces the cooldown of Aimed Shot by 5 seconds over its channel. This makes Rapid Fire a high priority
  to keep Aimed Shot charges flowing.'
- 'Don''t Look Back: Sentinel passive that provides a 10% absorb shield whenever Sentinel''s Mark procs, providing high passive'
- 'Trick Shots: In AoE, Multi-Shot must be used to allow Aimed Shot and Rapid Fire to ricochet to nearby targets.'
- 'Hunter''s Mark: Mandatory 3% damage debuff. Must be maintained on the primary target at all times.'
- 'Focus Management: Use Steady Shot to fill gaps. It generates Focus and reduces Aimed Shot cooldown via Take Aim.'
- 'Trick Shots: In AoE, Multi-Shot must be used to make your Aimed Shot and Rapid Fire ricochet. This is mandatory for any
  pull with 2+ targets.'
commonMistakes:
- 'Casting Trueshot and Volley back-to-back, which wastes a Double Tap proc.'
- Overcapping Aimed Shot charges by not using them before casting Moonlight Chakram.
- 'Failing to weave Arcane Shot/Multi-Shot after Aimed Shot, losing Sentinel’s Mark value.'
- Capping Focus at 125 instead of spending it on Precise Shots spenders.
- 'Not maintaining Hunter’s Mark, which is a flat 3% damage increase for the entire raid.'
- Standing still too long for the 2.5s Aimed Shot cast when movement is required; use Rapid Fire or Precise Shots spenders
  to reposition.
patchChanges:
  12.0.1: 'Sentinel: Sentinel''s Mark replaces Spotter''s Mark with increased potency. Sentinel: Maximum Focus increased to
    125. Sentinel: Moonlight Chakram added as a follow-up to Trueshot. MM General: Streamline removed; Aimed Shot base cast
    time increased to 2.5s. MM General: Explosive Shot and related talents removed. MM General: Take Aim (Apex Talent) causes
    Rapid Fire to reduce Aimed Shot cooldown.'
