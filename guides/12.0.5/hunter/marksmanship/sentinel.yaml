specId: 254
className: Hunter
specName: Marksmanship
role: DPS
heroTalent: Sentinel
patch: 12.0.1
guideVersion: 3
resourceManagement:
  primaryResource: Focus
  secondaryResource: None
  resourceNotes: Marksmanship Hunter operates on a priority list rather than a strict resource cycle. Focus is managed by
    using Steady Shot as a builder and Aimed Shot/Rapid Fire as primary spenders. Sentinel increases maximum Focus to 125.
    Use Moonlight Chakram when Focus dips below 35 to maintain the rotation without capping Aimed Shot charges.
maintenanceBuffs:
- spellId: 0
  spellName: Precise Shots
  targetUptimePct: 95
  importance: critical
  coachingTip: 'Generated by Aimed Shot and Rapid Fire. Always follow up these casts with Arcane Shot or Multi-Shot to spend
    stacks and fuel Sentinel’s Mark.'
- spellId: 0
  spellName: Trick Shots
  targetUptimePct: 100
  importance: high
  coachingTip: 'In AoE (2+ targets), ensure Multi-Shot is used to activate Trick Shots before every Aimed Shot or Rapid Fire
    cast.'
- spellId: 0
  spellName: Sentinel’s Mark
  targetUptimePct: 90
  importance: high
  coachingTip: This replaces Spotter’s Mark. It is applied by spending Precise Shots and massively buffs your Aimed Shot damage.
- spellId: 0
  spellName: Bulletstorm
  targetUptimePct: 80
  importance: medium
  coachingTip: Try to enter Trueshot with a fresh Bulletstorm buff by using Rapid Fire just before activating your main cooldown.
