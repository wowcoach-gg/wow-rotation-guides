resourceManagement:
  primaryResource: Focus
  secondaryResource: None
  resourceNotes: 'Beast Mastery has no active Focus generators. Focus is generated passively (2 Focus per auto-attack for Pack Leader) and through talents like Pack Tactics (Focus from Barbed Shot) and Serpentine Strikes (Cobra Shot refunds). Spend Focus on Kill Command, Wild Thrash, and Cobra Shot. Avoid overspending Focus on Cobra Shot filler to ensure you have enough for high-priority Kill Commands and Wild Thrash casts.'

