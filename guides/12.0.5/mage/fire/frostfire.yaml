specId: 63
className: Mage
specName: Fire
role: DPS
heroTalent: Frostfire
patch: "12.0.5"
guideVersion: 3

resourceManagement:
  primaryResource: Mana
  secondaryResource: Hot Streak
  resourceNotes: 'Core loop: generate Heating Up with critical strikes from Frostfire Bolt and Fire Blast.
    Two consecutive crits grant Hot Streak for instant Pyroblast or Flamestrike. Frostfire Bolt replaces
    Fireball as primary filler. Frostfire has shorter Combustion window than Sunfury but simpler execution.'

maintenanceBuffs:
- spellId: 0
  spellName: Blazing Barrier
  targetUptimePct: 100
  importance: high
  coachingTip: 'Keep active for damage absorption and minor healing. Short GCD, primary defensive tool.'
- spellId: 0
  spellName: 'Mastery: Ignite'
  targetUptimePct: 100
  importance: critical
  coachingTip: 'Primary cleave mechanic. Target the central enemy in packs. Ignite no longer auto-spreads
