heroTalent: Sunfury
patch: "12.0.5"
guideVersion: 3

resourceManagement:
  primaryResource: Mana
  secondaryResource: Hot Streak
  resourceNotes: 'Rotation revolves around chaining critical strikes to generate Heating Up, converted into
    Hot Streak via Fire Blast. Sunfury generates Spellfire Spheres consumed to summon Arcane Phoenix during
    Combustion. Longer Combustion window than Frostfire, with Hyperthermia follow-up via Memory of Al''ar.'

