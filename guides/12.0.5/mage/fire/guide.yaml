  resourceNotes: 'Fire revolves around chaining critical strikes. A single critical strike procs Heating Up; a second consecutive critical strike procs Hot Streak, making your next Pyroblast or Flamestrike instant and free. Use Fire Blast (castable during other spells) to guaranteed-crit and convert Heating Up into Hot Streak. Avoid overcapping Fire Blast charges, especially during Combustion when the Fired Up Apex talent provides significant cooldown reduction.'

