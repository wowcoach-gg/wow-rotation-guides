specId: 62
className: Mage
specName: Arcane
role: DPS
heroTalent: Sunfury
patch: "12.0.5"
guideVersion: 3

resourceManagement:
  primaryResource: Mana
  secondaryResource: Arcane Charges
  resourceNotes: 'Arcane Charges (up to 4) increase the damage and mana cost of Arcane Blast and Arcane Pulse.
    Arcane Salvo stacks to 25 for Sunfury (vs 20 for Spellslinger), generated by Arcane Missiles, Arcane Blast,
    and Arcane Pulse. Clearcasting procs are spent on Arcane Missiles. Mana is managed via Arcane Surge (45s CD)
    and Evocation.'

maintenanceBuffs:
- spellId: 0
  spellName: Arcane Salvo
  targetUptimePct: 100
  importance: critical
  coachingTip: 'Build to 25 stacks (Sunfury cap) before consuming with Arcane Barrage for optimal damage.'
- spellId: 0
  spellName: Arcane Intellect
  targetUptimePct: 100
  importance: high
  coachingTip: 'Ensure raid buff is active at all times for Intellect and Mana pool increases.'
- spellId: 0
  spellName: Arcane Soul
  targetUptimePct: 10
  importance: critical
  coachingTip: 'Triggers after Arcane Surge ends. During Arcane Soul, Arcane Barrage grants Clearcasting and
    generates 4 Arcane Charges without consuming Salvo stacks. Spam Barrage during this window.'

removedMechanics:
- Nether Precision (removed in 12.0)
- Shifting Power (removed in 12.0)
- Mass Barrier (removed in 12.0)
- Ice Floes (removed in 12.0)
- Siphon Storm (removed from Evocation)
- "Magi's Spark (removed in 12.0)"
- Arcane Harmony (renamed/reworked into Arcane Salvo)

rotation:
  singleTarget: |-
    Key Sunfury difference: DELAY Touch of the Magi until Arcane Surge has 4-6 seconds remaining to overlap with Arcane Soul window.
    1. Cast Arcane Surge on cooldown (45s CD) to trigger Arcane Phoenix.
    2. Cast Touch of the Magi when Arcane Surge has 4-6 seconds remaining (NOT immediately).
    3. Use Arcane Missiles whenever Clearcasting is active to build Arcane Salvo stacks.
    4. Build to 25 Arcane Salvo stacks (Sunfury cap).
    5. Cast Arcane Barrage ONLY at 25 stacks to consume the damage bonus.
    6. During Arcane Soul window (after Surge ends): spam Arcane Barrage — it grants Clearcasting and 4 Charges without consuming Salvo.
    7. Use Arcane Blast as primary filler to build Charges and Salvo stacks.
    8. Use Evocation if mana is low and Arcane Surge is not imminent.
  aoe: |-
    1. Cast Arcane Surge and delay Touch of the Magi (4-6s remaining on Surge).
    2. Use Arcane Pulse as primary ranged AoE filler (scales with Arcane Charges).
    3. Use Arcane Explosion if in melee range (3+ targets).
    4. Cast Arcane Barrage at 25 Arcane Salvo stacks for massive cleave damage.
    5. Use Arcane Orb to quickly generate Arcane Charges and Salvo stacks.
    6. During Arcane Soul, spam Arcane Barrage to hit multiple targets while maintaining charges.
  opener: |-
    Sunfury opener differs from Spellslinger — Touch of the Magi is DELAYED.
    1. Pre-pull consumables.
    2. Cast Arcane Surge (summons Arcane Phoenix, 45s CD).
    3. Time Warp (coordinate with group).
    4. Use Clearcasting procs on Arcane Missiles to build Salvo stacks.
    5. Cast Touch of the Magi when Surge has 4-6 seconds remaining.
    6. Build to 25 Salvo stacks for first Barrage.
    7. Prepare for Arcane Soul Barrage spam immediately after Surge ends.

cooldowns:
- name: Arcane Surge
  cooldown: 45s
  description: 'Primary DPS cooldown. Spends all mana for damage scaling with mana spent. Grants 35% spell
    damage + 425% mana regen for 15s. Summons Arcane Phoenix (Sunfury). Use on cooldown.'
- name: Touch of the Magi
  cooldown: 45s
  description: 'Applies 12s debuff accumulating 20% of damage dealt, then detonates. Grants 4 Arcane Charges.
    SUNFURY: Delay until Surge has 4-6s remaining to overlap with Arcane Soul window.'
- name: Arcane Soul (Passive)
  cooldown: Triggers after Arcane Surge ends
  description: 'Sunfury-specific. Arcane Barrage grants Clearcasting and 4 Charges without consuming Salvo
    stacks. Spam Barrage during this window for massive burst.'
- name: Evocation
  cooldown: Emergency
  description: 'Restores 100% mana over channel. Use to recover after burn phases.'
- name: Time Warp
  cooldown: 10min shared
  description: '30% Haste for 40s. Coordinate with group.'

concepts:
- 'Arcane Soul (CRITICAL): The most important Sunfury window. After Arcane Surge ends, Barrage becomes a
  resource generator — it grants Clearcasting and 4 Charges without consuming Salvo. Spam Barrage during this
  window for intense burst. This is why Touch of the Magi must be delayed.'
- 'Delayed Touch Timing: Unlike Spellslinger which uses Touch early, Sunfury delays Touch until Surge has
  4-6 seconds remaining. This ensures Touch detonation overlaps with the Arcane Soul spam window.'
- 'Arcane Salvo: Stacks to 25 for Sunfury (vs 20 for Spellslinger). Barrage should rarely be used below max
  stacks.'
- 'Arcane Phoenix: Sunfury summon that appears during Arcane Surge, casting spells alongside you for extra
  damage.'
- 'Spellfire Spheres: Sunfury mechanic that procs randomly from abilities, contributing to Meteorite generation.'
- 'Mana Management: Arcane is cooldown-based. Mana is spent aggressively during burn phases and recovered via
  Surge mana regeneration and Evocation.'
- 'Arcane Pulse: Ranged AoE filler that replaces the need to be in melee for Arcane Explosion.'
- 'Mastery: Increases damage and passive mana regeneration. Higher Mastery = more forgiving mana management.'
- 'Sunfury vs Spellslinger: Sunfury is significantly behind Spellslinger (18-25% less damage). Sunfury has
  more complex cooldown sequencing but better defensive capabilities.'

- 'Mage Defensives: Ice Block (full immunity), Alter Time (health snapshot reset), and Ice Barrier/Blazing Barrier are the actual defensive tools. Mirror Image and Greater Invisibility are threat drops only — they do NOT reduce damage taken.'
commonMistakes:
- Casting Arcane Barrage before reaching the 25-stack Arcane Salvo cap.
- Failing to spam Arcane Barrage during the Arcane Soul window.
- Using Touch of the Magi immediately with Arcane Surge instead of delaying 4-6 seconds.
- Letting Touch of the Magi and Arcane Surge timings drift too far apart.
- Using Arcane Barrage to clear charges when you have high mana and low Salvo stacks.
- Not using Arcane Surge on cooldown, delaying mana regeneration and Phoenix spawns.
- Casting Arcane Missiles without a Clearcasting proc.

patchChanges:
  12.0.1: 'Sunfury: Lessons in Debilitation preferred over Gravity Lapse. Arcane Pulse hotfixed so Reverberate
    no longer grants double Salvo stacks. Sunfury is 18-25% behind Spellslinger in all content.'
  '12.0': 'Complete spec rework. Nether Precision removed. Arcane Salvo introduced. Arcane Pulse added as
    ranged AoE filler. Arcane Surge CD reduced to 45s.'
