rotation:
  singleTarget: |
    [General Priority]
    1. Cast Evocation (if talented) before your burn phase to prepare mana.
    2. Cast Arcane Surge on cooldown (Bigburn phase).
    3. Cast Touch of the Magi immediately after Arcane Surge or on cooldown (Miniburn phase).
    4. Cast Arcane Missiles only when Clearcasting is active to build Arcane Salvo stacks.
    5. Cast Arcane Blast to build Arcane Charges to 4 and generate Arcane Salvo stacks.
    6. Cast Arcane Barrage ONLY when at maximum Arcane Salvo stacks (20 for Spellslinger, 25 for Sunfury) to benefit from Intuition.
    7. Use Arcane Orb (if talented) to generate Arcane Charges or consume Clearcasting if playing Orb Mastery.

    [Spellslinger Specific]
    - Use Arcane Orb to consume Clearcasting procs if specced into Orb Mastery instead of Arcane Missiles.
    - Focus on generating Arcane Splinters via Arcane Blast and Arcane Pulse.

    [Sunfury Specific]
    - During Arcane Soul (after Arcane Surge ends), spam Arcane Barrage as it grants Clearcasting, generates 4 charges, and does not consume Salvo stacks.
  aoe: |
    1. Cast Arcane Orb to generate Arcane Charges and Salvo stacks.
    2. Cast Arcane Pulse (ranged AoE) as your primary filler instead of Arcane Blast when 3+ targets are present.
    3. Cast Arcane Explosion if positioned in melee and Arcane Pulse is not preferred.
    4. Cast Arcane Barrage at maximum Arcane Salvo stacks for massive cleave damage.
    5. Use Touch of the Magi on a high-health priority target within the pack.
  opener: |
    1. Pre-cast Evocation (if talented)
    2. Arcane Surge
    3. Touch of the Magi (instantly grants 4 Arcane Charges)
    4. Arcane Barrage (if Arcane Soul is active/Sunfury) or Arcane Missiles (to build Salvo)
    5. Enter standard Bigburn priority

cooldowns: |
  - Arcane Surge (90s): Primary DPS cooldown. Drains all mana for a massive hit, increases spell damage by 35% for 15s, and grants massive mana regeneration.
  - Touch of the Magi (45s): Applies a 12s debuff that accumulates 20% of damage dealt, then explodes. Grants 4 Arcane Charges instantly.
  - Time Warp (5min): Increases haste by 30% for 40s for the entire raid.
  - Evocation: Restores full mana over a few seconds (if talented).
  - Ice Block / Ice Cold: Major defensive. Ice Block provides immunity; Ice Cold provides 70% damage reduction but allows movement.
  - Alter Time (1min): Records health and position; reactivate to return to them. Great for soaking mechanics or burst healing.
  - Mirror Image (2min): Offensive cooldown. Creates 3 copies that cast spells and attack enemies for 15 sec. Also reduces threat. NOT a defensive.
  - Greater Invisibility (2min): Utility. Invisibility and threat drop for 20 sec. NOT a defensive — does not reduce damage taken.

concepts: |
  - The rotation is cyclical: Bigburn (Surge + Touch), Miniburn (Touch only), and Filler.
  - Arcane Salvo is the core tracking mechanic; it stacks via Missiles, Blast, and Pulse.
  - Intuition: This talent makes Arcane Barrage damage bonuses only apply when used at maximum Salvo stacks.
  - Mana Management: It is acceptable to run out of mana after a Miniburn; use Arcane Barrage to reset charges and throttle spending until cooldowns return.
  - Mastery: Increases both spell damage and passive mana regeneration.
  - Apex Talent (Touch of the Archmage): Increases damage during Touch of the Magi and leaves a pulsing rune after the explosion.
  - Spellslinger: Relies on Arcane Splinters and often uses Orb Mastery to spend Clearcasting on Arcane Orb.
  - Sunfury: Features an Arcane Phoenix during Surge and a potent "Arcane Soul" window afterward for Barrage spam.
  - Arcane Pulse: A new ranged AoE filler that scales with Arcane Charges, replacing the need to be in melee for Arcane Explosion.
  - Funnel DPS: Arcane's single-target damage naturally increases when additional targets are present due to Arcane Barrage cleave.

commonMistakes:
  - 'Casting Arcane Barrage before reaching maximum Arcane Salvo stacks, losing the Intuition damage bonus.'
  - 'Using Touch of the Magi on a target that will die before the 12-second accumulation period ends.'
  - 'Desyncing Touch of the Magi and Arcane Surge; Touch should be used every 45s so it is ready for every 90s Surge.'
  - 'Holding Arcane Surge too long, which disrupts the mana regeneration cycle and overall cooldown alignment.'
  - 'Casting Arcane Missiles without a Clearcasting proc.'
  - 'Using Arcane Missiles to spend Clearcasting when talented into Orb Mastery (should use Arcane Orb instead).'
  - 'Overcapping Arcane Charges instead of spending them with a high-stack Arcane Barrage during filler phases.'

patchChanges: |
  12.0.1:
  - Optimized Arcane Surge sequences for Sunfury and Spellslinger.
  - Tree changes implemented to Mage and Arcane talent trees.
  Hotfixes (March 5, 2026):
  - Arcane Pulse and Reverberate interaction fixed; no longer grants double Arcane Salvo stacks.
  12.0 (Midnight Launch):
  - Major spec rework: Nether Precision removed, Arcane Salvo introduced.
  - Introduction of Apex Talents (Touch of the Archmage).
  - Arcane Pulse added as a ranged AoE filler.