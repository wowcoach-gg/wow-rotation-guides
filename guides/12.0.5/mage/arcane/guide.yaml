  resourceNotes: 'Arcane Charges (up to 4) increase the damage and mana cost of Arcane Blast and Arcane Pulse, and the damage of Arcane Barrage. Mana is managed through a cycle of "Bigburn" (Arcane Surge), "Miniburn" (Touch of the Magi), and "Filler" phases. Arcane Surge drains all mana but provides massive regeneration to refill the pool. Arcane Salvo is a stacking buff (20 for Spellslinger, 25 for Sunfury) generated by Arcane Missiles, Blast, and Pulse; it must be maximized before casting Arcane Barrage to trigger the Intuition damage bonus.'

