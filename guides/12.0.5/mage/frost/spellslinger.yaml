specId: 64
className: Mage
specName: Frost
role: DPS
heroTalent: Spellslinger
patch: "12.0.5"
guideVersion: 3

resourceManagement:
  primaryResource: Mana
  secondaryResource: Freezing Stacks
  resourceNotes: 'Generate Freezing stacks with Frostbolt, Flurry, Glacial Spike, and Ray of Frost. Consume
    stacks with Ice Lance at 6+ stacks (Spellslinger threshold). Manage Fingers of Frost and Brain Freeze
    procs. Spellslinger passively generates Splinters through casts that auto-fire for extra damage —
    Splinters are not a button the player presses. Freezing stacks cap at 20 and will occasionally
    overcap; that is expected, not a coaching point unless sustained.'

maintenanceBuffs:
- spellId: 0
  spellName: Ice Barrier
  targetUptimePct: 100
  importance: high
  coachingTip: 'With Glacial Bulwark, Ice Barrier has 2 charges. The spell description says "for 1 min"
    but that is the BUFF DURATION, not the cooldown. With 2 charges there is no excuse for downtime.
    Spellslinger further boosts Barrier with Reactive Barrier.'
- spellId: 0
  spellName: Fingers of Frost
  targetUptimePct: 0
  importance: tracking
  coachingTip: 'Fingers of Frost is a proc, not a maintained buff — tracked only. Spend procs on Ice Lance
    (Shatter damage without consuming Freezing stacks). Do not sit at 2 charges.'

removedMechanics:
- Icy Veins (removed in 12.0)
- "Winter's Chill (removed in 12.0)"
- "Mastery: Icicles (removed in 12.0, replaced by Mastery: Freeze and Shatter)"
- Ice Floes (removed in 12.0)
- Blast Wave (removed in 12.0)
- Ice Caller (removed in 12.0)
- Mass Barrier (removed in 12.0)
- Shifting Power (removed in 12.0)
- Coldest Snap (removed in 12.0)

rotation:
  singleTarget: |-
    1. Cast Flurry if Brain Freeze is active AND Thermal Void is not already active.
    2. Cast Ice Lance if you have 2 Fingers of Frost charges (avoid capping).
    3. Cast Frozen Orb on cooldown.
    4. Cast Glacial Spike when available.
    5. Cast Ice Lance if Fingers of Frost is active.
    6. Cast Ice Lance if Freezing stacks are at 6 or more on target.
    7. Cast Flurry if a charge is available (no Brain Freeze).
    8. Cast Ray of Frost.
    9. Cast Frostbolt as filler.
  aoe: |-
    1. Cast Blizzard if Freezing Rain is active (instant cast during the buff).
    2. Cast Flurry with Brain Freeze if Thermal Void is not already active.
    3. Cast Ice Lance if 2 Fingers of Frost charges.
    4. Cast Frozen Orb.
    5. Cast Glacial Spike when available.
    6. Cast Ice Lance if Fingers of Frost active or Freezing at 6+ stacks.
    7. Cast Flurry if a charge is available.
    8. Cast Ray of Frost.
    9. Cast Blizzard if fighting 7 or more enemies (hard-cast is worth it at that target count).
    10. Cast Frostbolt.
    Key AoE talents: Freezing Rain, Splitting Ice, Fractured Frost, Splintering Ray.
    Lonely Winter over Water Elemental for AoE.
  opener: |-
    1. Pre-cast Glacial Spike at 1 second on the countdown (so it finishes after combat starts — preserves a post-pull Brain Freeze proc's Thermal Void window).
    2. Cast Flurry to start the cooldown.
    3. Cast Frozen Orb.
    4. Cast Ray of Frost.
    5. Resume normal single-target priority.
    6. Time Warp is group-scheduled — drop it whenever the raid/group calls for it.

cooldowns:
- name: Ray of Frost
  cooldown: 1min
  description: 'Main offensive cooldown. Channels for 4s dealing heavy damage and generating Freezing
    stacks. Very fragile — movement or knockbacks waste the cast. If talented into Hand of Frost (Apex),
    Ray gains a second charge and extra damage. Use Shimmer to reposition without interrupting.'
- name: Frozen Orb
  cooldown: 1min
  description: 'AoE damage over its duration, slows enemies. Triggers Freezing Rain buff (instant Blizzard).
    Spellslinger reduces Frozen Orb cooldown via Spellfrost Teachings — keep it rolling.'
- name: Time Warp
  cooldown: 10min shared
  description: '30% Haste buff. Group-scheduled cooldown.'
- name: Ice Cold / Ice Block
  cooldown: 4min base (Cold Snap resets it)
  description: 'Ice Cold replaces Ice Block: heavy damage reduction for a short window, allows movement
    and casting (not a full immunity). Glacial Bulwark provides a second charge of Ice Barrier/Ice Cold
    and is the go-to choice vs the Cold Snap node for most content.'

concepts:
- 'Freezing Stack Threshold: Spellslinger consumes Freezing at 6+ stacks via Ice Lance (vs 10+ on Frostfire).
  The lower threshold is because Spellslinger lacks Comet Storm and relies on frequent Ice Lance shatters.'
- 'Frost Splinters: Passive Spellslinger mechanic. Spell casts generate Splinters that fire as extra
  damage — they are auto-cast and not a button the player presses. Do not flag 0 casts of "Splinters"
  as a rotation failure; the only thing the player controls is how much they cast the base rotation.'
- 'Spellfrost Teachings: Spellslinger talent that reduces Frozen Orb cooldown. The core Spellslinger niche —
  more frequent Orb casts vs Frostfire. Keep Orb rolling.'
- 'Splintering Ray: Spellslinger AoE talent that makes Ray of Frost splinter into extra targets. Required for
  competitive M+ AoE output.'
- 'Reactive Barrier: Spellslinger Ice Barrier talent. Nerfed in recent tuning but still provides extra value on
  Barrier usage.'
- 'Apex Talent — Hand of Frost: Class-wide apex (not Spellslinger-specific). Any Shatter event has a chance
  to fire a bonus damage proc and add a Freezing stack. Grants a second charge of Ray of Frost. Entirely passive.'
- 'Shatter Rework: Freezing is a stacking debuff on the enemy consumed by Ice Lance. Mastery: Freeze and
  Shatter amplifies freeze/shatter damage. No longer a crit bonus model.'
- 'Thermal Void: Consuming Brain Freeze with Flurry extends into a bonus Ice Lance window — only cast Flurry
  with Brain Freeze when Thermal Void is NOT already active, to avoid overwriting the buff.'
- 'Brain Freeze: Frostbolt has a chance to reset Flurry cooldown and buff the next Flurry. Consume promptly.'
- 'Fingers of Frost: Ice Lance deals Shatter damage without consuming Freezing stacks. Max 2 charges —
  spend the second charge before it wastes.'
- 'COACHING RULE — Ice Lance Analysis: Two valid reasons to cast Ice Lance on Spellslinger:
  (1) Fingers of Frost proc active (does NOT consume Freezing stacks), or
  (2) target has 6+ Freezing stacks (consumes stacks).
  An Ice Lance without either condition is a wasted cast. When calculating waste, subtract FoF-buffed and
  6+-stack casts from the total — do NOT assume every Ice Lance consumes stacks; FoF casts consume zero.'
- 'Ray of Frost Fragility: Primary channeled cooldown. Any movement or knockback wastes the cast — use
  Shimmer to reposition without interrupting. Ray generates many Freezing stacks, so consume existing stacks
  before channeling to avoid capping at 20.'
- 'No Comet Storm: Spellslinger does NOT use Comet Storm — it is exclusive to Frostfire. Do not flag
  0 casts of Comet Storm on a Spellslinger player.'
- 'Lonely Winter vs Water Elemental: Both are viable; Lonely Winter is currently the simpler default. Use
  Lonely Winter for AoE content.'
- 'Glacial Bulwark vs Cold Snap: Choice node. Glacial Bulwark (second charge of Ice Barrier + Ice Cold) is the
  default for most content. Cold Snap (resets defensives) has niche use in heavy damage windows.'
- 'Mage Defensives: Ice Block / Ice Cold, Alter Time (health snapshot reset), and Ice Barrier are the actual
  defensive tools. Mirror Image and Greater Invisibility no longer provide damage reduction in 12.0 — they
  are threat drops only.'
commonMistakes:
- Casting Ice Lance at too few Freezing stacks without a Fingers of Frost proc (should be 6+ for Spellslinger).
- Overcapping Freezing stacks beyond the 20-stack limit.
- Allowing Ray of Frost to be interrupted by movement or mechanics — use Shimmer to reposition.
- Casting Ray of Frost before consuming existing Freezing stacks (it generates stacks rapidly, wastes the cap).
- Hard-casting Blizzard in AoE when Freezing Rain is not active (below 7 targets).
- Trying to spec Comet Storm as Spellslinger (it is a Frostfire-only pick).
- Casting Flurry with Brain Freeze while Thermal Void is already active (overwrites the buff).
- Capping Fingers of Frost at 2 charges instead of spending on Ice Lance.

patchChanges:
  12.0.1: 'Lonely Winter redesigned: flat 3% spell damage. Spellslinger dominant for both raid and M+.
    Splintering Ray required for M+ AoE builds.'
  '12.0': 'Major Frost rework. Icy Veins, Winter''s Chill, Mastery Icicles all removed. Freezing stacking
    mechanic introduced. Ray of Frost becomes primary offensive cooldown. New Mastery: Freeze and Shatter.
    Frost Splinters added as passive Spellslinger mechanic. Splinterstorm Apex talent added.'
