rotation:
  singleTarget: |
    [Frostfire] Single-Target Priority:
    1. Cast Flurry.
    2. Cast Flurry if Thermal Void is NOT already active and you have Brain Freeze.
    3. Cast Frozen Orb.
    4. Cast Glacial Spike when available.
    5. Cast Comet Storm.
    6. Cast Ice Lance at 10+ Freezing or if Fingers of Frost is active.
    7. Cast Flurry if you have a charge available but no Brain Freeze.
    8. Cast Ray of Frost.
    9. Cast Frostfire Bolt.

    [Spellslinger] Single-Target Priority:
    1. Cast Comet Storm (only if talented — not a default Spellslinger pick).
    2. Cast Flurry with Brain Freeze.
    3. Cast Flurry with Brain Freeze if Thermal Void is NOT already active.
    4. Cast Frozen Orb.
    5. Cast Ice Lance if you have Fingers of Frost.
    6. Cast Glacial Spike when available.
    7. Cast Ice Lance whenever you are at or above 6 Freezing on target.
    8. Cast Ray of Frost.
    9. Cast Flurry.
    10. Cast Frostbolt.

    Note: Frost continues to use the single-target rotation on 2 targets; the AoE rotation only takes over at 3 or more targets.
  aoe: |
    [Frostfire] AoE Priority (3+ Targets):
    1. Cast Blizzard if Freezing Rain is active.
    2. Cast Flurry with Brain Freeze.
    3. Cast Flurry with Brain Freeze if Thermal Void is NOT already active.
    4. Cast Frozen Orb.
    5. Cast Glacial Spike.
    6. Cast Comet Storm.
    7. Cast Blizzard.
    8. Cast Ice Lance if Fingers of Frost is active or you have 10 or more Freezing on the target.
    9. Cast Flurry if you have a charge available but no Brain Freeze.
    10. Cast Frostfire Bolt if you have Frostfire Empowerment active.
    11. Cast Ray of Frost.
    12. Cast Frostfire Bolt.

    [Spellslinger] AoE Priority (3+ Targets):
    1. Cast Comet Storm (only if talented).
    2. Cast Blizzard if Freezing Rain is active.
    3. Cast Flurry with Brain Freeze.
    4. Cast Flurry with Brain Freeze if Thermal Void is NOT already active.
    5. Cast Frozen Orb.
    6. Cast Ice Lance if you have Fingers of Frost.
    7. Cast Glacial Spike when available.
    8. Cast Ice Lance whenever you are above 6 Freezing on target.
    9. Cast Ice Nova (if talented).
    10. Cast Cone of Cold.
    11. Cast Blizzard if you are fighting 5 or more enemies.
    12. Cast Flurry.
    13. Cast Ray of Frost.
    14. Cast Frostbolt.
  opener: |
    [Frostfire] Single-Target Opener:
    1. Pre-cast Blizzard at 2 seconds on the countdown.
    2. Cast Flurry to start the cooldown.
    3. Activate Time Warp if popping on pull.
    4. Cast Frostbolt.
    5. Cast Flurry again.
    6. Cast Ray of Frost.
    7. Cast Frozen Orb.
    8. Follow normal priority.

    [Frostfire] AoE Opener:
    1. Pre-cast Blizzard at 2 seconds on the countdown.
    2. Cast Flurry to start the cooldown.
    3. Activate Time Warp if popping on pull.
    4. Cast Frostbolt.
    5. Cast Flurry again.
    6. Cast Ray of Frost.
    7. Cast Frozen Orb.
    8. Cast Comet Storm.
    9. Follow normal AoE priority.

    [Spellslinger] Single-Target Opener:
    1. Pre-cast Frostbolt.
    2. Cast Ray of Frost.
    3. Cast Ice Lance.
    4. Follow normal priority.

    [Spellslinger] AoE Opener:
    1. Cast Blizzard.
    2. Cast Flurry.
    3. Cast Frozen Orb.
    4. Cast Ray of Frost.
    5. Follow normal AoE priority.

cooldowns: |
  - Ray of Frost (1min): Main offensive cooldown. Channels for 4s, dealing heavy damage and stacking Freezing. Fragile; movement or interrupts waste the CD.
  - Frozen Orb (1min): Secondary cooldown. Deals AoE damage for 15s and generates Fingers of Frost procs.
  - Time Warp (5min): Major Haste buff for the party. Use on pull or as directed.
  - Ice Block / Ice Cold: Major defensive. Ice Cold provides damage reduction instead of immunity if talented.
  - Mirror Image (2min): Offensive cooldown. Creates 3 copies that cast spells and attack enemies for 15 sec. Also reduces threat. NOT a defensive — does not reduce damage taken.
  - Greater Invisibility (2min): Utility. Invisibility and threat drop for 20 sec. NOT a defensive — does not reduce damage taken. Use for threat management or skipping mechanics.
  - Alter Time (1min): Position and health reset. If talented into Temporal Realignment, it provides a passive 50% heal when dropping below 24% health.

concepts: |
  - Shatter Rework: Shatter is no longer a Crit bonus but a stacking debuff on the enemy consumed by Ice Lance.
  - Freezing Stacks: Most spells generate these stacks. Spend them with Ice Lance based on your Hero Talent threshold (6+ for Spellslinger, 10+ for Frostfire).
  - Mastery (Freeze and Shatter): Increases damage against frozen targets and targets affected by Shatter stacks.
  - Ray of Frost Fragility: Since Ray of Frost is the main cooldown and goes on CD at the start of the cast, any movement or knockback results in a total loss of the cooldown.
  - Spell Transformations: Glacial Spike and Comet Storm are no longer standalone buttons; they transform Frostbolt and Ray of Frost respectively when available.
  - AoE Mechanics: The Frozen Orb cooldown reduction from Blizzard has been removed. Blizzard must often be hard-casted unless Freezing Rain is active.
  - Frostfire vs Spellslinger: Frostfire is burstier with front-loaded damage and exploding Glacial Spikes. Spellslinger relies on rapid Splinter hits and more frequent Frozen Orbs.
  - Lonely Winter vs Water Elemental: Lonely Winter was redesigned in 12.0.1 — it now provides a flat 3% spell damage increase (no longer the old 25% buff to Frostbolt/Ice Lance/Flurry). The choice vs Water Elemental is roughly a ~1% tradeoff — Lonely Winter gains about 1% single-target DPS in exchange for ~1% loss in AoE. This is a minor optimization, not a mandatory pick.
  - Hand of Frost (Apex Talent): Adds a second charge to Ray of Frost and causes Shatter events to fire extra spells that hit hard and add Freezing stacks.

commonMistakes:
  - 'Moving or being interrupted during Ray of Frost, wasting the spec’s primary cooldown'
  - 'Casting Ice Lance at the wrong Freezing stack threshold (should be 6+ for Spellslinger, 10+ for Frostfire)'
  - 'Hard-casting Blizzard in AoE when Freezing Rain is not active (unless fighting 7+ targets as Spellslinger)'
  - 'Using Ray of Frost before consuming existing Freezing stacks, leading to massive over-capping'
  - 'Holding Shimmer charges instead of using them to protect Ray of Frost channels'
  - 'Over-capping Fingers of Frost procs by not prioritizing Ice Lance when at 2 charges'

patchChanges: |
  12.0.1:
  - Wording tweaks to rotation priorities.
  - Lonely Winter redesigned: now grants flat 3% spell damage (was 25% bonus to Frostbolt/Ice Lance/Flurry).
  - Clarification that single-target rotation is used for 2-target cleave.
  12.0:
  - Complete spec revamp.
  - Shatter changed from Crit bonus to stacking debuff.
  - Icy Veins removed; Ray of Frost is now the main cooldown.
  - Glacial Spike and Comet Storm removed as standalone spells (now transform other spells).
  - Blizzard no longer reduces Frozen Orb cooldown.
  - Ice Floes and Blast Wave removed.
  - New Mastery: Freeze and Shatter.
  - New Apex Talent: Hand of Frost.