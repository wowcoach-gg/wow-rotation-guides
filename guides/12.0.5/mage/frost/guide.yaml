specId: 64
className: Mage
specName: Frost
role: DPS
patch: "12.0.5"
guideVersion: 2

resourceManagement:
  primaryResource: Mana
  secondaryResource: Freezing Stacks
  resourceNotes: 'Frost Mage operates on a strict priority list rather than a traditional resource system. The core loop involves generating Shatter (Freezing) stacks on the target using Frostbolt and Flurry, then consuming them with Ice Lance. You must manage two primary procs: Fingers of Frost (allows Ice Lance to deal maximum damage without consuming stacks) and Brain Freeze (enables Flurry). You will routinely over-cap the stack cap of 20 Freezing stacks, which is often unavoidable.'

maintenanceBuffs:
  - spellId: 0
    spellName: Freezing Rain
    targetUptimePct: 100
    importance: high
    coachingTip: 'When Freezing Rain is active, Blizzard becomes an instant cast. Prioritize casting Blizzard during this window in AoE situations.'
  - spellId: 0
    spellName: Thermal Void
    targetUptimePct: 90
    importance: high
    coachingTip: 'Try to optimize around Thermal Void passively. Avoid casting Flurry with Brain Freeze if Thermal Void is already active to maximize its extension/value.'

