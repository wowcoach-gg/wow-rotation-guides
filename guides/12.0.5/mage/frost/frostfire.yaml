specId: 64
className: Mage
specName: Frost
role: DPS
heroTalent: Frostfire
patch: "12.0.5"
guideVersion: 3

resourceManagement:
  primaryResource: Mana
  secondaryResource: Freezing Stacks
  resourceNotes: 'Frost Mage in Midnight revolves around generating and consuming Freezing stacks. Stacks are
    built on the target using Frostfire Bolt, Flurry, Glacial Spike, and Ray of Frost, then consumed by Ice
    Lance for bonus damage. Frostfire uses Frostfire Bolt (replaces Frostbolt) and Comet Storm (replaces Ray
    of Frost second usage). Freezing stacks cap at 20.'

maintenanceBuffs:
- spellId: 0
  spellName: Freezing Stacks
  targetUptimePct: 95
  importance: critical
  coachingTip: 'Monitor Freezing stacks on target. Consume with Ice Lance at 10+ stacks (Frostfire threshold).
    Do not overcap the 20-stack limit.'
- spellId: 0
  spellName: Frostfire Empowerment
  targetUptimePct: 0
  importance: high
  coachingTip: 'Watch for Frostfire Empowerment procs (10% chance from Frostfire spells) — instant Frostfire
    Bolt at 60% increased damage that explodes for AoE.'
- spellId: 0
  spellName: Ice Barrier
  targetUptimePct: 100
  importance: medium
  coachingTip: '30-second recharge, 2 charges with Glacial Bulwark. The spell description says "for 1 min"
    but that is the BUFF DURATION, not the cooldown. Frostfire gains Imbued Warding for enhanced protection.'

removedMechanics:
- Icy Veins (removed in 12.0)
- "Winter's Chill (removed in 12.0)"
- "Mastery: Icicles (removed in 12.0, replaced by Mastery: Freeze and Shatter)"
- Ice Floes (removed in 12.0)
- Blast Wave (removed in 12.0)
- Ice Caller (removed in 12.0)
- Mass Barrier (removed in 12.0)
- Shifting Power (removed in 12.0)
- Coldest Snap (removed in 12.0)

rotation:
  singleTarget: |-
    1. Cast Flurry if Brain Freeze is active AND Thermal Void is not already active.
    2. Cast Frozen Orb on cooldown.
    3. Cast Glacial Spike when available.
    4. Cast Comet Storm when available.
    5. Cast Ice Lance if Fingers of Frost is active.
    6. Cast Ice Lance if Freezing stacks are at 10 or more on target.
    7. Cast Flurry if you have a charge available (no Brain Freeze).
    8. Cast Ray of Frost.
    9. Cast Frostfire Bolt as filler.
  aoe: |-
    1. Cast Blizzard if Freezing Rain is active (instant cast, +20% damage from Frozen Orb).
    2. Cast Flurry with Brain Freeze if Thermal Void is not already active.
    3. Cast Frozen Orb.
    4. Cast Glacial Spike (Glacial Shatter talent makes it shatter 5 Freezing stacks instead of applying them).
    5. Cast Comet Storm (each of 7 comets shatters 1 Freezing stack).
    6. Cast Blizzard.
    7. Cast Ice Lance if Fingers of Frost is active or Freezing at 10+ stacks.
    8. Cast Flurry if a charge is available.
    9. Cast Frostfire Bolt with Frostfire Empowerment active.
    10. Cast Ray of Frost.
    11. Cast Frostfire Bolt.
  opener: |-
    1. Pre-cast Blizzard at 2 seconds on the countdown (same for ST and AoE — Frostfire's pre-pull filler).
    2. Cast Flurry to start the cooldown.
    3. Activate Time Warp if popping on pull (otherwise group-scheduled).
    4. Cast Glacial Spike.
    5. Cast Flurry again.
    6. Cast Ray of Frost.
    7. Cast Frozen Orb.
    8. (AoE) Follow with Comet Storm, then normal priority.
    9. (ST) Resume normal priority.

cooldowns:
- name: Ray of Frost
  cooldown: 1min
  description: 'Main offensive cooldown. Channels for 4s dealing heavy damage and generating Freezing stacks.
    Very fragile — movement or knockbacks waste the cast. Hand of Frost (Apex) adds a second charge and extra
    damage. Use Shimmer to reposition without interrupting.'
- name: Comet Storm (Frostfire only)
  cooldown: '~30s'
  description: '7 icy comets, each shattering 1 Freezing stack. Frostfire-exclusive — do not expect any
    Comet Storm casts on a Spellslinger player. Isothermic Core talent adds a Meteor (Fire damage) to the cast.'
- name: Frozen Orb
  cooldown: 1min
  description: 'AoE damage over its duration with slow. Triggers Freezing Rain (instant Blizzard during the
    buff). Core resource for both ST and AoE.'
- name: Time Warp
  cooldown: 10min shared
  description: '30% Haste buff. Group-scheduled cooldown.'
- name: Ice Cold / Ice Block
  cooldown: 4min base (Cold Snap resets it)
  description: 'Ice Cold replaces Ice Block: heavy damage reduction for a short window, allows movement
    and casting (not a full immunity). Glacial Bulwark provides a second charge of Ice Barrier/Ice Cold
    and is the go-to choice vs the Cold Snap node for most content. Frostfire gains Imbued Warding for
    enhanced barrier protection.'

concepts:
- 'Freezing Stack Threshold: Frostfire consumes Freezing at 10+ stacks via Ice Lance (vs 6+ on Spellslinger).
  Higher threshold because Comet Storm, Glacial Spike (with Glacial Shatter), and Frostfire Empowerment all
  consume stacks on their own.'
- 'Frostfire Bolt: Replaces Frostbolt as primary filler cast on Frostfire. Any "Frostbolt" reference in the
  rotation applies to Frostfire Bolt for this hero tree.'
- 'Shatter Rework: Freezing is a stacking debuff on the enemy consumed by Ice Lance. Mastery: Freeze and
  Shatter amplifies freeze/shatter damage. No longer a crit bonus model.'
- 'Thermal Void: Consuming Brain Freeze with Flurry extends into a bonus Ice Lance window — only cast Flurry
  with Brain Freeze when Thermal Void is NOT already active, to avoid overwriting the buff.'
- 'Comet Storm: Frostfire-exclusive — 7 comets each shattering 1 Freezing stack on impact. Isothermic Core
  talent adds a Meteor (Fire damage) alongside each cast. Do not expect Comet Storm casts on Spellslinger.'
- 'Glacial Shatter: Frostfire talent that makes Glacial Spike shatter 5 Freezing stacks instead of applying them.'
- 'Frostfire Empowerment: Proc from Frostfire spells granting an instant Frostfire Bolt that explodes for AoE.
  Spend procs promptly — prioritize them in AoE especially.'
- 'Isothermic Core: Frostfire talent that links Meteor to Comet Storm for extra Fire damage.'
- 'Imbued Warding: Frostfire defensive talent enhancing Ice Barrier.'
- 'Duality: Frostfire thematic passive — Frost spells interact with Fire spells on this hero tree.'
- 'Brain Freeze: Frostfire Bolt chance to reset Flurry cooldown and buff the next Flurry. Consume promptly.'
- 'Fingers of Frost: Ice Lance deals Shatter damage without consuming Freezing stacks. Max 2 charges —
  spend the second charge before it wastes.'
- 'COACHING RULE — Ice Lance Analysis: Two valid reasons to cast Ice Lance on Frostfire:
  (1) Fingers of Frost proc active (does NOT consume Freezing stacks), or
  (2) target has 10+ Freezing stacks (consumes stacks).
  An Ice Lance without either condition is a wasted cast. When calculating waste, subtract FoF-buffed and
  10+-stack casts from the total — do NOT assume every Ice Lance consumes stacks; FoF casts consume zero.'
- 'Ray of Frost Fragility: Primary channeled cooldown. Any movement or knockback wastes the cast — use
  Shimmer to reposition without interrupting. Consume existing Freezing stacks before channeling.'
- 'Glacial Bulwark vs Cold Snap: Choice node. Glacial Bulwark (second charge of Ice Barrier + Ice Cold) is
  the default for most content. Cold Snap (resets defensives) has niche use in heavy damage windows.'
- 'Mage Defensives: Ice Block / Ice Cold, Alter Time (health snapshot reset), and Ice Barrier are the actual
  defensive tools. Mirror Image and Greater Invisibility no longer provide damage reduction in 12.0 — they
  are threat drops only.'
commonMistakes:
- Casting Ice Lance at too few Freezing stacks without a Fingers of Frost proc (should be 10+ for Frostfire).
- Overcapping Freezing stacks beyond the 20-stack limit.
- Allowing Ray of Frost to be interrupted by movement or mechanics — use Shimmer to reposition.
- Casting Ray of Frost or Glacial Spike before consuming existing Freezing stacks.
- Hard-casting Blizzard in AoE when Freezing Rain is not active.
- Holding Ray of Frost's second charge (when Hand of Frost is talented) too long instead of using it in the priority.
- Casting Flurry with Brain Freeze while Thermal Void is already active (overwrites the buff).
- Capping Fingers of Frost at 2 charges instead of spending on Ice Lance.
- Letting Frostfire Empowerment procs expire without casting Frostfire Bolt.

patchChanges:
  12.0.1: 'Lonely Winter redesigned: flat 3% spell damage (was 25% bonus). Shatter changed to stacking
    Freezing debuff consumed by Ice Lance. Icy Veins removed. Frostfire Bolt replaces Frostbolt. Blizzard
    no longer reduces Frozen Orb CD. Glacial Spike and Comet Storm transform existing spells when available.'
  '12.0': 'Major Frost rework. Icy Veins, Winter''s Chill, Mastery Icicles all removed. Freezing stacking
    mechanic introduced. Ray of Frost becomes primary offensive cooldown. New Mastery: Freeze and Shatter.'
