specId: 257
className: Priest
specName: Holy
role: Healer
patch: "12.0.5"
guideVersion: 3
heroTalent: Archon
resourceManagement:
  primaryResource: Mana
  secondaryResource: Surge of Light
  resourceNotes: Healing revolves around managing Mana while using Holy Words (Serenity and Sanctify) as your most powerful
    tools. Archon players utilize Surge of Light procs to cast instant Flash Heals or Prayer of Healing (via Spiritwell) to
    conserve mana and reduce Holy Word cooldowns.
maintenanceBuffs:
- spellId: 0
  spellName: Echo of Light
  targetUptimePct: 95
  importance: critical
  coachingTip: This is your Mastery. Ensure you are constantly casting direct heals to keep this HoT active on damaged targets.
- spellId: 0
  spellName: Resonant Energy
  targetUptimePct: 80
  importance: high
  coachingTip: Generated by Halo. Archon relies on stacking this to increase the effectiveness of your healing spells.
- spellId: 0
  spellName: Protective Light
  targetUptimePct: 70
  importance: medium
  coachingTip: Triggered by Flash Heal. Maintain this on yourself during periods of high incoming damage for damage reduction.
removedMechanics:
- Divine Star
- Divine Word
- Heal
- Lightwell
- 'Power Word: Life'
- Premonition
- Renew (Casted version removed; now passive only)
- Shadowfiend
- 'Shadow Word: Pain'
- Symbol of Hope
rotation:
  singleTarget: |
    1. Cast Holy Word: Serenity as your highest priority to prevent sitting on 2 charges.
    2. Cast Benediction (upgraded Flash Heal) whenever it procs from Prayer of Mending.
    3. Cast Flash Heal when Surge of Light procs to reduce Holy Word: Serenity cooldown.
    4. Cast Prayer of Mending on cooldown to generate Benediction procs and Holy Word CDR.
    5. Cast Halo frequently to generate Surge of Light procs and stack Resonant Energy. Brief holds (10-15s) for upcoming damage are fine.
    6. Cast Holy Fire for damage and Holy Word: Chastise CDR.
    7. Cast Smite as a filler for damage and Holy Word: Chastise CDR.
  aoe: |
    1. Cast Holy Word: Sanctify on cooldown for efficient group healing.
    2. Cast Halo into damage events for burst healing. Do not hold more than 10-15 seconds.
    3. Cast Prayer of Healing when Surge of Light procs (requires Spiritwell talent).
    4. Cast Prayer of Mending on cooldown (high priority for group triage).
    5. Cast Holy Nova if there are 4+ enemies and healing is not required.
    6. Cast Prayer of Healing as a filler if Holy Words are on cooldown and group damage is high.
  opener: |
    1. Holy Word: Sanctify (to start cooldown reduction cycle)
    2. Holy Word: Serenity
    3. Prayer of Mending
    4. Halo (to start generating Surge of Light procs and stacking Resonant Energy)
    5. Apotheosis (resets Holy Word charges and increases CDR)
    6. Power Infusion (if not assigned to a specific DPS window)
cooldowns:
- name: Apotheosis
  cooldown: 2min
  description: 'Major throughput cooldown. Use during heavy damage windows to maximize Holy Word resets. Increases
    Holy Word CDR by 300%. Archon''s Perfected Form increases healing further while active.'
- name: Halo
  cooldown: 1min
  description: 'Archon''s core ability. Provides burst healing/damage, generates Surge of Light, and stacks
    Resonant Energy. Use frequently but time to damage events — casting into full health wastes the CD.
    Holding 10-15s for upcoming damage is fine.'
- name: Divine Hymn
  cooldown: 3min
  description: 'Raid-wide channelled heal. Increases healing taken by the raid. Best used just before or during heavy AoE.'
- name: Guardian Spirit
  cooldown: 3min
  description: 'External defensive. Increases healing received by 60% and prevents death. Use on tanks or players targeted
    by lethal mechanics.'
- name: Power Infusion
  cooldown: 2min
  description: Haste buff. Coordinate with DPS or use for personal burst healing.
concepts:
- 'Holy Words: Serenity and Sanctify are your most powerful spells. Use them often to maximize the benefit
  of your CDR mechanics — avoid sitting on 2 charges, but spending them into no damage is also wasteful.'
- 'Archon Synergy: Archon focuses on empowering Halo. Use Halo frequently to trigger Manifested Power for
  Surge of Light procs — but time it to incoming damage when possible. Casting Halo into full-health targets
  wastes both the healing and the cooldown. A 10-15 second hold for an upcoming damage event is smart play.'
- 'Apotheosis Management: During Apotheosis, prioritize Prayer of Mending (with Voice of Harmony) and Flash Heal (with Surge
  of Light) to reset Holy Words rapidly.'
- 'Spiritwell: This Archon talent allows Surge of Light to be consumed by Prayer of Healing, making it a viable AoE triage
  tool.'
- 'Echo of Light: Your Mastery is a passive HoT. Successive direct heals stack this effect, making it stronger rather than
  refreshing it.'
- 'Benediction Apex: Prayer of Mending bounces periodically upgrade Flash Heal into Benediction. This is a high-value heal
  that triggers Cosmic Ripple.'
- 'CDR Mechanics: Flash Heal reduces Serenity CD; Prayer of Healing reduces Sanctify CD. Archon''s Energy Cycle adds CDR when
  consuming Surge of Light.'
- 'Lightweaver: Flash Heal generates Lightweaver stacks. Spend stacks on Prayer of Healing for increased
  healing. Casting Flash Heal at max stacks wastes mana and does less healing.'
- 'Surge of Light vs Lightweaver: Surge of Light procs allow instant Flash Heal or Prayer of Healing (via
  Spiritwell). These instant PoH casts do NOT consume Lightweaver stacks. A high PoH-to-FH ratio does not
  indicate Lightweaver misuse if many were Surge of Light procs.'
- 'Empyreal Blaze: Increases damage output but reduces Surge of Light procs (Holy Fire cannot trigger SoL).
  Stick to Smite as primary DPS ability if healing is priority.'
- 'Divine Image: When talented, Holy Words summon a Naaru that mimics your healing. More HW casts = more value.'
- 'Reactive Healing: Holy is a reactive spec. Focus on responding to damage taken rather than pre-shielding.'
- 'Miracle Worker: Provides 2 charges of Serenity and Sanctify. Avoid sitting on 2 charges to maximize
  CDR value from Flash Heal/Prayer of Healing.'
commonMistakes:
- Sitting on two charges of Holy Word: Serenity or Sanctify, wasting potential cooldown reduction.
- Holding Halo for more than 15 seconds; use it frequently but time it to incoming damage when possible.
- Not using Surge of Light procs immediately, leading to overcapping and lost mana efficiency.
- Casting Prayer of Healing without a Surge of Light proc when mana is low.
- Forgetting to cast Prayer of Mending on cooldown, which reduces Benediction proc frequency.
- Using Divine Hymn too late; it is often better used just before damage hits to stack the healing buff.
patchChanges:
  12.0.1: 'Archon: Spiritwell now enables Prayer of Healing to consume Surge of Light. Archon: Perfected Form healing bonus
    increased during Apotheosis. Ultimate Serenity: New talent added that removes Sanctify but makes Serenity cleave. Benediction:
    New Apex talent system added, rewarding Prayer of Mending usage. Removed: Divine Word, Divine Star, and Symbol of Hope
    removed from the tree.'
