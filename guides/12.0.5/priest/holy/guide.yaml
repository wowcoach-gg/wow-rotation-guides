  resourceNotes: 'Mana is the primary constraint for long encounters. Holy Words (Serenity, Sanctify, Chastise) are powerful short-cooldown abilities. Casting specific spells reduces the cooldown of associated Holy Words: Flash Heal reduces Serenity; Prayer of Healing reduces Sanctify; Smite/Holy Nova reduce Chastise. Talents like Voice of Harmony add more CDR (PoM for Serenity, Halo for Sanctify, Holy Fire for Chastise). Avoid sitting on 2 charges of Holy Words to maximize throughput.'

