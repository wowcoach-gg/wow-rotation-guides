specId: 256
className: Priest
specName: Discipline
role: Healer
heroTalent: Voidweaver
patch: "12.0.5"
guideVersion: 3
resourceManagement:
  primaryResource: Mana
  secondaryResource: Atonement
  resourceNotes: 'Mana is spent on Atonement applicators (Power Word: Radiance, Power Word: Shield, Flash Heal, Plea). Healing
    is generated by dealing damage to enemies while Atonement is active on allies. Voidweaver gameplay centers on the Entropic
    Rift window triggered by Mind Blast.'
maintenanceBuffs:
- spellId: 0
  spellName: Atonement
  targetUptimePct: 70
  importance: critical
  coachingTip: 'Maintain Atonement on targets before damage occurs. Use Power Word: Radiance for efficient group coverage.'
- spellId: 0
  spellName: 'Shadow Word: Pain'
  targetUptimePct: 95
  importance: high
  coachingTip: Keep your DoT active on at least one target to enable Expiation and Power of the Dark Side procs.
removedMechanics:
- Divine Star (removed in 12.0)
- Halo (removed in 12.0)
- 'Power Word: Life (removed in 12.0)'
- Premonition (removed in 12.0)
- Renew (removed in 12.0)
- Luminous Barrier (removed in 12.0)
- Shadow Covenant (Active ability removed in 12.0)
- Schism (removed in 12.0)
rotation:
  singleTarget: |
    1. Cast Mind Blast on cooldown to trigger Entropic Rift.
    2. Cast Penance (Offensively) to grow the Entropic Rift and trigger Void Infusion.
    3. Cast Void Blast (replaces Smite) as your primary filler while Entropic Rift is active.
    4. Cast Shadow Word: Death (especially in execute range) to trigger Expiation and summon Shadowfiends.
    5. Cast Power Word: Shield when Master the Darkness procs a Void Shield.
    6. Cast Smite as filler when Entropic Rift is not active.
    7. Cast Flash Heal or Penance (Defensively) only for emergency spot healing or Atonement application.
  aoe: |
    1. Refresh Shadow Word: Pain to ensure it lasts the duration of the ramp.
    2. Cast Flash Heal (applies Atonement to self and target via Binding Heal).
    3. Cast Power Word: Shield and Plea to reach desired Atonement count.
    4. Cast Power Word: Radiance (x1 or x2) to cover the group.
    5. Cast Mind Blast to activate Entropic Rift.
    6. Cast Shadow Word: Death (can be cast during Ultimate Penitence float).
    7. Cast Penance OFFENSIVELY to empower the Rift (Voidweaver uses offensive Penance).
    8. Cast Void Blast repeatedly until the Rift expires.
    9. When Rift ends, a Voidwraith is summoned.
  opener: |
    1. Shadow Word: Pain
    2. Power Word: Shield (on tank)
    3. Mind Blast (to trigger Entropic Rift)
    4. Penance (Offensive)
    5. Void Blast
cooldowns:
- name: Evangelism
  cooldown: Redesigned
  description: 'Instantly casts Power Word: Radiance and makes the next two Radiance casts instant. Activates
    either Archangel or Mindbender depending on talent. Use to quickly set up large Atonement ramps.'
- name: Ultimate Penitence
  cooldown: 4min
  description: Massive offensive channel. As Voidweaver, always use this during an Entropic Rift window to benefit from Void
    Infusion.
- name: 'Power Word: Barrier'
  cooldown: 3min
  description: 'Choice node with Ultimate Penitence. Provides 20% damage reduction for allies inside the zone.'
- name: Pain Suppression
  cooldown: 3min
  description: 'Major single-target damage reduction. Use proactively on tanks or lethal mechanic targets.
    Protector of the Frail talent provides additional charges.'
- name: Desperate Prayer
  cooldown: 1.5min
  description: Personal defensive that increases maximum HP and heals you.
concepts:
- 'Atonement: Your primary healing mechanic. Damage dealt heals all allies with the Atonement buff.'
- 'Entropic Rift: Triggered by Mind Blast. It deals damage, follows the target, and empowers your spells.'
- 'Void Blast: Smite transforms into this during the Rift. It is your highest priority filler and deals significant damage/healing.'
- 'Ramping: The proactive process of applying Atonements to the group before a damage event, followed by a high-damage sequence.'
- 'Master the Darkness: Penance has a chance to proc Void Shield, a powerful absorb that splashes Atonement to 2 additional
  allies.'
- 'Expiation: Mind Blast and Shadow Word: Death consume a portion of Shadow Word: Pain to deal instant damage.'
- 'Dark Indulgence: Mind Blast procs Power of the Dark Side, buffing your next Penance.'
- 'Voidwraith: Summoned when Entropic Rift ends. Provides additional damage and Atonement healing.'
- 'Voidweaver Penance: Unlike Oracle which uses defensive Penance, Voidweaver primarily uses offensive Penance
  to empower Entropic Rift and deal damage through Atonement.'
- 'Shadow Tap/Overwhelming Shadows: Passive modifiers that make Mind Blast a core part of your burst healing kit.'
- 'Defensive Management: Priest defensives are weak. Stack Fade (Translucent Image for 10% DR), Protective
  Light (Flash Heal on self), and Desperate Prayer to survive big hits.'
commonMistakes:
- Using Penance defensively too often; Voidweaver gains more value from offensive Penance to grow the Entropic Rift.
- Casting Ultimate Penitence outside of an Entropic Rift window, missing the Void Infusion Atonement bonus.
- 'Overusing Power Word: Shield as a general applicator, leading to rapid mana depletion.'
- Wasting Master the Darkness procs by casting another Penance before consuming the Void Shield.
- Neglecting to use Shadow Word: 'Death on low-health targets to trigger Shadowfiend summons.'
patchChanges:
  12.0.1: 'Evangelism redesigned to instantly cast Power Word: Radiance and grant instant charges. Shadow Covenant removed;
    replaced by passive Shadow damage/healing buff (Occultist). Plea added to the class tree as a low-cost instant Atonement
    applicator. Ultimate Penitence and Power Word: Barrier moved to a choice node.'
