resourceManagement:
  primaryResource: Insanity
  secondaryResource: None
  resourceNotes: 'Generate Insanity with builders like Mind Blast, Mind Flay, and Void Torrent. Spend Insanity on Shadow Word: Madness (formerly Devouring Plague). Avoid capping at 100 Insanity (or 150 with the Voidtouched talent). Shadow Word: Madness damage rolls over when refreshed, meaning remaining damage from the previous application is added to the new one, allowing for early refreshes without loss.'

maintenanceBuffs:
  - spellId: 0
    spellName: 'Shadow Word: Madness'
    targetUptimePct: 95
    importance: critical
    coachingTip: 'Maintain Shadow Word: Madness for the Mastery: Shadow Weaving bonus. Refresh when less than one GCD remains or when near capping Insanity to ensure maximum damage rollover.'
  - spellId: 0
    spellName: Vampiric Touch
    targetUptimePct: 95
    importance: high
    coachingTip: 'Essential for Psychic Link cleave damage. Apply to all targets (up to 12) using Tentacle Slam or manual casts.'
  - spellId: 0
    spellName: 'Shadow Word: Pain'
    targetUptimePct: 95
    importance: high
    coachingTip: 'Usually applied automatically via Vampiric Touch when using the Misery talent. If using Invoked Nightmare, manual application is required for low target counts.'

