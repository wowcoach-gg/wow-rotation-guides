resourceManagement:
  primaryResource: Fury
  secondaryResource: Shattered Souls
  resourceNotes: 'The core loop involves building Fury with Demon Blades (now baseline) and Felblade, then spending it on Blade Dance and Chaos Strike. Avoid Fury waste by not overcapping. Pool Fury before Eye Beam to ensure you have enough for the high-intensity Demonic burst window. Aldrachi Reaver uses Shattered Souls to trigger Reaver''s Glaive (replaces Throw Glaive) after consuming 6 souls.'

