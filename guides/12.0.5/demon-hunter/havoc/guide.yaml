    targetUptimePct: 100
    importance: critical
    coachingTip: 'This is your primary raid utility. Ensure you hit every target at least once to apply the 5% magic damage taken debuff.'
  - spellId: 0
    spellName: Immolation Aura
    targetUptimePct: 90
    importance: high
    coachingTip: 'Maintain high uptime for passive Fury generation. In Fel-Scarred builds, ensure it is on cooldown before entering Metamorphosis to maximize Violent Transformation.'
