specId: 577
className: Demon Hunter
specName: Havoc
role: DPS
heroTalent: Aldrachi Reaver
patch: "12.0.5"
guideVersion: 3
resourceManagement:
  primaryResource: Fury
  secondaryResource: Shattered Souls
  resourceNotes: Build Fury with Demon Blades (baseline) and Felblade. Spend Fury on Blade Dance and Chaos Strike. Consume
    6 Shattered Souls to trigger Reaver’s Glaive, which replaces your next Throw Glaive.
maintenanceBuffs:
- spellId: 0
  spellName: Thrill of the Fight
  targetUptimePct: 80
  importance: high
  coachingTip: 'Maintain this buff by completing Reaver’s Glaive combos to gain 6% Haste and 30% increased damage on your
    next Reaver’s Glaive.'
- spellId: 0
  spellName: Reaver’s Mark
  targetUptimePct: 90
  importance: critical
  coachingTip: Apply this via Chaos Strike during your Reaver’s Glaive combo. It duplicates Physical damage as Chaos via Wounded
