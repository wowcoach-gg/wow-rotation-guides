specId: 1480
className: Demon Hunter
specName: Devourer
role: DPS
patch: "12.0.5"
guideVersion: 2
resourceManagement:
  primaryResource: Fury
  secondaryResource: Soul Fragments
  resourceNotes: >
    Devourer is a Dual Resource specialization balancing Fury and Soul Fragments.
    Fury cap is 120. Generated by Consume, Voidblade/Hungering Slash, Soul Immolation,
    collecting Soul Fragments (4 Fury each), and Voidglare Boon (10 Fury after full
    Void Ray channel). Void Ray costs 100 Fury outside Void Metamorphosis; inside
    Void Metamorphosis abilities no longer cost Fury — instead Fury passively drains
    and the form ends when Fury runs out. Soul Fragments fill your secondary resource
    bar: 50 collected (35 with Soul Glutton) grants Void Metamorphosis. During Void
    Metamorphosis, every 30 Souls generated grants one Collapsing Star cast. Max 10
    Souls on the ground at once.

maintenanceBuffs:
- spellId: 0
  spellName: Voidfall
  targetUptimePct: 0
  importance: critical
  coachingTip: >
    Consume/Devour has a 35% chance to grant a Voidfall stack. At 3 stacks, your
    next Reap calls down void meteors for massive AoE damage. Meteoric Rise grants
    one stack from Void Ray — spend stacks before casting Void Ray to avoid
    overcapping. Upon entering Void Metamorphosis, Annihilator resets Reap cooldown
    and instantly generates 3 Voidfall stacks.
- spellId: 0
  spellName: Chaos Brand
  targetUptimePct: 100
  importance: critical
  coachingTip: 'Ensure Chaos Brand is applied to all targets for 5% magic damage taken debuff.'

playstyles:
- id: annihilator
  name: Annihilator
  detectionCriteria:
    heroTalents:
      - "Annihilator"
- id: void_scarred
  name: Void-Scarred
  detectionCriteria:
    heroTalents:
      - "Void-Scarred"

removedMechanics:
- Traditional Metamorphosis (Devourer uses Void Metamorphosis, resource-gated not timer-based)
- Eye Beam / Demonic Window (Devourer uses Void Ray instead — different mechanic entirely)
- Chaos Strike / Blade Dance / Annihilation / Death Sweep (Devourer uses Consume, Reap, Cull, Devour)
- Sigil of Flame (not part of Devourer kit)
- Demon's Bite / Demon Blades (Devourer uses Consume as builder)
- Sinful Brand (removed in 12.0)
- Elysian Decree (removed in 12.0)
- Fodder to the Flame (removed in 12.0)

rotation:
  singleTarget: |
    [Annihilator — Outside Void Metamorphosis]
    1. Cast Reap with 3 stacks of Voidfall.
    2. Cast Void Metamorphosis when available.
    3. Cast Void Ray with 100+ Fury. Aim to cast right before Void Metamorphosis to leverage the Fury refund (entry refills Fury bar).
    4. Cast Consume (filler, generates Fury and Soul Fragments; castable while moving).

    [Annihilator — During Void Metamorphosis]
    1. Cast Voidblade before Collapsing Star (triggers Devourer's Bite damage amp).
    2. Cast Cull with 3 stacks of Voidfall.
    3. Cast Collapsing Star when at 30 Souls.
    4. Cast Void Ray (on 16s hasted cooldown; pauses Fury drain).
    5. Cast Devour (filler, castable while moving).

    [Void-Scarred — Outside Void Metamorphosis]
    1. Cast Reap on cooldown whenever available.
    2. Cast Voidblade right before entering Void Metamorphosis (triggers Devourer's Bite damage amp).
    3. Cast Void Metamorphosis when available.
    4. Cast Void Ray with 100+ Fury.
    5. Cast Consume (filler; castable while moving).

    [Void-Scarred — During Void Metamorphosis]
    1. Cast Pierce the Veil before Collapsing Star or Moment of Craving-buffed Cull (triggers Devourer's Bite damage amp).
    2. Cast Collapsing Star when at 30 Souls.
    3. Cast Cull with 4 Soul Fragments or if it will overcap charges.
    4. Cast Void Ray (on cooldown; pauses Fury drain).
    5. Cast Devour (filler, castable while moving).
  aoe: |
    [Annihilator AoE — Outside Void Metamorphosis]
    1. Cast Reap / Eradicate with 3 stacks of Voidfall.
    2. Cast Void Metamorphosis with 35+ Souls.
    3. Cast Eradicate (after full Void Ray channel — 25-yard frontal cone).
    4. Cast Void Ray with 100+ Fury. Aim to cast before meta for Fury refund.
    5. Cast Consume.

    [Annihilator AoE — During Void Metamorphosis]
    1. Cast Eradicate.
    2. Cast Void Ray (on cooldown).
    3. Cast Collapsing Star when at 30 Souls.
    4. Cast Cull with 4+ Soul Fragments for priority damage.
    5. Cast Devour.

    [Void-Scarred AoE — Outside Void Metamorphosis]
    1. Cast Hungering Slash.
    2. Cast Vengeful Retreat with Voidstep.
    3. Cast The Hunt to put it on cooldown.
    4. Cast Voidblade to put it on cooldown.
    5. Cast Void Metamorphosis with 35+ Souls.
    6. Cast Eradicate.
    7. Cast Void Ray with 100+ Fury.
    8. Cast Consume.

    [Void-Scarred AoE — During Void Metamorphosis]
    1. Cast Reaper's Toll.
    2. Cast Vengeful Retreat with Voidstep.
    3. Cast Pierce the Veil.
    4. Cast Eradicate.
    5. Cast Void Ray (on cooldown).
    6. Cast Collapsing Star when at 30 Souls.
    7. Cast Cull with 4+ Soul Fragments for priority damage.
    8. Cast Devour.

    [Both — AoE Notes]
    - In AoE, Reap/Cull casts are replaced by Eradicate procs. Eradicate triggers after full Void Ray via Moment of Craving.
    - Void-Scarred melee combo: Outside: The Hunt/Voidblade -> Hungering Slash -> Vengeful Retreat. Inside: Predator's Wake/Pierce the Veil -> Reaper's Toll -> Vengeful Retreat. Can be 3-part combos or a 6-part cycle.
    - Emptiness vs Soul Glutton depends on pull size: Soul Glutton for shorter pulls, Emptiness for longer.
  opener: |
    [Annihilator Single-Target Opener]
    Note: Annihilator has few cooldowns, so it opens straight into its standard rotation.
    1. Pre-cast Consume 1 second before pull.
    2. Cast Reap when you can proc Voidfall.
    3. Cast Consume until you reach 100 Fury.
    4. Cast Void Ray (channel fully).
    5. Repeat the above until Void Metamorphosis is ready.
    6. Cast Reap.
    7. Cast Voidblade.
    8. Cast Void Metamorphosis.
    9. Cast Void Ray.
    10. Cast Collapsing Star.
    11. Cast Cull.

    [Void-Scarred Single-Target Opener]
    1. Pre-cast Consume 1 second before pull.
    2. Cast Reap.
    3. Cast Reap.
    4. Cast Consume until 100 Fury.
    5. Cast Void Ray (channel fully).
    6. Cast Reap.
    7. Repeat until Void Metamorphosis is ready.
    8. Cast Reap.
    9. Cast Voidblade.
    10. Cast Void Metamorphosis.
    11. Use any on-use trinkets or potions.
    12. Cast Cull.
    13. Cast Void Ray.
    14. Cast Pierce the Veil.
    15. Cast Collapsing Star.
    16. Cast Cull.
    17. Cast Devour.

cooldowns: |
  - Void Metamorphosis (resource-gated) - Primary transformation. Accessed by collecting 50 Souls (35 with Soul Glutton). Fury passively drains; Void Ray and Collapsing Star pause drain.
  - Collapsing Star (resource-gated) - Massive damage, granted every 30 Souls during Void Metamorphosis. Midnight Apex makes it always crit and grants free cast on entry.
  - Void Ray (100 Fury outside meta / 16s hasted CD inside meta) - 25-yard range channel, roots you. Full channel rewards: Eradicate, Moment of Craving, Voidglare Boon (10 Fury), Final Breath (300% last tick).
  - Reap (8s base CD) - Instant, deals Cosmic damage, consumes Soul Fragments. Transforms into Eradicate after full Void Ray. Transforms into Cull during Void Metamorphosis.
  - Pierce the Veil (30s, Void-Scarred only) - Melee ability, triggers Devourer's Bite damage amp during Void Metamorphosis.
  - Voidblade (30s) - Leap to target, generates Fury, triggers Devourer's Bite damage amp.
  - Soul Immolation (30s) - Generates 30 Fury and shatters 3 Souls over 5 seconds.
  - Blur (1min, 2 charges) - 25% damage reduction for 10s.
  - Darkness (5min) - Group defensive; 15% (30% in dungeons) chance to avoid damage.
  - Void Nova (45s) - Ranged AoE stun (30-yard range, 3s).
  - Disrupt (15s) - 30-yard range interrupt.
  - Shift (20s, up to 3 charges) - 30-yard dash for mobility.

concepts: |
  - CRITICAL SPELL TRANSFORMATION: Reap transforms into Eradicate after fully channeling Void Ray. Eradicate is a 25-yard frontal cone retaining all Reap bonuses. In combat logs, Eradicate casts ARE transformed Reap casts.
  - CRITICAL SPELL TRANSFORMATION: Reap transforms into Cull during Void Metamorphosis. Cull cooldown reduced by 1s per Devour cast. In combat logs, Cull casts ARE transformed Reap casts.
  - Void Ray dual function: outside meta costs 100 Fury, no cooldown. Inside meta has 16s hasted CD, pauses Fury drain. Always fully channel for rewards.
  - Devourer is a 25-yard range caster/melee hybrid. Main damage (Void Ray, Collapsing Star) has long cast times interrupted by movement. Use Shift, Consume/Devour (castable while moving), Reap (instant) for movement.
  - Annihilator hooks into Reap via Voidfall stacks and Void Meteors.
  - Void-Scarred focuses on melee combos (Voidblade/Pierce the Veil) for Devourer's Bite damage amp, weaving between melee and ranged.
  - This is NOT Havoc DH. There is no Eye Beam, Chaos Strike, Blade Dance, or Sigil of Flame in the Devourer kit.

keyTalentChoices:
- node: "Soul Glutton / Emptiness"
  description: "Soul Glutton reduces Void Metamorphosis threshold to 35 Souls — better for shorter/smaller pulls. Emptiness extends Void Metamorphosis duration — better for larger/longer pulls."

commonMistakes:
- 'Not fully channeling Void Ray — missing Eradicate transformation, Moment of Craving Reap reset, Voidglare Boon Fury, and Final Breath damage'
- 'Casting Reap/Eradicate before 3 Voidfall stacks (Annihilator) — wasting the void meteor AoE bonus'
- 'Overcapping Voidfall stacks by casting Void Ray before spending stacks (Meteoric Rise grants a stack from Void Ray)'
- 'Not using Collapsing Star before it expires during Void Metamorphosis'
- 'Wasting Fury by overcapping — Fury cap is 120'
- 'Wasting Souls beyond the 50 cap by not entering Void Metamorphosis or casting Collapsing Star when available'
- 'Not siphoning Fury with Void Ray before entering Void Metamorphosis — entry refills Fury bar, wasting any remaining'
- 'Letting Reap/Cull sit at max charges — use aggressively'
- 'Moving during Void Ray or Collapsing Star channels'

patchChanges:
  12.0.1: 'Tier Set: 2pc Void Ray damage +10%. 4pc Collapsing Star damage +10% and generates 10 Fury. All damage reduced by 4% (Aura nerf).'
  '12.0': 'Devourer spec introduced as a new Demon Hunter specialization. Annihilator and Void-Scarred Hero Talent trees added.'
