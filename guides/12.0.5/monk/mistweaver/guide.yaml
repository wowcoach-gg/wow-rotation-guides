specId: 270
className: Monk
specName: Mistweaver
role: Healer
patch: "12.0.5"
guideVersion: 2

resourceManagement:
  primaryResource: Mana
  secondaryResource: Mana Tea Stacks
  resourceNotes: 'Mistweavers spend mana aggressively to generate Mana Tea stacks (up to 20). Use Mana Tea to regain mana; it no longer reduces the mana cost of spells in 12.0. Managing the rate of mana consumption via Lifecycles or Energizing Brew is key to maintaining throughput without going OOM.'

maintenanceBuffs:
  - spellId: 0
    spellName: Renewing Mist
    targetUptimePct: 95
    importance: critical
    coachingTip: 'Maintain Renewing Mist on as many targets as possible at all times. It is the primary driver for your healing via Invigorating Mists and Rapid Diffusion.'
  - spellId: 0
    spellName: Ancient Teachings
    targetUptimePct: 90
    importance: high
    coachingTip: 'Ensure Ancient Teachings is active by using Jadefire Teachings mechanics to convert your melee damage into healing.'
  - spellId: 0
    spellName: Mystic Touch
    targetUptimePct: 100
    importance: medium
    coachingTip: 'Apply this 5% physical damage debuff to enemies via any damage ability. Critical if your group has high physical damage dealers like Warriors or Hunters.'

