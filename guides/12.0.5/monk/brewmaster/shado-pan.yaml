specId: 268
className: Monk
specName: Brewmaster
role: Tank
heroTalent: 'Shado-Pan'
patch: "12.0.5"
guideVersion: 3
resourceManagement:
  primaryResource: Energy
  secondaryResource: Stagger
  resourceNotes: 'Energy is spent on Keg Smash, Tiger Palm, Spinning Crane Kick, and Expel Harm. Stagger turns incoming damage
    into a DoT effect. Shado-Pan auto-attacks generate Flurry Charges, which are spent by Flurry Strikes triggered automatically
    by Keg Smash.'
maintenanceBuffs:
- spellId: 0
  spellName: Shuffle
  targetUptimePct: 100
  importance: critical
  coachingTip: 'Maintain 100% uptime on Shuffle to empower your Stagger. Generate with Keg Smash, Blackout Kick, and Spinning
    Crane Kick.'
- spellId: 0
  spellName: Charred Passions
  targetUptimePct: 95
  importance: high
  coachingTip: Refresh Charred Passions with Breath of Fire to empower your Blackout Kick and Spinning Crane Kick.
- spellId: 0
  spellName: Rushing Jade Wind
  targetUptimePct: 90
  importance: medium
  coachingTip: Keep RJW active for consistent AoE threat and damage, especially before casting Exploding Keg.
tankingGuide:
  survivalPriority: |-
    These abilities take absolute priority over the damage rotation below.
    1. Maintain Shuffle at 100% uptime. Shuffle is essential for Stagger effectiveness.
       Generated by Blackout Kick, Keg Smash, and Spinning Crane Kick. If Shuffle drops, Stagger
       becomes ineffective and you will take massive spike damage.
    2. Use Purifying Brew when Stagger is high (red Stagger). Clears 50% of current Stagger.
       Never sit on 2 charges — use one if the second is about to cap. Save one charge for damage spikes.
    3. Use Celestial Brew / Celestial Infusion for absorb shields. Brew charges reduce its cooldown.
    4. Collect Healing Spheres (Gift of the Ox) with Expel Harm when low on health.
       One sphere spawns per 100% max HP taken as damage.
  defensiveCooldowns: |-
    - Fortifying Brew (4-6min): Major defensive. Increases health and reduces damage taken. CD reduced
      by Tiger Palm and Keg Smash. Use for dangerous pulls or tank busters.
    - Celestial Brew / Celestial Infusion (1min): Defensive absorb shield. Infusion provides a longer,
      partial absorb. Don't hold charges.
    - Black Ox Brew (2min): Resets Celestial Brew and Purifying Brew charges + restores Energy.
    - Invoke Niuzao, the Black Ox (95s, reduced by Efficient Training): Hybrid offensive/defensive.
      Stomp triggered by Blackout Kick. Purifying Brew heals Niuzao. Shado-Pan gets more frequent use.
    - Exploding Keg (1min): Enemy auto-attacks deal only 1 damage for a few seconds. Useful as a
      pseudo-defensive during heavy melee damage.
  staggerManagement: |-
    Stagger is the core Brewmaster mechanic. It converts incoming damage into a 10-15s DoT, smoothing
    damage intake. Shuffle increases Stagger effectiveness — without it, Stagger barely works.
    Purifying Brew is required to actually REDUCE the delayed damage. Stagger does NOT reduce total
    damage — it only DELAYS it. Monitor your Stagger bar color:
    green (low) = safe, yellow (medium) = consider purifying, red (high) = purify immediately.
    Mastery (Elusive Brawler) increases dodge chance each time you are hit or use Blackout Kick,
    resetting on dodge.

    IMPORTANT — How Brewmasters die: A big hit lands, ~50% is staggered, the remaining ~50% brings
    you low, then the first 1-2 Stagger ticks finish you off. This is inherent to the spec — not a
    misplay. The real questions are: Was a defensive CD available? Could you have pre-shielded with
    Celestial Brew? Was Purifying Brew ready to immediately clear the Stagger? Do NOT tell a Brewmaster
    they "died to bad Stagger management" — focus on defensive cooldown availability before the hit.

removedMechanics:
- Rising Sun Kick (and Strike at Dawn)
- Weapons of Order (and Call to Arms/Chi Surge)
- Clash
- Dampen Harm
- Diffuse Magic (now a passive enhancement to Fortifying Brew)
- Hit Scheme
- Black Ox Adept
- Heightened Guard
rotation:
  singleTarget: |
    1. Activate Black Ox Brew if you can avoid wasting resources (off-GCD)
    2. Use Touch of Death if enabled
    3. Use Blackout Kick to trigger Blackout Combo
    4. Activate Celestial Brew or Celestial Infusion if taking minimal damage or at two charges
    5. Trigger Invoke Niuzao, the Black Ox (only if combat will last >25s)
    6. Consume Blackout Combo buff with Tiger Palm
    7. Use a charge of Keg Smash or an active Empty Barrel (triggers Flurry Strikes)
    8. Use Breath of Fire to gain or refresh Charred Passions
    9. Throw Exploding Keg (ideally with Rushing Jade Wind active)
    10. Cast Chi Burst
    11. Use a charge of Keg Smash
    12. Use a spare charge of Purifying Brew if taking low damage for Special Delivery procs
    13. Reactivate Rushing Jade Wind
    14. Use Tiger Palm as filler if Energy permits for next Keg Smash
    15. Use Spinning Crane Kick as filler (do not use twice in a row to allow Press the Advantage stacks)
  aoe: |
    1. Activate Black Ox Brew (off-GCD)
    2. Use Touch of Death if enabled
    3. Use Blackout Kick to trigger Blackout Combo
    4. Activate Celestial Brew or Celestial Infusion if taking minimal damage or at two charges
    5. Trigger Invoke Niuzao, the Black Ox
    6. Consume Blackout Combo buff with Tiger Palm
    7. Use a charge of Keg Smash or an active Empty Barrel (triggers Flurry Strikes)
    8. Use Breath of Fire to gain or refresh Charred Passions
    9. Cast Chi Burst
    10. Throw Exploding Keg (ideally with Rushing Jade Wind active)
    11. Use a charge of Keg Smash
    12. Use a spare charge of Purifying Brew if taking low damage
    13. Reactivate Rushing Jade Wind
    14. Use Spinning Crane Kick if fighting 3+ enemies and Energy permits
  opener: |
    1. (Optional) Use Breath of Fire 3s before combat for Charred Passions
    2. Activate Rushing Jade Wind 1s before combat
    3. Use Chi Burst 1s before combat and move toward target
    4. Use Keg Smash while moving to target (optionally Provoke)
    5. Use Blackout Kick
    6. Use Breath of Fire to refresh Charred Passions
    7. Use Tiger Palm
    8. Use Exploding Keg
    9. Use Keg Smash
    10. Use Blackout Kick
    11. Activate Invoke Niuzao, the Black Ox
    12. Follow main single-target priority
cooldowns:
- name: Exploding Keg
  cooldown: 1min
  description: Short offensive burst. Resets Keg Smash cooldown. Melee attacks deal 1 damage for a few seconds after use.
- name: Invoke Niuzao, the Black Ox
  cooldown: 95s
  description: 'Hybrid offensive/defensive. Shado-Pan reduces this cooldown via Efficient Training. Triggers Stomp via Blackout
    Kick.'
- name: Fortifying Brew
  cooldown: '4-6min'
  description: Major defensive. Increases health and reduces damage. Cooldown reduced by Tiger Palm and Keg Smash.
- name: Touch of Death
  cooldown: 1.5min
  description: 'Execute ability. Use when target health < your max health or at 15% health if talented.'
- name: Celestial Brew / Celestial Infusion
  cooldown: 1min
  description: Defensive shield. Brew uses reduce cooldown. Infusion provides a longer, partial absorb.
- name: Purifying Brew
  cooldown: 20s recharge
  description: 'Clears 50% of current Stagger. Shado-Pan players see a combat text pop-up when Stagger is reduced.'
concepts:
- 'Flurry Strikes: Shado-Pan core mechanic. Triggered automatically by every cast of Keg Smash, spending Flurry Charges generated
  from auto-attacks. Provides significant bonus damage.'
- 'Blackout Combo: Blackout Kick empowers your next ability. Tiger Palm is the primary consumer for the Combo buff.'
- 'Charred Passions: Breath of Fire applies this buff, empowering Blackout Kick and Spinning Crane Kick damage. Maintain high
  uptime.'
- 'Press the Advantage: Shado-Pan talent. Do not cast Spinning Crane Kick twice in a row to allow stacks to accumulate.'
- 'Efficient Training: Shado-Pan talent that reduces Invoke Niuzao cooldown, allowing more frequent use.'
commonMistakes:
- 'Letting Shuffle drop below 100% uptime, drastically reducing Stagger effectiveness.'
- Casting Spinning Crane Kick twice in a row, preventing Press the Advantage stacks from building.
- Forgetting to consume Blackout Combo with Tiger Palm before using other abilities.
- Not maintaining Charred Passions by casting Breath of Fire regularly.
- Holding Purifying Brew too long when Stagger is dangerously high.
- Not using Keg Smash on cooldown to trigger Flurry Strikes consistently.
patchChanges:
  12.0.1: 'Rising Sun Kick removed from Brewmaster. Weapons of Order removed. Clash removed. Dampen Harm removed; Diffuse
    Magic reworked into passive Fortifying Brew enhancement. Shado-Pan: Flurry Strikes mechanic reworked to trigger from Keg
    Smash using auto-attack generated charges. Efficient Training added, reducing Invoke Niuzao cooldown for Shado-Pan players.'
