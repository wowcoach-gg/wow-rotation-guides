tankingGuide:
  staggerMechanic: |
    Stagger is the DEFINING mechanic of Brewmaster Monk and what makes it completely unique among tanks.
    Understanding Stagger is essential to coaching this spec correctly.

    HOW STAGGER WORKS:
    When a Brewmaster takes damage, a percentage of that damage is NOT taken immediately. Instead, it is
    converted into a damage-over-time (DoT) effect called "Stagger" that ticks every 0.5 seconds over
    10-15 seconds. The Brewmaster effectively spreads burst damage over time, giving healers a steady,
    predictable damage pattern instead of dangerous spikes.

    STAGGER PERCENTAGE:
    Base Stagger converts roughly 45% of physical damage and ~58% of magic damage (12.0 buff) into the
    DoT. With Shuffle active (100% uptime required), Stagger effectiveness is significantly increased —
    roughly doubling the amount staggered. Without Shuffle, Stagger is nearly useless and the Brewmaster
    will take massive spike damage.

    STAGGER THRESHOLDS (color-coded):
    - Light (Green): Stagger DoT is 1-29% of max HP. Safe — no action needed.
    - Moderate (Yellow): Stagger DoT is 30-59% of max HP. Consider using Purifying Brew.
    - Heavy (Red): Stagger DoT is 60%+ of max HP. Purify immediately — this is dangerous.

    PURIFYING BREW:
    The ONLY way to directly reduce Stagger. Each use clears 50% (60% for Master of Harmony) of the
    current Stagger pool. Has 2 charges on a 20-second recharge. Key rules:
    - Never sit on 2 charges — if the second charge is about to come off cooldown, use one.
    - Save at least 1 charge for dangerous moments (boss abilities, big pulls).
    - Purifying at Heavy (red) Stagger is almost always correct.
    - Purifying at Light (green) Stagger is almost always wasteful UNLESS you need to prevent capping charges.
    - In 12.0.1, using Purifying Brew can also trigger Elixir of Determination (absorb shield) and
      feed into Bring Me Another for Empty Barrel procs.

    STAGGER IS NOT DAMAGE REDUCTION:
    This is the most common misconception. Stagger does NOT reduce total damage taken — it only DELAYS it.
    Without Purifying Brew, the Brewmaster takes 100% of the original damage, just spread over time.
    The actual damage reduction comes from: (1) Purifying Brew removing delayed damage, (2) Celestial Brew
    absorb shields, (3) healing received during the delay window, and (4) Fortifying Brew's direct DR.

    HOW BREWMASTERS ACTUALLY DIE:
    Brewmaster deaths to Stagger are inherent to the spec and should NOT be treated as "misplay" by default.
    The typical death pattern is: (1) Brewmaster takes a massive hit, (2) ~50% of the damage is staggered
    (delayed), (3) the remaining ~50% that hits immediately brings the Brewmaster to low HP, (4) the first
    1-2 ticks of the Stagger DoT finish them off before healing arrives. This is like asking why a lit
    candle burned out — it is the natural consequence of how Stagger works. The real coaching questions are:
    - Did the Brewmaster have a defensive cooldown available for that hit? (Fortifying Brew, Celestial Brew,
      Dampen Harm, etc.)
    - Could they have pre-mitigated with Celestial Brew absorb shield BEFORE the big hit?
    - Was the healer aware the Brewmaster was about to take a big hit and topped them?
    - Was Purifying Brew available to immediately clear Stagger after the hit (before ticks killed them)?
    Do NOT say "you died because you didn't manage Stagger well" — that is almost never the real issue.
    Instead, focus on whether defensive cooldowns were available and used proactively.

    STAGGER INTERACTIONS:
    - Shuffle: MUST be active for Stagger to work properly. Generated by Keg Smash, Blackout Kick, SCK.
    - Touch of Death: Clears up to 200% of max HP worth of Stagger — massive defensive value.
    - Invoke Niuzao: Transfers a portion of Stagger damage to Niuzao. Purifying during Niuzao heals him.
    - Fortifying Brew + Determination: Increases Stagger effectiveness by 15% during its duration.
    - Mastery (Elusive Brawler): Grants dodge stacking — dodged attacks generate NO Stagger.
    - Celestial Fortune: Critical Strike gives a chance for healing received to be amplified by 65%.
    - Vitality (Master of Harmony): Does NOT empower shields. Spending Vitality via Celestial Brew/Infusion
      triggers the Aspect of Harmony buff (bonus damage and healing), which is a completely separate effect
      from the Celestial Brew absorb shield itself.

    COACHING STAGGER:
    When analyzing a Brewmaster's performance:
    - Check Shuffle uptime first. Below 95% is a critical problem.
    - Look at Purifying Brew usage — are they purifying at Heavy Stagger? Are they wasting charges
      at Light Stagger? Are they sitting on 2 charges?
    - For deaths: check whether defensive cooldowns were available but unused BEFORE the killing blow.
      Do NOT blame Stagger management unless Shuffle was down or Purifying Brew charges were clearly wasted.
    - High DTPS (damage taken per second) on a Brewmaster is NORMAL and expected — what matters is
      whether it's smooth (good Stagger management) or spiky (bad Shuffle/Purify usage).
    - A Brewmaster's effective health pool includes their Stagger pool. They can survive hits that
      would kill other tanks because the damage is delayed — but they will also die to the subsequent
      Stagger ticks if not healed or shielded in time. This is expected, not a mistake.

  survivalPriority: |
    These abilities take absolute priority over the damage rotation.
    1. Maintain Shuffle at 100% uptime. Without Shuffle, Stagger barely functions and you will take
       massive spike damage. Generated by Blackout Kick, Keg Smash, and Spinning Crane Kick.
    2. Use Purifying Brew when Stagger is Heavy (red) or Moderate (yellow) during dangerous moments.
       Never sit on 2 charges. Save one charge for damage spikes.
    3. Use Celestial Brew / Celestial Infusion proactively for absorb shields before predictable damage.
    4. Collect Healing Spheres (Gift of the Ox) with Expel Harm when low on health.
       One sphere spawns per 100% max HP taken as damage.

  defensiveCooldowns: |
    - Fortifying Brew (4-6min): Major defensive. Increases health, reduces damage taken, and increases
      Stagger effectiveness by 15% (Determination). CD reduced by Tiger Palm and Keg Smash.
    - Celestial Brew / Celestial Infusion (1min): Absorb shield. Don't hold charges.
    - Black Ox Brew (2min): Resets Celestial Brew and Purifying Brew charges + restores Energy.
    - Invoke Niuzao, the Black Ox (3min / 95s Shado-Pan): Hybrid offensive/defensive. Stomp triggered
      by Blackout Kick. Transfers Stagger to Niuzao. Purifying Brew heals Niuzao.
    - Exploding Keg (1min): Enemy auto-attacks deal only 1 damage for a few seconds — pseudo-defensive.

