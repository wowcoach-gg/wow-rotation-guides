rotation:
  singleTarget: |
    [General Priority]
    1. Activate Black Ox Brew (off-GCD) if you can avoid wasting resources.
    2. Use Touch of Death on an enemy if enabled.
    3. Use Blackout Kick to trigger Blackout Combo.
    4. (Master of Harmony) Cast Chi Burst.
    5. Activate Celestial Brew/Infusion if taking minimal damage to gain an Empty Barrel (Bring Me Another).
    6. Activate Celestial Brew/Infusion if at two charges or vitality is nearly full to trigger Harmonic Surge and gain an Empty Barrel.
    7. Trigger Invoke Niuzao, the Black Ox (if combat will last 25s+).
    8. Consume Blackout Combo buff with Tiger Palm (also spends Harmonic Surge stack).
    9. Use a charge of Keg Smash or an active Empty Barrel (triggers Flurry Strikes/Chi Wave).
    10. (Master of Harmony) Use Keg Smash if an Empty Barrel is active to trigger Potential Energy and drain vitality for bonus damage.
    11. Use Breath of Fire to gain or refresh Charred Passions buff.
    12. Throw Exploding Keg (ideally with Rushing Jade Wind active). Recast if Empty the Cellar is talented.
    13. (Shado-Pan) Cast Chi Burst.
    14. Use a charge of Keg Smash.
    15. Use a spare charge of Purifying Brew if taking very little damage for Special Delivery procs/Bring Me Another triggers.
    16. Reactivate Rushing Jade Wind.
    17. Use Tiger Palm as filler if Energy allows for the next Keg Smash.
    18. Use Spinning Crane Kick as filler (do not use twice in a row to avoid pausing auto-attacks for Press the Advantage).

  aoe: |
    [General Priority]
    1. Activate Black Ox Brew (off-GCD) if you can avoid wasting resources.
    2. Use Touch of Death on an enemy if enabled.
    3. Use Blackout Kick to trigger Blackout Combo.
    4. (Master of Harmony) Cast Chi Burst.
    5. Activate Celestial Brew/Infusion if taking minimal damage to gain an Empty Barrel.
    6. Activate Celestial Brew/Infusion if at two charges or vitality is nearly full to trigger Harmonic Surge and gain an Empty Barrel.
    7. Trigger Invoke Niuzao, the Black Ox.
    8. Consume Blackout Combo buff with Tiger Palm (even in AoE, due to Overwhelming Force/Harmonic Surge).
    9. Use a charge of Keg Smash or an active Empty Barrel.
    10. (Master of Harmony) Use Keg Smash if an Empty Barrel is active to trigger Potential Energy.
    11. Use Breath of Fire to gain or refresh Charred Passions.
    12. (Shado-Pan) Cast Chi Burst.
    13. Throw Exploding Keg (ideally with Rushing Jade Wind active).
    14. Use a charge of Keg Smash.
    15. Use a spare charge of Purifying Brew for Special Delivery/Bring Me Another.
    16. Reactivate Rushing Jade Wind.
    17. Use Spinning Crane Kick if Energy allows for the next Keg Smash. Do not use more than once in a row unless fighting 3+ enemies.
    18. Use Tiger Palm instead of Spinning Crane Kick if more Brew cooldown reduction is desired.

  opener: |
    1. (Optional) Use Breath of Fire 3s before combat for Charred Passions.
    2. Activate Rushing Jade Wind 1-2s before combat.
    3. Use Chi Burst 1s before combat and move toward target.
    4. Use Keg Smash while moving (optionally Provoke).
    5. Use Blackout Kick.
    6. Use Breath of Fire.
    7. Use Tiger Palm.
    8. Use Exploding Keg (or Invoke Niuzao).
    9. Use Keg Smash.
    10. Use Blackout Kick.
    11. Activate Invoke Niuzao (or Exploding Keg).
    12. Follow main priority.

cooldowns: |
  - Exploding Keg (1min): Short offensive burst. Resets Keg Smash cooldown. Causes enemies to deal only 1 damage with melee auto-attacks for a few seconds.
  - Invoke Niuzao, the Black Ox (3min / 95s for Shado-Pan): Hybrid CD. Deals massive AoE damage via Stomp. Transfers a portion of your Stagger to Niuzao.
  - Touch of Death (3min): Execute ability. Use when target is below your max HP for massive damage, or at 15% HP if talented into Improved Touch of Death.
  - Fortifying Brew (6min base, reduced by rotation): Major defensive. Increases health and reduces damage taken. Cooldown is significantly reduced by Keg Smash and Tiger Palm.
  - Celestial Brew / Celestial Infusion (1min base, reduced by rotation): Celestial Brew provides a large absorb shield. Celestial Infusion provides a 20% damage reduction shield for 16 seconds.
  - Purifying Brew (20s recharge, 2 charges): Clears 50% (60% for Master of Harmony) of current Staggered damage.

concepts: |
  - Stagger: The CORE Brewmaster mechanic. When you take damage, a large percentage is NOT taken immediately — instead it becomes a DoT ticking over 10-15 seconds. This delays damage but does NOT reduce it. You MUST use Purifying Brew to actually remove the delayed damage. Stagger thresholds: Light/Green (1-29% max HP) = safe, Moderate/Yellow (30-59%) = consider purifying, Heavy/Red (60%+) = purify immediately. Without Shuffle active, Stagger barely functions.
  - Shuffle: A buff that must be maintained at 100% uptime. It roughly doubles the amount of damage converted to Stagger. Without it, you take massive spike damage. Generated by Keg Smash, Blackout Kick, and Spinning Crane Kick.
  - Blackout Kick (Blackout+3): The rotation is built around Blackout Kick's 4s static cooldown. You fit 3 other abilities between every Blackout Kick.
  - Bring Me Another (Apex Talent): Using Brews has a chance to grant an Empty Barrel, making your next Keg Smash free, reset its cooldown, and deal bonus damage.
  - Healing Spheres (Gift of the Ox): Spawns a sphere for every 100% of max HP taken in damage. Collect by walking over them or using Expel Harm.
  - Niuzao's Resolve: A talent that turns Healing Spheres into a HoT rather than instant healing, smoothing out damage intake but reducing emergency agency.
  - Blackout Combo: Empowers the next ability after Blackout Kick. Usually used on Tiger Palm for damage or Keg Smash for extra Brew CDR in emergencies.
  - Mastery (Elusive Brawler): Grants stacking dodge chance every time you are hit or use Blackout Kick. Reset upon a successful dodge.
  - Celestial Fortune: A passive chance for any healing or absorbs received to be increased by 65% based on Critical Strike.
  - Shado-Pan Playstyle: Focuses on Flurry Strikes triggered by Keg Smash and auto-attack charges.
  - Master of Harmony Playstyle: Focuses on building Vitality through damage/healing and spending it via Celestial Brew/Infusion for Harmonic Surges.

commonMistakes:
  - 'Letting Shuffle uptime drop below 100%'
  - 'Holding both charges of Purifying Brew instead of using one to clear Stagger'
  - 'Overcapping Energy and being unable to cast Keg Smash on cooldown'
  - 'Using Spinning Crane Kick twice in a row, which pauses auto-attacks and slows Press the Advantage stacking'
  - 'Wasting Empty Barrel procs by not casting Keg Smash immediately'
  - 'Using Expel Harm as an emergency heal when talented into Niuzao’s Resolve (it becomes a HoT)'
  - 'Standing outside of melee range and losing auto-attack Flurry Charge generation (Shado-Pan)'

patchChanges: |
  12.0.1:
  - Introduction of Apex Talent: Bring Me Another (4 points).
  - Rotation updated to prioritize Empty Barrel procs from Bring Me Another.
  12.0 (Midnight):
  - Pruning: Rising Sun Kick, Weapons of Order, Clash, and Dampen Harm removed.
  - Diffuse Magic reworked into a passive for Fortifying Brew.
  - Shado-Pan redesigned: Flurry Strikes now trigger from Keg Smash instead of Energy spend.
  - Master of Harmony: Coalescence capstone now empowers Keg Smash automatically.
  - Stagger communication improved with combat text pop-ups for purified amounts.
  - Purifying Brew now glows during "Elevated Stagger" events.