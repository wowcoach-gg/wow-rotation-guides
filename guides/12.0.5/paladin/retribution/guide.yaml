specId: 70
className: Paladin
specName: Retribution
role: DPS
patch: "12.0.5"
guideVersion: 2

resourceManagement:
  primaryResource: Holy Power
  secondaryResource: Mana
  resourceNotes: 'Retribution gameplay revolves around managing Holy Power (max 5). You generate Holy Power with builders like Blade of Justice, Judgment, and Wake of Ashes, and spend it on powerful finishers like Final Verdict and Divine Storm. Minimizing Holy Power waste is the top priority; do not generate Holy Power when at 5. However, it is acceptable to waste 1 Holy Power with Blade of Justice if an Art of War proc occurs to avoid overwriting the Light Within effect.'

