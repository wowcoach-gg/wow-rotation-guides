    spellName: Expurgation
    targetUptimePct: 95
    importance: high
    coachingTip: 'Keep Expurgation active on your target as it significantly buffs your other damage.'
  - spellId: 0
    spellName: Judgment Debuff
    targetUptimePct: 90
    importance: high
    coachingTip: 'Ensure Judgment debuffs are applied to enemies to increase the damage they take from your spenders.'
  - spellId: 0
    spellName: Devotion Aura
    targetUptimePct: 100
