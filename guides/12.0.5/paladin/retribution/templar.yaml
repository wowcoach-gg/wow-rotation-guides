specId: 70
className: Paladin
specName: Retribution
role: DPS
heroTalent: Templar
patch: "12.0.5"
guideVersion: 3

resourceManagement:
  primaryResource: Mana
  secondaryResource: Holy Power
  resourceNotes: 'Generate Holy Power with Blade of Justice, Judgment, and Templar Strikes/Crusading Strikes.
    Spend on Final Verdict (ST) or Divine Storm (AoE). Templar gains Hammer of Light as a powerful spender
    available after Wake of Ashes. Never overcap Holy Power.'

maintenanceBuffs:
- spellId: 0
  spellName: Expurgation
  targetUptimePct: 95
  importance: high
  coachingTip: 'Keep Expurgation active on primary target via Blade of Justice.'
- spellId: 0
  spellName: Judgment
  targetUptimePct: 90
  importance: high
  coachingTip: 'Keep Judgment debuff applied to enemies to increase Holy Power spender damage.'

removedMechanics:
- Final Reckoning (removed in 12.0, merged into Execution Sentence)
- Of Dusk and Dawn (removed in 12.0)
- Divine Arbiter (removed in 12.0)
- Searing Light (removed in 12.0)
- Hammer of Wrath (reworked to upgrade Judgment during Avenging Wrath)
- Shield of Vengeance (reworked to passive on Divine Protection)
- Radiant Glory (reworked to no longer proc AW randomly)

rotation:
  singleTarget: |-
    Priority (start from top, use first ability with criteria met):
    1. Cast Avenging Wrath.
    2. Cast Execution Sentence.
    3. Cast Hammer of Light (Templar signature — available after Wake of Ashes).
    4. Cast Final Verdict if you have 5 Holy Power.
    5. Cast Wake of Ashes (activates Hammer of Light for Templar).
    6. Cast Divine Toll.
    7. Cast Hammer of Wrath with an Art of War proc.
    8. Cast Blade of Justice with an Art of War proc (prioritize for Light Within).
    9. Cast Divine Storm if you have an Empyrean Power proc.
    10. Cast Final Verdict.
    11. Cast Hammer of Wrath.
    12. Cast Blade of Justice.
    13. Cast Hammer of Wrath.
    14. Cast Judgment.
    15. Cast Templar Strikes or Templar Slash.
    16. Cast Crusader Strike.
  aoe: |-
    Swap to AoE at 2+ targets with AoE talents, or 3+ with ST talents.
    1. Cast Avenging Wrath.
    2. Cast Execution Sentence.
    3. Cast Hammer of Light.
    4. Cast Divine Storm if you have 5 Holy Power.
    5. Cast Wake of Ashes.
    6. Cast Divine Toll.
    7. Cast Hammer of Wrath with an Art of War proc.
    8. Cast Blade of Justice with an Art of War proc.
    9. Cast Final Verdict if you have Empyrean Legacy active.
    10. Cast Divine Storm.
    11. Cast Hammer of Wrath.
    12. Cast Blade of Justice.
    13. Cast Hammer of Wrath.
    14. Cast Judgment.
    15. Cast Templar Strikes or Templar Slash.
    16. Cast Crusader Strike.
  opener: |-
    1. Cast Avenging Wrath.
    2. Cast Execution Sentence.
    3. Cast Wake of Ashes (activates Hammer of Light).
    4. Cast Divine Toll.
    5. Cast Hammer of Light.
    6. Cast Final Verdict.
    7. Cast Final Verdict.
    8. Cast Divine Toll.
    9. Continue with regular priority.

cooldowns:
- name: Avenging Wrath / Crusade
  cooldown: 60s (with Crusade, provides stacking Haste buff)
  description: 'Major offensive cooldown. Increases damage and crit. Converts Judgment into Hammer of Wrath.
    Use before other cooldowns.'
- name: Execution Sentence
  cooldown: 60s
  description: 'Deals initial AoE damage, then after 10s deals damage to primary target based on damage
    done during window. Use before Wake of Ashes.'
- name: Wake of Ashes
  cooldown: 30s
  description: 'High damage AoE burst, generates Holy Power. For Templar, this is the activator for
    Hammer of Light.'
- name: Divine Toll
  cooldown: 1min
  description: 'Instantly casts Judgment on multiple targets, generating significant Holy Power.'
- name: Divine Shield
  cooldown: 5min
  description: 'Full immunity to all damage and effects.'
- name: Divine Protection
  cooldown: 1min
  description: 'Personal defensive. Shield of Vengeance is now passive on this ability.'

concepts:
- 'Hammer of Light: Templar''s signature ability. Available after casting Wake of Ashes. High-priority
  spender during burst windows. NOTE: For Ret, Wake of Ashes activates it. For Prot, Divine Toll activates it.'
- 'Empyrean Hammers: Templars passively rain hammers from the sky through various spells and buffs,
  providing consistent AoE pressure. Shake the Heavens summons these after Hammer of Light.'
- 'Holy Power Management: Core loop is generating and spending HP. Never overcap. Worth wasting 1 HP with
  Blade of Justice + Art of War to avoid overwriting Light Within procs.'
- 'Light Within (Apex Talent): Blade of Justice damage increased, procs AoE on Art of War/Righteous Cause
  triggers. Prioritize BoJ with procs.'
- 'Divine Resonance: Reworked — now duplicates next Judgment casts instead of casting them periodically.'
- 'Radiant Glory: Reworked — no longer procs AW randomly, making 1-minute burst windows more predictable.'
- 'Judgment Upgrade: During Avenging Wrath, Judgment becomes Hammer of Wrath with all Judgment talent
  buffs inherited.'
- '1-Minute Windows: Retribution focuses on 60-second intervals where AW, Execution Sentence, and Divine
  Toll align for maximum burst.'
- 'Utility: Ret brings Blessings, Cleanse Toxins, and Intercession (combat rez). Balance HP spenders with
  Word of Glory healing when needed.'
- 'Mobility: Divine Steed is the primary movement tool. Ret can deal some damage at range which mitigates
  mobility weaknesses.'
- 'Templar vs Herald: Templar slightly ahead on damage. Herald focuses on periodic damage (Dawnlight);
  Templar focuses on burst (Hammer of Light + Empyrean Hammers).'

commonMistakes:
- Overcapping Holy Power by generating when already at 5.
- Wasting Hammer of Light by not casting it within the window after Wake of Ashes.
- Misaligning 1-minute cooldowns (AW and Execution Sentence).
- Wasting Art of War procs, causing Light Within bonus to be overwritten.
- Standing out of melee range for too long.

patchChanges:
  12.0.1: 'Templar: Shake the Heavens damage increased by 20%.'
  '12.0': 'Major rework. HoW reworked into Judgment upgrade. Shield of Vengeance now passive. Execution
    Sentence redesigned to 60s CD including Final Reckoning effects. Divine Resonance now duplicates next
    Judgment casts. Radiant Glory no longer procs AW randomly. Crusading Strikes changed to reduce attack
    speed but grant HP on every hit.'
