specId: 66
className: Paladin
specName: Protection
role: Tank
patch: "12.0.5"
guideVersion: 2

resourceManagement:
  primaryResource: Mana
  secondaryResource: Holy Power
  resourceNotes: 'Generate Holy Power with Judgment, Hammer of Wrath (during Avenging Wrath), Blessed Hammer/Hammer of the Righteous, and Avenger''s Shield (when Vanguard is active). Spend Holy Power on Shield of the Righteous for mitigation or Word of Glory for healing. Never overcap 5 Holy Power; spend at 3-5 Holy Power. Mana is primarily a constraint when using utility or off-healing allies with Hand of the Protector.'

maintenanceBuffs:
  - spellId: 0
    spellName: Shield of the Righteous
    targetUptimePct: 90
    importance: critical
    coachingTip: 'Main damage mitigation. Aim to have this active nearly all the time in combat. Increases Armor based on Strength.'
  - spellId: 0
    spellName: Consecration
    targetUptimePct: 85
    importance: high
    coachingTip: 'Stand in Consecration for Mastery bonus (Block/Spell Block) and 5% damage reduction from the Sanctuary talent.'
  - spellId: 0
    spellName: Devotion Aura
    targetUptimePct: 100
    importance: high
    coachingTip: 'Ensure Devotion Aura is active for a flat 3% damage reduction for the group unless another Paladin is providing it.'

playstyles:
  - id: lightsmith
    name: Lightsmith
    detectionCriteria:
      heroTalents:
        - "Lightsmith"
  - id: templar
    name: Templar
    detectionCriteria:
      heroTalents:
        - "Templar"

rotation:
  singleTarget: |
    [General] Single Target Priority:
    1. Cast Avenging Wrath on cooldown.
    2. Cast Sacred Weapon (Lightsmith) if Avenging Wrath is not active.
    3. Cast Divine Toll on cooldown.
    4. Cast Hammer of Light (Templar) when available after Divine Toll.
    5. Cast Consecration if you are not currently standing in it.
    6. Cast Avenger's Shield.
    7. Cast Shield of the Righteous when at 3-5 Holy Power to prevent overcapping.
    8. Cast Hammer of Wrath (if in AW) or Judgment.
    9. Cast Hammer of the Righteous / Blessed Hammer.
    10. Cast Avenger's Shield (filler).
    11. Cast Arcane Torrent (Blood Elf racial) for Holy Power.
    12. Cast Word of Glory if you have a charge of Shining Light and are below 50% Health.
    13. Cast Consecration if everything else is on cooldown to refresh duration.
  aoe: |
    [General] AoE Priority:
    1. Cast Avenging Wrath on cooldown.
    2. Cast Sacred Weapon (Lightsmith) if Avenging Wrath is not active.
    3. Cast Divine Toll on cooldown.
    4. Cast Hammer of Light (Templar) when available.
    5. Cast Consecration if you are not standing in it.
    6. Cast Avenger's Shield.
    7. Cast Shield of the Righteous when at 3-5 Holy Power to prevent overcapping.
    8. Cast Avenger's Shield (priority in AoE for Bulwark of Order/Refining Fire).
    9. Cast Hammer of Wrath / Judgment.
    10. Cast Hammer of the Righteous / Blessed Hammer.
    11. Cast Arcane Torrent (Blood Elf racial).
    12. Cast Word of Glory if you have a charge of Shining Light and are below 50% Health.
    13. Cast Consecration as filler.
  opener: |
    1. Pre-place Consecration where you will be fighting.
    2. Pull the enemy with Hand of Reckoning.
    3. Cast Blessed Hammer on the way in for Holy Power.
    4. Cast Avenging Wrath.
    5. Cast Divine Toll.
    6. Cast Hammer of Light.
    7. Cast Shield of the Righteous.
    8. Cast Hammer of Wrath.
    9. Cast Shield of the Righteous.
    10. Cast Avenger's Shield.
    11. Cast Blessed Hammer.
    12. Cast Shield of the Righteous.
    13. Cast Arcane Torrent (if Blood Elf).

cooldowns: |
  - Guardian of Ancient Kings (3m): 50% damage reduction for 8s. Now has 2 charges. Use for heavy predictable damage.
  - Ardent Defender (1.5m): 20% damage reduction for 8s. Prevents death once while active. Use proactively or as a safety net.
  - Avenging Wrath / Sentinel (1m): Increases damage and healing by 20%. Sentinel provides health and damage reduction stacks.
  - Divine Shield (5m): Total immunity. Use with Final Stand talent to AoE taunt, or use Hand of Reckoning to maintain threat.
  - Divine Toll (1m): Fires 5 Avenger's Shields, generating massive Holy Power and providing an absorb shield via Bulwark of Order.
  - Lay on Hands (10m): Emergency full heal. Best used on yourself or a critical ally.
  - Blessing of Protection / Spellwarding (5m): Physical or Magic immunity. Removes bleeds. Note: BoP causes threat loss unless using a cancelaura macro.
  - Blessing of Sacrifice (2m): External damage reduction for an ally. 30% of damage they take is transferred to you.

concepts: |
  - Holy Power Cycle: Generate with builders (Judgment, Hammers) and spend on Shield of the Righteous (Mitigation) or Word of Glory (Healing).
  - Mastery (Divine Bulwark): Increases Block and Spell Block chance. Provides bonus Armor while standing in Consecration.
  - Vanguard (Apex Talent): Judgment procs Vanguard, making the next Avenger's Shield deal damage to all enemies in a line and generate up to 3 Holy Power.
  - Shining Light: Every 3 Shield of the Righteous casts makes your next Word of Glory free. Can hold up to 2 charges.
  - Righteous Protector: Spending Holy Power reduces the remaining cooldown of Avenging Wrath and Guardian of Ancient Kings.
  - Sanctuary: While in Consecration, you take 5% reduced damage. This effect persists for 4s after leaving the area.
  - Bulwark of Order: Avenger's Shield grants an absorb shield for 25% of damage dealt, capped at 30% of max health.
  - Templar Playstyle: Revolves around Divine Toll activating Hammer of Light. Empyrean Hammers fall during Shake the Heavens windows.
  - Lightsmith Playstyle: Focuses on Holy Armaments (Holy Bulwark/Sacred Weapon) that provide shields or damage/healing procs to you and allies.
  - Threat Management: Tanks have a 10.5x threat multiplier. Hand of Reckoning forces a 3s fixate and increases threat generation by 8x.

removedMechanics: |
  - Eye of Tyr (Removed in 12.0)
  - Moment of Glory (Removed in 12.0)
  - Bastion of Light (Removed in 12.0)
  - Barricade of Faith (Removed in 12.0)
  - Judgment of Light (Removed in 12.0)
  - Hammer of Wrath (Reworked: Now a passive replacing Judgment during Avenging Wrath)
  - Repentance (Removed in 12.0)
  - Resolute Defender (Removed in 12.0; cooldown reduction via Holy Power spending no longer exists)

commonMistakes:
  - 'Overcapping Holy Power (going above 5) instead of spending on Shield of the Righteous.'
  - 'Standing outside of Consecration, losing Mastery bonuses and the 5% damage reduction from Sanctuary.'
  - 'Casting Shield of the Righteous at 3 Holy Power when not actively tanking, leaving no resources for emergency healing.'
  - 'Using Word of Glory without a Shining Light charge when health is above 50%, wasting Holy Power that could be used for mitigation.'
  - 'Holding major defensives like Guardian of Ancient Kings too long instead of utilizing the 2 charges proactively.'
  - 'Using Divine Shield without the Final Stand talent or Hand of Reckoning, causing the boss to kill your party members.'
  - 'Healing allies too frequently with Hand of the Protector and running out of Mana for your core rotation.'

patchChanges: |
  12.0.1:
  - Templar: Shake the Heavens damage increased by 20%.
  - Lightsmith: Holy Armaments duration extended to 30s.
  12.0:
  - Eye of Tyr, Moment of Glory, Bastion of Light, Barricade of Faith, and Resolute Defender removed.
  - Guardian of Ancient Kings cooldown reduced to 3 minutes and gained a second charge.
  - Mastery reworked to focus on Block and Spell Block.
  - Hammer of Wrath became a passive replacing Judgment during Avenging Wrath.
  - New Apex Talents (Glory of the Vanguard) added to the end of the tree.
  - New talents: Valiant Crusade, Solace, Instrument of the Divine, Sweeping Verdict, Empyrean Authority.