resourceManagement:
  primaryResource: Mana
  secondaryResource: None
  resourceNotes: 'Mana is the primary constraint. Restoration Druids can burn through Mana quickly, so filler spells like Rejuvenation should be aligned with high damage periods. Generate Mana via the Master Shapeshifter talent by casting Wrath during downtime. Use Innervate to make spells free for 8 seconds, ideally when chain-casting Rejuvenation. Avoid over-casting Regrowth without high Abundance stacks to prevent going OOM.'

maintenanceBuffs:
  - spellId: 0
    spellName: Efflorescence
    targetUptimePct: 100
    importance: critical
    coachingTip: 'Keep Efflorescence under a group of players (usually melee). With the Lifetreading talent, Efflorescence is FULLY PASSIVE — it spawns automatically under the Lifebloom target with no manual cast required. If the player has Lifetreading, evaluate Efflorescence uptime by checking Lifebloom uptime instead. Zero Efflorescence casts is EXPECTED with Lifetreading.'
  - spellId: 0
    spellName: Lifebloom
    targetUptimePct: 100
    importance: critical
    coachingTip: 'Keep on a tank or player taking heavy damage. Avoid moving it too often as it takes time to restack to 3. In dungeons, this makes the target nearly immortal via the Apex: Everbloom talent.'
  - spellId: 0
    spellName: Mark of the Wild
    targetUptimePct: 100
    importance: high
    coachingTip: 'This is a powerful raid buff. Ensure it is active on the entire group before every pull.'

