specId: 105
className: Druid
specName: Restoration
role: Healer
heroTalent: Wildstalker
patch: "12.0.5"
guideVersion: 3

resourceManagement:
  primaryResource: Mana
  secondaryResource: Combo Points
  resourceNotes: >
    Mana is your primary resource for healing. Use the Abundance talent to reduce Regrowth costs
    by layering Rejuvenation. Master Shapeshifter provides mana regeneration when casting Wrath.
    Wildstalker players can optionally use Energy and Combo Points in Cat Form to apply bleeds for
    damage and Bloodseeker Vine procs, but catweaving is NOT required — Wildstalker is primarily
    played for its healing capability.

maintenanceBuffs:
  - spellId: 0
    spellName: Efflorescence
    targetUptimePct: 100
    importance: critical
    coachingTip: >
      Keep Efflorescence active under the group at all times. Lifetreading talent makes it
      automatically follow your Lifebloom target. Efflorescence healing can proc Symbiotic Blooms.
  - spellId: 0
    spellName: Lifebloom
    targetUptimePct: 100
    importance: critical
    coachingTip: >
      Keep Lifebloom on the tank or a player taking heavy damage. Limited to one target.
      Everbloom Rank 1: stacks to 3 automatically every 5 seconds (refreshing keeps stacks).
      Everbloom Rank 2/3: cleaves 15/30% of healing to two nearby allies.
      Picking the correct Lifebloom target is crucial — your strongest ST heal in Midnight,
      and Efflorescence + related talents are tied to it.
  - spellId: 0
    spellName: Mark of the Wild
    targetUptimePct: 100
    importance: high
    coachingTip: Ensure this raid buff is active on all party members before combat.
  - spellId: 0
    spellName: Symbiotic Bloom
    targetUptimePct: 0
    importance: medium
    coachingTip: >
      Procs passively from Wild Growth, Regrowth, and Efflorescence healing. Increases healing
      done to the affected target via Vigorous Creepers. Bursting Growth procs when you cast
      Rejuvenation on targets with Symbiotic Blooms — prioritize Rejuvenation on these targets.

