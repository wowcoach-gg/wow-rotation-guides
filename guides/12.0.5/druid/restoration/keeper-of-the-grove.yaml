- Forest's Flow (Removed in 12.0)
- Invigorate (Removed in 12.0)
- Wildwood Roots (Removed in 12.0)
- Dreamstate (Removed in 12.0)
- Budding Leaves (Removed in 12.0)
- Twinleaf (Removed in 12.0)
- Flash of Clarity (Removed in 12.0)
- Flourish as active ability (Now passive during Tranquility)
- Grove Guardians as active button (Now passive on Swiftmend/Wild Growth)
- 'Ramping: Spread Rejuvenation before burst healing (Tranquility/Convoke) to maximize extension value.'
- 'Catweaving: Use Fluid Form to swap to Cat Form for damage during healing downtime.'
commonMistakes:
- Letting Efflorescence drop — loses significant passive healing and Verdancy procs.
- Casting Regrowth with zero or low Abundance stacks — rapid mana depletion.
- Holding Swiftmend or Wild Growth too long — missing Grove Guardian spawns and healing value.
- Not using Innervate early enough — aim for ~80% mana, maximize total uses per fight.
- Not tracking Reforestation stacks — missing free Tree of Life procs for Convoke windows.
- Not macro'ing Nature's Swiftness into Convoke — missing consistent buff during channel.
- Ignoring Wrath during downtime — missed Master Shapeshifter mana returns.
- Moving Lifebloom too frequently — prevents Everbloom from reaching 3-stack maximum.
- Using Convoke without being in Tree of Life form when Reforestation is available.
- Forgetting that Flourish is now passive during Tranquility — don't look for a separate Flourish button.
patchChanges:
  12.0.5: 'Everbloom R2 reworked: when Lifebloom''s final bloom occurs, heals 6 allies within 40y for
    25%/50% of healing amount. Everbloom R3 nerfed: Blooming Frenzy triggers 3 times (was 5). Wrath, Starfire,
    Starsurge damage +40%. Sunfire, Moonfire damage +25%. April 17 hotfixes: All healing -6%, Rejuvenation/Germination/Tranquility/Wild
    Growth +10%, Embrace of the Dream +35%.'
  12.0.1: Reviewed for Midnight Season 1. KotG is go-to for raiding. Dream Surge nerfed (2 petals from 3). Cenarius' Might
    reworked (+20% Swiftmend healing). Early Spring reworked (-1s on WG/SM CDs). Sylvan Beckoning new (periodic heals can
    empower Swiftmend to summon Dryad casting 10% Tranquility).
  '12.0': Grove Guardians changed from active to passive (proc on Swiftmend/Wild Growth). Flourish removed as active CD; now
    passive during Tranquility (extends HoTs up to 14s). Everbloom Apex Talent added. Mastery reworked (11.4% per HoT, falls
    off over time). Cultivation reworked (instant heal below 60%). Power of the Archdruid reworked (SotF applies to 2 extra
    allies). Regrowth crits for 260% (was 200%). Photosynthesis reworked (no longer 10% healing rate; bloom chance 8%). Tranquility
    direct healing +40%, no longer applies HoT. Lifebloom limited to one target. Heart of the Wild reworked to 2min form-dependent
    CD. Many talents removed (see removedMechanics).
