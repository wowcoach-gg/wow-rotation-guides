rotation:
  singleTarget: |
    [General Priority]
    1. Maintain Moonfire on the target at all times.
    2. Maintain 5 stacks of Thrash.
    3. Cast Barkskin off cooldown (unless Brambles is not talented or saving for a specific hit).
    4. Cast Maul when possible (spend excess Rage).
    5. Cast Mangle on cooldown.
    6. Cast Thrash.
    7. Cast Moonfire when Galactic Guardian procs.
    8. Cast Incarnation: Guardian of Ursoc.
    9. Cast Swipe only if you have no other buttons to press.

    [Druid of the Claw / Ripweaving Specifics]
    - Use Rake to shift into Cat Form via Fluid Form.
    - Apply empowered Rip (from Wildpower Surge) and shift back to Bear Form using Mangle.
    - Ensure Mangle is not on cooldown before shifting to Cat Form.
  aoe: |
    [General Priority]
    1. Maintain 5 stacks of Thrash on all targets.
    2. Cast Barkskin off cooldown.
    3. Cast Raze when possible (replaces Maul as the primary Rage spender for 2+ targets).
    4. Cast Thrash.
    5. Cast Mangle.
    6. Cast Incarnation: Guardian of Ursoc.
    7. Cast Moonfire (lower priority in AoE as Galactic Guardian/Twin Moonfire spreads it).
    8. Cast Swipe as the absolute lowest priority filler.

    [Elune's Chosen Specifics]
    - Prioritize Lunar Beam on cooldown for high AoE burst and safety during pull ramp-up.
  opener: |
    [Single-Target Opener]
    1. Cast Growl
    2. Cast Moonfire
    3. Cast Thrash
    4. Cast Incarnation: Guardian of Ursoc
    5. Cast Thrash
    6. Cast Mangle
    7. Cast Thrash
    8. Cast Maul
    9. Cast Mangle
    10. Cast Thrash
    11. Cast Maul
    12. Cast Mangle

    [AoE Opener]
    1. Pull mobs from ranged with Moonfire.
    2. Cast Barkskin.
    3. Cast Thrash.
    4. Cast Mangle to generate Rage.
    5. Dump all Rage into Raze while maintaining 1-3 stacks of Ironfur depending on damage.
    6. Cast Thrash.
    7. Cast Mangle.
    8. Dump Rage into Raze.

cooldowns: |
  - Incarnation: Guardian of Ursoc (2-3 min): Major offensive and defensive cooldown. Increases health, reduces Thrash/Mangle cooldowns, and makes Mangle hit 3 targets. Use rotationally for DPS or save for high-danger phases.
  - Barkskin (40-60s): Short defensive cooldown. Reduces damage taken and deals damage via Brambles. Use almost on cooldown to smooth damage intake.
  - Survival Instincts (3 min): Major defensive with 2 charges. Reduces damage taken by 50%. Save for predictable massive hits or emergency situations.
  - Frenzied Regeneration (36s charge): Core self-heal. Use proactively after taking large spikes of damage.
  - Lunar Beam (Elune's Chosen): Short cooldown Arcane burst that provides a large Mastery bonus and healing. Use at the start of pulls for aggro and safety.
  - Heart of the Wild (5 min): Use every 2 minutes by shifting to Cat Form to apply a massive DoT in single-target scenarios (if safe).

concepts: |
  - Rage Management: Guardian is a proactive tank. You must generate Rage with builders (Mangle, Thrash) and spend it on Ironfur before damage arrives.
  - Ironfur Stacking: Unlike many mitigations, Ironfur stacks. Multiple applications overlap their armor bonuses but not their durations.
  - Galactic Guardian: Procs boost the damage of your next Moonfire by 300% and generate 8 extra Rage. These are high priority to prevent munching procs.
  - Mastery (Nature's Guardian): Increases health and healing received, and increases Attack Power. Elune's Chosen further enhances this via Lunar Beam.
  - Ripweaving: A safe form of Catweaving using Fluid Form and Wildpower Surge. Cast Mangle 6 times, use Rake to auto-shift to Cat, apply empowered Rip, and Mangle to shift back to Bear.
  - Wild Guardian (Apex): Maul adds a 12-second Nature DoT. After Incarnation, your next 2 Ironfur/Maul/Frenzied Regen casts echo at 50-150% effectiveness.
  - Active Mitigation: Ironfur is your primary tool against physical/melee damage. It is ineffective against Magic or Bleeds; use Frenzied Regeneration or major CDs for those.
  - Thrash Stacks: Maintaining 5 stacks is vital for both damage and the defensive benefits provided by various talents.
  - Druid of the Claw vs Elune's Chosen: Druid of the Claw excels in single-target and small pulls (3-5 targets). Elune's Chosen excels in large-scale AoE and provides a simpler rotation.

commonMistakes:
  - 'Overcapping Rage instead of spending it on Ironfur or Maul/Raze'
  - 'Letting Moonfire drop off the target, losing the Moonless Night damage bonus'
  - 'Using Swipe as a filler when Mangle or Thrash are available'
  - 'Overlapping major defensive cooldowns like Survival Instincts unnecessarily'
  - 'Shifting to Cat Form while Mangle is on cooldown, delaying the shift back to Bear Form'
  - 'Wasting Frenzied Regeneration charges during the Wild Guardian echo window'
  - 'Standing in Bear Form with 100 Rage while taking heavy physical damage without Ironfur active'

patchChanges: |
  12.0.5:
  - Wild Guardian R2 buffed: now grants 1 charge/2 charges of Dream Guide or Dream of Cenarius.
  - Wild Guardian R3 buffed: now empowers Maul for 40% additional damage over time.
  - Galactic Guardian reworked: Red Moon interaction updated — Lunar Wrath stacks consumed upon spending 20 Rage.
  - Regrowths from Dream Guide now heal for additional 100%.
  - April 17 hotfixes: Maul/Raze/Ravage -20%, Moonfire -10%, Druid of the Claw Ravage main target -27%, Bestial Strength -10% (now 10%, was 20%).
  12.0.1:
  - Updated for Midnight Launch.
  - Talent tree rework implemented.
  - Level gates updated for 12.0.1 content.
  12.0:
  - Thorns of Iron removed; Raze is now the primary AoE Rage spender.
  - Rage of the Sleeper and Pulverize removed.
  - New Apex Talents (Wild Guardian) added.
  - Fluid Form and Wildshape Mastery added to support safe Catweaving/Ripweaving.
  - Earthwarden and Renewal removed.