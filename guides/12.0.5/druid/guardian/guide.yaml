  - spellId: 0
    spellName: Ironfur
    targetUptimePct: 90
    importance: critical
    coachingTip: 'Maintain at least one stack of Ironfur at all times while actively tanking to mitigate physical damage. Stack multiple applications for high-damage windows.'
  - spellId: 0
    spellName: Moonfire
    targetUptimePct: 95
    importance: high
    coachingTip: 'Maintain Moonfire on all targets. It provides significant damage via Moonless Night and generates Rage through Galactic Guardian procs.'
