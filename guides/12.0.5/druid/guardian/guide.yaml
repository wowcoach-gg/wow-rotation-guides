resourceManagement:
  primaryResource: Rage
  secondaryResource: None
  resourceNotes: 'Rage has a maximum capacity of 100. It is generated by auto-attacks (4), being attacked (3), Mangle (10-19 depending on procs/talents), Thrash (5), and Moonfire procs (8). Spend Rage on Ironfur for physical mitigation, Frenzied Regeneration for healing, or Maul/Raze for damage. Avoid capping Rage to maximize the benefit of Ursoc’s Guidance, which reduces cooldowns based on Rage spent.'

