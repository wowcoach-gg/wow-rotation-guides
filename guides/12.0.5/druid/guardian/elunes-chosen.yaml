specId: 104
className: Druid
specName: Guardian
role: Tank
heroTalent: Elune's Chosen
patch: 12.0.1
guideVersion: 3
resourceManagement:
  primaryResource: Rage
  secondaryResource: None
  resourceNotes: Rage is generated by auto-attacks, being auto-attacked, Mangle (10+), Thrash, and Galactic Guardian procs
    (Moonfire generates extra Rage). Spend Rage on Ironfur for physical mitigation or Maul/Raze for damage. Never cap Rage
    — spending it fuels Ursoc's Guidance (Incarnation CDR) and After the Wildfire (healing). Elune's Chosen specifically benefits
    from Moonfire spreading to proc Light of Elune (Fury of Elune) and reduce Lunar Beam cooldown via Lunation.
maintenanceBuffs:
- spellId: 0
  spellName: Ironfur
  targetUptimePct: 90
  importance: critical
  coachingTip: Maintain at least 1 stack at all times. Layer 2-3 before predictable damage spikes. Off GCD. Gift of an Ancient
    Guardian increases Mastery by 5% while Ironfur is active. Ursol's Warding adds magic defense if talented.
- spellId: 0
  spellName: Moonfire
  targetUptimePct: 100
  importance: critical
  coachingTip: Maintain Moonfire on ALL targets — critical for EC. Moonfire procs Light of Elune (Fury of Elune with no ICD),
    provides Rage via Galactic Guardian, reduces Lunar Beam CD via Lunation, and drives Moonless Night damage. Moonfire pushes
    Swipe out of the rotation but never takes priority over Mangle.
- spellId: 0
  spellName: Thrash
  targetUptimePct: 100
  importance: high
  coachingTip: Keep Thrash active on targets. With Lunar Calling, Thrash becomes Arcane damage and synergizes with Penumbral
    Swell and other Arcane bonuses. Thrash casts also reduce Lunar Beam CD via Lunation. Star Cascade gives Thrash a 50% chance
    to fire a Starsurge.
tankingGuide:
  survivalPriority: |-
    These abilities take absolute priority over the damage rotation below.
    1. Maintain Ironfur while actively tanking — at least 1 stack at all times.
       Layer 2-3 stacks before predictable damage spikes. Off-GCD — weave between abilities.
       Ironfur only mitigates physical damage. Does NOT help against magic or bleeds.
       Gift of an Ancient Guardian increases Mastery by 5% while Ironfur is active.
       Ursol's Warding adds magic defense if talented.
    2. Use Frenzied Regeneration reactively after damage spikes or preemptively before them.
       Natural Resilience converts 80% of overhealing into an absorb shield — pre-cast for max value.
    3. Elune's Favored: Self-healing scales with number of Moonfire targets. Keep Moonfire on all
       targets for both damage AND survivability. EC is very durable in AoE because of this.
  defensiveCooldowns: |-
    - Barkskin (40-60s): Short defensive, off-GCD. Use proactively and frequently. Ward of the Forest
      (if talented) increases max HP by 20% but reduces duration by 40%.
    - Survival Instincts (2 charges): Major defensive. Use proactively before known heavy damage.
      Do not save for emergencies — stagger with other defensives.
    - Frenzied Regeneration (36s): Core self-heal. Natural Resilience converts 80% of overhealing into
      an absorb shield — pre-cast before predictable damage for maximum value.
    - Incarnation: Guardian of Ursoc (2-3min): Offensive and defensive. Increases health, reduces CDs.
      CD reduced by spending Rage (Ursoc's Guidance). Stack with Lunar Beam for maximum burst.
    - Lunar Beam (1min, reduced by Lunation): Deals damage AND heals you. Provides Mastery buff.
      Use on cooldown — it is both offensive and defensive.
    - Dream of Cenarius (proc-based): Empowers Regrowth in Bear Form. Bank stacks and spend when needed.
      WARNING: unempowered Regrowth shifts you OUT of Bear Form.
  rageManagement: |-
    Rage is generated by auto-attacks, Mangle, Thrash, and Galactic Guardian procs. Spending Rage
    fuels Ursoc's Guidance (Incarnation CDR) and After the Wildfire (healing). Never cap Rage.
    Balance Ironfur maintenance with Maul/Raze spending — Ursoc's Fury gives Maul/Raze defensive
    value. Only prioritize Ironfur over Maul/Raze when actively taking heavy damage.

removedMechanics:
- Rage of the Sleeper (Removed in 12.0)
- Pulverize (Removed in 12.0)
- Thorns of Iron (Removed in 12.0 — must actively spend Rage on Raze for AoE damage)
- Tooth and Claw (Removed in 12.0)
- Renewal (Removed in 12.0)
- Nature's Vigil (Removed in 12.0)
- Earthwarden (Removed in 12.0)
- Lunar Amplification (Removed in 12.0; Stellar Command moved to its position)
rotation:
  singleTarget: |-
    1. Cast Ironfur immediately on pull.
    2. Use Lunar Beam on cooldown (strong damage, healing, and Mastery buff).
    3. Maintain Moonfire on the target — procs Light of Elune (Fury of Elune) and Galactic Guardian.
    4. Cast Mangle on cooldown (primary Rage generator).
    5. Cast Thrash on cooldown (Lunar Calling makes it Arcane; Star Cascade fires Starsurge procs).
    6. Cast Maul as Rage spender when Ironfur is maintained and you won't cap Rage.
    7. Cast Moonfire on Galactic Guardian procs.
    8. Use Incarnation: Guardian of Ursoc for burst/defensive windows.
    9. Balance Ironfur and Maul spending — Ursoc's Fury gives Maul defensive value.
    10. Swipe only if all other abilities are on cooldown (Moonfire pushes it out for EC).
  aoe: |-
    1. Cast Ironfur immediately.
    2. Use Lunar Beam on cooldown — massive AoE value, especially with Boundless Moonlight and Penumbral Swell (+10% Arcane damage).
    3. Maintain Moonfire on all targets (Twin Moonfire spreads; Light of Elune procs Fury of Elune on each target with no ICD).
    4. Cast Thrash on cooldown (Arcane via Lunar Calling; Star Cascade Starsurge procs).
    5. Cast Raze as primary AoE Rage spender.
    6. Cast Mangle on cooldown.
    7. Use Incarnation: Guardian of Ursoc (Mangle hits 3 targets, reduced CDs).
    8. Swipe as lowest priority filler.
    9. EC scales incredibly well with more targets — Moonfire spreading drives self-healing via Elune's Favored.
  opener: |-
    1. Growl or Moonfire to pull at range.
    2. Ironfur immediately (get active mitigation rolling ASAP).
    3. Lunar Beam.
    4. Thrash.
    5. Mangle.
    6. Incarnation: Guardian of Ursoc.
    7. Continue priority: Mangle > Thrash > Moonfire (GG procs) > Maul/Raze > Swipe.
cooldowns:
- name: Lunar Beam
  cooldown: 1min (reduced by Lunation via Thrash and Moonfire casts)
  description: Core Elune's Chosen ability. Deals AoE damage and heals you. Provides Mastery buff (persists even if you leave
    the zone). Boundless Moonlight and The Eternal Moon enhance it. Penumbral Swell increases Arcane damage by 10% during
    beam. Use on cooldown — often available at the start of every pull in M+.
- name: 'Incarnation: Guardian of Ursoc'
  cooldown: 2-3min (reduced by Ursoc's Guidance via Rage spending)
  description: Major offensive and defensive CD. Increases health, reduces Thrash/Mangle CDs, Mangle hits 3 targets. Stack
    with Lunar Beam for maximum burst when possible.
- name: Barkskin
  cooldown: 40-60s depending on talents
  description: Short defensive, off GCD. Use proactively. Brambles adds damage reflection. Ward of the Forest (if talented)
    increases max HP by 20% but reduces duration by 40%.
- name: Survival Instincts
  cooldown: 2 charges
  description: Major defensive. Use proactively before known heavy damage, not reactively as a panic button.
- name: Frenzied Regeneration
  cooldown: 36s
  description: Core self-heal. Natural Resilience converts 80% of overhealing into an absorb shield — pre-cast before predictable
    damage for maximum value.
- name: Heart of the Wild
  cooldown: 2min
  description: 'Form-dependent: Cat Form = empowered Feral Frenzy (ST bleed). Moonkin Form = AoE Starfall-like damage over
    8s. Human Form = empowered Wild Growth healing. Use during safe windows.'
- name: Dream of Cenarius
  cooldown: Proc-based, stacks to 4
  description: 'Empowers Regrowth casts in Bear Form for off-healing yourself or allies. Bank stacks and spend when needed.
    WARNING: unempowered Regrowth shifts you out of Bear Form.'
concepts:
- 'Elune''s Chosen Identity: Arcane-focused hero tree emphasizing Lunar Beam and Moonfire interactions. Stronger AoE per Icy
  Veins; scales incredibly well with more targets as Moonfire spreads rapidly.'
- 'Lunar Beam Uptime: Core rotational button. Lunation reduces its CD via Thrash and Moonfire casts. Press as close to on
  CD as possible. Provides Mastery buff, healing, and initial threat generation.'
- 'Light of Elune: Moonfire procs Fury of Elune with no internal cooldown, applying Atmospheric Exposure to targets hit. More
  Moonfire targets = more procs = more damage.'
- 'Lunar Calling: Makes Thrash deal Arcane damage, synergizing with Penumbral Swell and other Arcane bonuses in the EC tree.'
- 'Star Cascade: Thrash has a 50% chance to launch a Starsurge at 120% effectiveness. Bask in Moonlight further increases
  Starsurge damage.'
- 'Moonfire Spreading: Critical for EC. Twin Moonfire helps spread. Galactic Guardian procs refresh Moonfire and generate
  extra Rage. Moonless Night adds bonus damage from Moonfire.'
- 'Ursoc''s Fury: Maul and Raze have defensive upside. Offensive spending contributes to survival.'
- 'Wild Guardian (Apex Talent): Echoed spells (Maul, Ironfur, Frenzied Regen) cast at 150% effectiveness and echo 2 additional
  times over 8s. Maintain Maul at least once every 12s for the DoT component. Don''t waste Frenzied Regen during the echo
  window.'
- 'Natural Resilience: 80% of Frenzied Regen overhealing converts to absorb shield. Pre-cast before predictable damage.'
- 'Elune''s Favored: Self-healing scales with number of Moonfire targets, making EC very durable in AoE.'
commonMistakes:
- Capping Rage instead of spending on Ironfur, Maul, or Raze — wastes Ursoc's Guidance CDR and After the Wildfire healing.
- Letting Moonfire drop off ANY target — loses Light of Elune procs, Moonless Night damage, Galactic Guardian Rage, and Lunar
  Beam CDR.
- Only spending Rage on Ironfur and never using Maul/Raze — Thorns of Iron is gone; you must actively spend on Raze for AoE
  damage.
- Not casting Ironfur immediately on pull — get active mitigation rolling ASAP.
- Using Ironfur to mitigate Magic or Bleed damage (only affects Physical/Armor).
- Overlapping Incarnation and Survival Instincts unnecessarily — stagger your defensives.
- Casting unempowered Regrowth — shifts you out of Bear Form mid-combat. Only cast with Dream of Cenarius procs.
- Wasting Frenzied Regeneration during the Wild Guardian echo window.
- Not using Lunar Beam on cooldown — it's both offensive and defensive.
- Saving Survival Instincts for emergencies instead of using proactively before known damage.
patchChanges:
  12.0.1: 'Reviewed for Midnight Season 1. EC remains stronger AoE; DotC stronger ST. Both within 4-5% per Method. Tier set:
    2pc Maul/Ravage +10%, Moonfire +10%. 4pc Maul/Ravage 5% chance to proc Galactic Guardian; Moonfire periodic can make next
    Maul/Ravage strike again at 100% effectiveness.'
  '12.0': 'Thorns of Iron, Tooth and Claw, Rage of the Sleeper, Pulverize, Earthwarden removed. Lunar Amplification removed
    (Stellar Command moved to its position). Dream of Cenarius reworked (stacks to 4, no ICD). Heart of the Wild reworked
    to 2min form-dependent CD. New talents: Star Cascade (Thrash fires Starsurge), Penumbral Swell (Lunar Beam +10% Arcane
    damage), Bask in Moonlight (Maul/Raze +10%, Lunar Beam primary +30%), Gift of an Ancient Guardian (Ironfur = 5% Mastery),
    Ward of the Forest, Red Moon, Harnessed Rage, Memory of Ysera. Light of Elune: Fury of Elune procs from Moonfire now 20%
    less frequent. Wild Guardian (Apex): echoed spells at 150% effectiveness.'
