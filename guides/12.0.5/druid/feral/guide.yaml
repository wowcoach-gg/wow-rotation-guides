specId: 103
className: Druid
specName: Feral
role: DPS
patch: "12.0.5"
guideVersion: 2

resourceManagement:
  primaryResource: Energy
  secondaryResource: Combo Points
  resourceNotes: 'Feral uses Energy that regenerates passively or actively via Tiger''s Fury. Energy is spent on generators (Shred, Rake) to build Combo Points. Combo Points (up to 5) are spent on powerful finishers (Rip, Ferocious Bite, Primal Wrath). Avoid wasting resources by overcapping Energy or generating Combo Points beyond the limit of 5.'

maintenanceBuffs:
  - spellId: 0
    spellName: Tiger's Fury
    targetUptimePct: 100
    importance: critical
    coachingTip: 'Tiger''s Fury is the primary source of Bleed amplification in Midnight. Use it to snapshot your DoTs and restore Energy.'
  - spellId: 0
    spellName: Rip
    targetUptimePct: 95
    importance: critical
    coachingTip: 'Maintain Rip at all times. In AoE, use Primal Wrath to apply and refresh Rip on all targets.'
  - spellId: 0
    spellName: Rake
    targetUptimePct: 95
    importance: high
    coachingTip: 'Keep Rake active on your primary target. Use Double-Clawed Rake in AoE to spread the bleed efficiently.'
  - spellId: 0
    spellName: Mark of the Wild
    targetUptimePct: 100
    importance: medium
    coachingTip: 'Ensure the group has the 3% Versatility buff active at all times.'

