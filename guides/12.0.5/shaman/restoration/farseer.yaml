specId: 264
className: Shaman
specName: Restoration
role: Healer
heroTalent: Farseer
patch: "12.0.5"
guideVersion: 3
resourceManagement:
  primaryResource: Mana
  secondaryResource: None
  resourceNotes: 'Mana management is core. Aim to keep your Mana percentage roughly equal to the enemy health percentage.
    Use Lightning Bolt during low damage periods to recoup Mana as it is cost-free. Farseer increases maximum Mana via Primordial
    Capacity.'
maintenanceBuffs:
- spellId: 0
  spellName: Water Shield
  targetUptimePct: 100
  importance: high
  coachingTip: Keep Water Shield active on yourself at all times for Mana regeneration and Intellect bonuses from Instinctive
    Imbuements.
- spellId: 0
  spellName: Earth Shield
  targetUptimePct: 95
  importance: critical
  coachingTip: Maintain Earth Shield on the tank and yourself (via Elemental Orbit). It increases healing received and provides
    significant passive healing.
- spellId: 0
  spellName: Healing Rain
  targetUptimePct: 70
  importance: medium
  coachingTip: Maintain Healing Rain when the group is clumped. In Midnight, it has a longer duration (18s) and cooldown (18s),
    making it easier to keep active.
playstyles:
- id: farseer
  name: Farseer
  detectionCriteria:
    heroTalents:
    - Call of the Ancestors
removedMechanics:
- Cloudburst Totem (removed in 12.0)
- Earthen Wall Totem (removed in 12.0)
- Ancestral Protection Totem (removed in 12.0)
- Wellspring (removed in 12.0)
- High Tide (removed in 12.0)
- Mana Tide (removed in 12.0)
- 'Spiritwalker''s Tidal Totem (removed in 12.0)'
- Master of the Elements (removed in 12.0)
- Tidebringer (removed in 12.0)
- Undulation (removed in 12.0)
- Totemic Recall (removed in 12.0)
- Stone Bulwark Totem (removed in 12.0)
- Thunderstorm (removed for Restoration in 12.0)
- Healing Surge (replaced by Healing Wave in 12.0)
rotation:
  singleTarget: |
    1. Use Healing Stream Totem whenever you hit maximum charges or as an emergency heal.
    2. Cast Unleash Life and Ancestral Swiftness on cooldown to spawn Ancestors and gain healing buffs.
    3. Cast Riptide on cooldown to maintain HoTs and proc Stormstream Totem.
    4. Use Healing Wave to heal the most injured single players (benefiting from Maelstrom Supremacy and Windspeaker).
    5. Cast Flame Shock and Lava Burst (on Lava Surge procs) if no healing is required.
    6. Use Lightning Bolt as a filler for cost-free damage.
  aoe: |
    1. Use Healing Stream Totem (or Stormstream Totem if procced) to handle group pressure.
    2. Cast Unleash Life and Ancestral Swiftness to spawn Ancestors; they will mimic your AoE spells with Chain Heals.
    3. Maintain Healing Rain if the group will remain inside the area for the duration.
    4. Cast Riptide on cooldown to spread HoTs and enable Flow of the Tides.
    5. Use Chain Heal on injured allies, preferably targeting someone with Riptide to consume Flow of the Tides for increased healing.
    6. Use Downpour (if talented) after casting Healing Rain for burst AoE healing.
    7. Cast Chain Lightning for DPS if 3 or more targets are present.
  opener: |
    1. Ensure Water Shield is active on yourself.
    2. Apply Earth Shield to the tank and yourself.
    3. Pre-cast Healing Rain if the encounter starts with immediate group damage.
    4. Cast Riptide on as many targets as possible just before the pull.
    5. Use Unleash Life to spawn your first Ancestor as damage begins.
cooldowns:
- name: Spirit Link Totem
  cooldown: 3min
  description: 'Redistributes health and provides 15% damage reduction. Use to stabilize the group during extreme spikes.'
- name: Ascendance
  cooldown: 3min
  description: Major throughput cooldown. Healing Wave always crits and cleaves; Chain Heal jumps to extra targets. Preferred
    for Farseer.
- name: Ancestral Swiftness
  cooldown: 1min
  description: 'Replaces Nature''s Swiftness. Makes next spell instant, free, and empowered while spawning an Ancestor.'
- name: Unleash Life
  cooldown: 15s
  description: Buffs next heal and spawns an Ancestor. Use almost on cooldown to maintain Ancestor uptime.
- name: Healing Tide Totem
  cooldown: 3min
  description: 'Raid-wide healing. Choice node with Ascendance (usually Farseer takes Ascendance).'
- name: 'Spiritwalker''s Grace'
  cooldown: 2min
  description: Allows casting while moving. Use during heavy movement phases.
- name: Astral Shift
  cooldown: 1.5min
  description: 'Primary personal defensive. Reduces damage taken by 40%.'
concepts:
- 'Ancestors: Spawned by Unleash Life and Ancestral Swiftness. They mimic your spells: Healing Wave mimics Healing Wave, Riptide/Unleash
  Life mimics Healing Surge, and Chain Heal/Healing Rain mimics Chain Heal.'
- 'Mastery: Deep Healing: Your healing is significantly more effective on targets with lower health. Focus on the most injured
  players to maximize efficiency.'
- 'Maelstrom Supremacy & Windspeaker: These Farseer talents make your hard-casted Healing Wave and Chain Heal much faster
  and more powerful.'
- 'Stormstream Totem: An Apex talent that grants Riptide a chance to proc a powerful version of Healing Stream Totem. Use
  these procs before overcapping charges.'
- 'Skyfury: A critical raid buff provided by Shamans; ensure you are in a group to provide this.'
- 'Spirit Link Totem: Unique utility that equalizes health and ignores healing reduction. Can save targets
  from one-shots.'
- 'Wind Shear: The only healer interrupt in the game (30s CD). Use to stop dangerous casts.'
- 'Mana Management: Match your mana burn to the boss''s health percentage. Use Lightning Bolt as a free
  filler when healing is not needed.'
- 'Ghost Wolf: Prevents you from being slowed below 100% speed. Use for repositioning.'
- 'Utility: You are the only healer with a ranged interrupt (Wind Shear). Use it frequently to mitigate damage before it happens.'
- 'Movement: Use Ghost Wolf for repositioning and Gust of Wind to counter knockbacks or cross gaps.'
commonMistakes:
- Holding Unleash Life and Ancestral Swiftness too long, resulting in low Ancestor uptime.
- 'Over-healing high-health targets and failing to utilize Mastery: Deep Healing.'
- Neglecting to use Wind Shear on dangerous enemy casts.
- 'Letting Earth Shield stacks fall off the tank, losing the 20% healing bonus.'
- Wasting Stormstream Totem procs by letting them sit at 2 charges.
- 'Standing still during heavy movement instead of using Spiritwalker''''s Grace or instant casts like Riptide.'
patchChanges:
  12.0.1: 'Farseer: Offering from Beyond Riptide cooldown reduction adjusted to 2 seconds. Farseer: New talents added: Ancestral
    Influence, Windspeaker, and Mystic Knowledge.'
  '12.0': Healing Surge replaced by Healing Wave baseline. Healing Rain duration and cooldown increased to 18 seconds. Cloudburst
    Totem and many passive buffs (High Tide, Undulation) removed. Wind Shear cooldown increased to 30 seconds but spell lock
    increased to 4 seconds.
