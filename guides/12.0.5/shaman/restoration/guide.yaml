    spellName: Water Shield
    targetUptimePct: 100
    importance: high
    coachingTip: 'Always keep Water Shield active on yourself for Mana regeneration and Intellect bonuses from Instinctive Imbuements.'
  - spellId: 0
    spellName: Earth Shield
    targetUptimePct: 100
    importance: critical
    coachingTip: 'Maintain Earth Shield on the tank and yourself (via Elemental Orbit). It increases healing received and provides passive reactive healing.'
  - spellId: 0
    spellName: Healing Rain / Surging Totem
    targetUptimePct: 85
    importance: high
    coachingTip: 'TRACKING NOTE: Healing Rain is a ground effect — it CANNOT be measured by get_buff_uptime. Do NOT report a percentage for it. Keep active whenever the group is stacked. In Midnight, Healing Rain has an 18s duration and 18s cooldown — near-100% uptime is achievable.'

