resourceManagement:
  primaryResource: Mana
  secondaryResource: None
  resourceNotes: 'Mana management is core. Aim to keep your Mana percentage roughly equal to the enemy health percentage throughout an encounter. Use Lightning Bolt during low damage periods to recoup Mana. Resurgence returns Mana based on critical heals. High-cost spells like Chain Heal should be used judiciously to avoid going OOM before the fight ends.'

maintenanceBuffs:
