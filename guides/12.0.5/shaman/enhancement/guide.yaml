resourceManagement:
  primaryResource: Maelstrom Weapon
  secondaryResource: Mana
  resourceNotes: 'Maelstrom Weapon is generated by melee strikes (Stormstrike, Lava Lash, Crash Lightning). It caps at 10 stacks. Spend at 5+ stacks to make Lightning Bolt, Chain Lightning, or Tempest instant and more powerful. Spending stacks provides cooldown reduction for strikes via Elemental Tempo. Mana is a secondary resource used for utility and Healing Surge; it is rarely a bottleneck for DPS but can be depleted by heavy off-healing.'

