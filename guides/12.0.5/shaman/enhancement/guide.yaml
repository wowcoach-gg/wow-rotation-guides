rotation:
  singleTarget: |
    [Totemic] Single Target Priority:
    1. Cast Surging Totem on cooldown (1-minute timer).
    2. Cast Doom Winds on cooldown (synced with Surging Totem).
    3. Spend Maelstrom Weapon (5-10 stacks) on Lightning Bolt to trigger Elemental Tempo and Totemic Momentum.
    4. Cast Lava Lash as the primary strike, especially during Hot Hand procs.
    5. Cast Sundering to trigger Fire Feral Spirits and Whirling Elements.
    6. Cast Crash Lightning to maintain the weapon enhancement buff and trigger Storm Unleashed procs.
    7. Cast Stormstrike as a filler strike.
    8. Use Voltaic Blaze as a final filler.

    [Stormbringer] Single Target Priority:
    1. Cast Ascendance (or Doom Winds) on cooldown.
    2. Spend Maelstrom Weapon (5-10 stacks) on Tempest immediately when it procs.
    3. Spend Maelstrom Weapon (5-10 stacks) on Lightning Bolt to trigger Elemental Tempo and fish for Tempest procs.
    4. Cast Stormstrike as the primary strike (Stormblast/Stormflurry priority).
    5. Cast Crash Lightning to maintain the weapon enhancement buff and trigger Storm Unleashed procs.
    6. Cast Sundering to trigger Fire Feral Spirits.
    7. Cast Lava Lash as filler.
    8. Use Voltaic Blaze as a final filler.
  aoe: |
    [Totemic] AoE Priority:
    1. Cast Surging Totem.
    2. Cast Crash Lightning to enable strike cleaving and leave a static pool (Storm Unleashed).
    3. Cast Sundering / Primordial Storm for burst AoE.
    4. Spend Maelstrom Weapon (5-10 stacks) on Chain Lightning.
    5. Cast Lava Lash to trigger Searing Volley (Lively Totems) and spread Flame Shock.
    6. Cast Stormstrike (cleaves via Crash Lightning buff).

    [Stormbringer] AoE Priority:
    1. Cast Ascendance for 2-minute burst.
    2. Cast Crash Lightning to enable strike cleaving.
    3. Spend Maelstrom Weapon (5-10 stacks) on Tempest (massive AoE burst).
    4. Spend Maelstrom Weapon (5-10 stacks) on Chain Lightning to apply Lightning Rods (Ride the Lightning).
    5. Cast Stormstrike to trigger cleave damage.
    6. Cast Sundering / Primordial Storm.
  opener: |
    1. Pre-cast Skyfury and Earth Shield.
    2. Cast Surging Totem (Totemic) or Ascendance (Stormbringer).
    3. Cast Doom Winds.
    4. Cast Crash Lightning.
    5. Cast Sundering.
    6. Enter standard priority, spending Maelstrom Weapon stacks immediately to trigger Elemental Tempo.

cooldowns: |
  - Doom Winds (1min): Increases Windfury Weapon chance by 200% and spawns a Nature Feral Spirit.
  - Ascendance (2min): Replaces Doom Winds (if talented). Triggers Doom Winds for free and allows Stormstrike to be used at range with no cooldown.
  - Surging Totem (1min): Totemic only. Pulses AoE damage for 25s. Core of the Totemic burst window.
  - Sundering (30s): Deals high damage in a line and spawns a Fire Feral Spirit. Triggers Whirling Elements motes.
  - Astral Shift (1.5min): Primary defensive, 40% damage reduction for 12 seconds.
  - Earth Elemental (3min): Increases maximum health by 15% for 30 seconds (via Primordial Bond).
  - Bloodlust/Heroism (10min): Major group haste buff.

concepts: |
  - Maelstrom Weapon Management: The core loop involves generating stacks with strikes and spending them at 5-10 stacks on spells to gain cooldown reduction via Elemental Tempo.
  - Elemental Tempo: Spending Maelstrom Weapon stacks reduces the remaining cooldown of Stormstrike and Lava Lash, creating a fast-paced "battle-mage" flow.
  - Storm Unleashed (Apex Talent): Makes Crash Lightning a core rotational button in all scenarios. It allows the buff to overlap and gives a chance for Crash Lightning to ignore its cooldown.
  - Totemic Momentum: For Totemic, spending Maelstrom Weapon while Surging Totem is active extends the duration of Hot Hand, allowing for long Lava Lash streaks.
  - Tempest: For Stormbringer, spending Maelstrom Weapon has a chance to replace Lightning Bolt with Tempest, a high-damage AoE strike.
  - Ride the Lightning: All strikes trigger Chain Lightning, making the transition from single-target to AoE seamless.
  - Feral Spirits: Now a passive mechanic. Nature wolves spawn from Doom Winds; Fire wolves spawn from Sundering.
  - Windveil: Successfully interrupting with Wind Shear grants 15% magic damage reduction.
  - Mastery (Enhanced Elements): Increases all Elemental damage dealt and increases the chance to trigger Stormbringer and Hot Hand.

commonMistakes:
  - 'Overcapping Maelstrom Weapon stacks (wasting generation by staying at 10 stacks)'
  - 'Letting the Crash Lightning weapon enhancement buff drop, losing auto-attack speed and cleave'
  - 'Failing to use Wind Shear to trigger the Windveil magic damage reduction defensive'
  - 'Not syncing Doom Winds with Surging Totem (Totemic) or Ascendance (Stormbringer)'
  - 'Wasting Tempest procs by casting regular Lightning Bolts instead'
  - 'Standing outside the range of Surging Totem, losing the pulse damage and Rebound stacks'
  - 'Using Sundering when Fire Feral Spirits are already active, wasting the spawn'

patchChanges: |
  12.0.1:
  - Totemic builds adjusted to drop Overcharge in favor of other stats.
  - Flowing Spirits talent adjusted/nerfed.
  - Flask and consumable recommendations updated.
  12.0:
  - Major spec overhaul.
  - Primordial Wave removed; effects moved to Sundering.
  - Feral Spirit changed to a passive talent.
  - New Apex Talent: Storm Unleashed.
  - Crash Lightning buff now stacks and overlaps.
  - Hero Trees (Totemic and Stormbringer) introduced and reworked.