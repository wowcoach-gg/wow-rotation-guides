    targetUptimePct: 95
    importance: high
    coachingTip: 'Maintain the Crash Lightning buff at all times, even in single-target. It increases auto-attack speed and allows your strikes to cleave.'
  - spellId: 0
    spellName: Skyfury
    targetUptimePct: 100
    importance: critical
    coachingTip: 'Ensure Skyfury is active at all times to provide Mastery and extra auto-attack procs for the group.'
