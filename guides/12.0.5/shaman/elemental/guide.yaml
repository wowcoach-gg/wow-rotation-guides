rotation:
  singleTarget: |
    [General Single-Target Priority]
    1. Cast Stormkeeper. Ensure procs are available for Ascendance (typically cast 1-2 GCDs before).
    2. Use Ancestral Swiftness.
    3. Cast Ascendance (sync with on-use trinkets and Bloodlust).
    4. Cast Earth Shock if Ascendance will fade within the next 3 seconds.
    5. Cast Elemental Blast if Ascendance will fade within the next 3 seconds.
    6. Refresh Voltaic Blaze if Ascendance will fade within the next 3 seconds.
    7. Refresh Flame Shock if Ascendance will fade within the next 3 seconds.
    8. Cast Voltaic Blaze to refresh Flame Shock when it has 6 seconds or less remaining.
    9. Refresh Flame Shock when it has 6 seconds or less remaining.
    10. Cast Tempest (ideally with Master of the Elements buff).
    11. Cast Earth Shock whenever you are less than 15 Maelstrom from capping or when Master of the Elements is up.
    12. Cast Elemental Blast whenever you are less than 15 Maelstrom from capping or when Master of the Elements is up.
    13. Cast Earth Shock whenever you are less than 15 Maelstrom from capping.
    14. Cast Elemental Blast whenever you are less than 15 Maelstrom from capping.
    15. Cast Lava Burst if Flame Shock is up.
    16. Cast Lightning Bolt.

    [Playstyle Notes]
    - Stormbringer: Prioritize Tempest and Lightning Bolt/Chain Lightning to generate Stormkeeper charges.
    - Farseer: Focus on Lava Burst to spawn Ancestors and maintain mobility.
  aoe: |
    [2-Target Cleave]
    1. Follow Single-Target rotation but:
    2. Cast Chain Lightning instead of Lightning Bolt.
    3. Cast Earthquake instead of Earth Shock or Elemental Blast.
    4. If using Lightning Rod, switch targets between each spender.

    [3+ Target Priority]
    1. Cast Stormkeeper (ensure availability during Ascendance).
    2. Use Ancestral Swiftness.
    3. Cast Voltaic Blaze.
    4. Cast Ascendance (sync with trinkets/Bloodlust).
    5. Cast Tempest.
    6. Cast Earthquake.
    7. Cast Earthquake if there are at least 5 targets.
    8. Cast Elemental Blast if there are at most 4 targets.
    9. Use a Lava Surge proc to consume Purging Flames (hits all Flame Shocked targets).
    10. If there are at most 3 targets, keep one Flame Shock up.
    11. Cast Chain Lightning.
  opener: |
    [Single-Target Opener]
    1. Cast Stormkeeper ~3 seconds before pull.
    2. Cast Lava Burst ~1.5 seconds before pull.
    3. Use Ancestral Swiftness.
    4. Cast Ascendance with on-use trinkets.
    5. Cast Tempest.
    6. Cast Lightning Bolt.
    7. Cast Lava Burst.
    8. Cast Lightning Bolt.
    9. Proceed with regular rotation.

    [Multi-Target Opener]
    1. Cast Stormkeeper.
    2. Use Ancestral Swiftness.
    3. Cast Voltaic Blaze.
    4. Cast Ascendance with on-use trinkets.
    5. Proceed with regular rotation.

cooldowns: |
  - Ascendance (3 min): Major offensive cooldown. Summons Fire Elemental (with Call of Fire). Sync with trinkets and Bloodlust.
  - Stormkeeper (1 min): Empowers next 2 Lightning Bolts or Chain Lightnings. Use on cooldown in ST; save for 5+ targets in AoE.
  - Ancestral Swiftness (1 min): Makes next nature spell instant and spawns an Ancestor (Farseer).
  - Spiritwalker's Grace (2 min): Allows casting while moving for 15s. Critical for maintaining uptime during mechanics.
  - Earth Elemental (3 min): Increases maximum health by 15% (with Primordial Bond) and provides minor defensive utility.
  - Astral Shift (1.5 min): Primary defensive, reduces damage taken by 40% for 8s.

concepts: |
  - Maelstrom Management: Avoid overcapping. Spenders should be used proactively, especially since Overloads can generate unexpected resources.
  - Mastery (Elemental Overload): Your spells have a chance to cast a second time at reduced damage. This generates extra Maelstrom.
  - Feedback Loop (Apex Talent): Mandatory talent that increases Overload damage, Crit chance, and allows Overloads to trigger additional Overloads.
  - Flame Shock & Pandemic: Refresh Flame Shock when <5s remains (or <10s if Fire Elemental is active) to extend duration without waste.
  - Voltaic Blaze & Purging Flames: Voltaic Blaze applies Flame Shock to 6 targets. Purging Flames makes your next Lava Burst hit all targets with Flame Shock.
  - Stormbringer vs Farseer: Stormbringer excels in sustained AoE and high-target counts. Farseer is more mobile and better for 1-3 targets.
  - Tempest: A powerful Stormbringer proc that replaces Lightning Bolt. It should be used with Master of the Elements whenever possible.
  - Movement: Use Spiritwalker's Grace, Gust of Wind, and Ghost Wolf (with Thunderous Paws) to handle mechanics without losing significant DPS.
  - Windveil: Interrupting with Wind Shear provides a 15% magic damage reduction for 12s.

commonMistakes:
  - 'Casting Lava Burst on a target that does not have Flame Shock active'
  - 'Overcapping Maelstrom and wasting potential Elemental Overload resources'
  - 'Using Stormkeeper charges on Lightning Bolt in high-target AoE instead of Chain Lightning'
  - "Misusing Spiritwalker's Grace during low-movement phases instead of saving it for heavy mechanics"
  - 'Failing to sync Ascendance with on-use trinkets or Stormkeeper'
  - 'Not using Wind Shear to trigger the Windveil defensive buff when magic damage is incoming'

patchChanges: |
  12.0.1:
  - No specific changes listed for this sub-patch in source.
  12.0 (Midnight Launch):
  - Pruning: Icefury, Primordial Wave, Liquid Magma Totem, and Stone Bulwark Totem removed.
  - New Talents: Voltaic Blaze, Purging Flames, and Call of Fire added.
  - Apex Talents: Feedback Loop added as a mandatory 3-point node.
  - Hero Talents: Stormbringer and Farseer introduced.
  - Mastery: Elemental damage gain from Mastery reduced by 10%.
  - Lava Burst: Base damage reduced by 20%, but damage now scales with Critical Strike chance.