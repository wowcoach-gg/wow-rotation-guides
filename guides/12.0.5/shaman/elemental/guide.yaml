resourceManagement:
  primaryResource: Maelstrom
  secondaryResource: Mana
  resourceNotes: 'Generate Maelstrom with builders like Lightning Bolt, Lava Burst, and Chain Lightning. Spend on Earth Shock, Elemental Blast, or Earthquake. Avoid overcapping (100 cap); it is recommended to cast spenders when within 15 Maelstrom of the cap to avoid wasting Overload procs. Stormbringer builds in AoE may occasionally overcap due to Aftershock procs.'

