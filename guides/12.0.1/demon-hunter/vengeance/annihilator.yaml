specId: 581
className: Demon Hunter
specName: Vengeance
role: Tank
heroTalent: 'Annihilator'
patch: 12.0.1
guideVersion: 3
resourceManagement:
  primaryResource: Fury
  secondaryResource: Soul Fragments
  resourceNotes: 'Generate Fury with Fracture and Felblade. Generate Soul Fragments with Fracture, Sigil of Spite, and Immolation
    Aura (via Fallout). Spend Fury and Soul Fragments on Soul Cleave and Spirit Bomb. Annihilator gameplay revolves around
    Voidfall stacks generated by Fracture.'
maintenanceBuffs:
- spellId: 0
  spellName: Demon Spikes
  targetUptimePct: 90
  importance: critical
  coachingTip: Maintain high uptime on Demon Spikes to mitigate physical damage. Use Feed the Demon to reduce its cooldown
    by spending Fury.
- spellId: 0
  spellName: Frailty
  targetUptimePct: 95
  importance: high
  coachingTip: Apply Frailty via Sigil of Flame and Soul Cleave to increase your healing from damage dealt and reduce damage
    taken.
- spellId: 0
  spellName: Voidfall
  targetUptimePct: 0
  importance: high
  coachingTip: Monitor Voidfall stacks. At 3 stacks, your next Soul Cleave or Spirit Bomb will drop meteors. Do not use Fracture
    or Metamorphosis if you are already at 3 stacks.
tankingGuide:
  survivalPriority: |-
    These abilities take absolute priority over the damage rotation below.
    1. Maintain Demon Spikes for physical damage reduction and Parry. Feed the Demon allows
       near-permanent uptime by reducing CD when consuming Soul Fragments.
    2. Maintain Frailty on targets via Sigil of Flame and Soul Cleave. Heals you for a portion of
       damage dealt to affected targets.
    3. Consume Soul Fragments for healing. Each fragment heals 6% of damage taken in last 5s (min 1% max HP).
       Soul Cleave and Spirit Bomb consume fragments — do not overcap above 6.
    4. Use Fiery Brand for 40% DR against dangerous targets. Annihilator has 2 charges — balance
       defensive and offensive use. Align with Metamorphosis and Voidfall meteors when safe.
  defensiveCooldowns: |-
    - Metamorphosis (2min, reduced by World Killer): Major defensive and offensive. Increases HP by 40%
      and Armor by 200%. Annihilator uses this more frequently via World Killer CDR (10s per 3 Voidfall
      stacks spent). Also triggers Mass Acceleration and Dark Matter.
    - Fiery Brand (1min, 2 charges): 40% DR for 12 seconds. Fiery Demise buffs Fire damage during debuff.
    - Fel Devastation (40s): High Fire damage cone + medium healing. No longer procs Metamorphosis
      (Demonic removed). Use on cooldown for damage and self-healing.
    - Last Resort (8min): Passive cheat death — triggers 15s Metamorphosis on lethal damage.
    - Untethered Rage: Consuming Soul Fragments has a chance to grant 10s Metamorphosis. Increases
      defensive uptime passively — allows more aggressive play.
  soulFragmentManagement: |-
    Soul Fragments are the core of Vengeance. They heal for 6% of damage taken in last 5s (min 1% max HP)
    when consumed. Generate with Fracture, Sigil of Spite, and Immolation Aura (Fallout). Spend on
    Spirit Bomb (ideally at 5-6 fragments) or Soul Cleave. Do not overcap above 6.
    Spenders deal increased damage based on fragments consumed — aim for maximum (3 for Soul Cleave,
    6 for Spirit Bomb with Untethered Rage).

removedMechanics:
- Demonic (Fel Devastation no longer grants Metamorphosis)
- The Hunt (Removed for Vengeance)
- Illuminated Sigils (Sigil of Flame power reduced)
rotation:
  singleTarget: |
    1. Cast Metamorphosis if you are about to reach maximum stacks or need the defensive burst.
    2. Spend Voidfall stacks if you have 3 (do not overcap).
    3. Cast Fiery Brand if you are about to reach 2 charges.
    4. Cast Fracture if you have 2 charges, or you are about to reach 2 charges.
    5. Cast Immolation Aura on cooldown.
    6. Cast Soul Cleave if you have 5 or more Soul Fragments, and Spirit Bomb is on cooldown.
    7. Cast Sigil of Flame, ideally without overcapping Fury.
    8. Cast Soul Cleave with at least 3 or more Soul Fragments.
    9. Cast Fracture.
    10. Cast Soul Cleave with 2 or fewer Soul Fragments.
    11. Cast Throw Glaive as a filler or when out of range.
  aoe: |
    1. Cast Metamorphosis if you are about to reach maximum stacks.
    2. Spend Voidfall stacks if you have 3.
    3. Cast Fiery Brand if you are about to reach 2 charges.
    4. Cast Fracture if you have 2 charges, or you are about to reach 2 charges.
    5. Cast Immolation Aura on cooldown.
    6. Cast Spirit Bomb on cooldown with at least 5 Soul Fragments (6 with Untethered Rage).
    7. Cast Fel Devastation on cooldown.
    8. Cast Soul Cleave if you have 5 or more Soul Fragments, and Spirit Bomb is on cooldown.
    9. Cast Sigil of Flame, ideally without overcapping Fury.
    10. Cast Soul Cleave with at least 3 or more Soul Fragments.
    11. Cast Fracture.
    12. Cast Soul Cleave with 2 or fewer Soul Fragments.
    13. Cast Throw Glaive as a filler.
  opener: |
    1. Pre-place Sigil of Flame 1 second before the pull.
    2. Cast Fiery Brand.
    3. Cast Immolation Aura.
    4. Cast Sigil of Spite.
    5. Continue with standard rotation.
cooldowns:
- name: Metamorphosis
  cooldown: 2min
  description: 'Major defensive and offensive cooldown. Increases Health by 40% and Armor by 200%. Annihilator uses this to
    trigger Mass Acceleration and Dark Matter.'
- name: Fiery Brand
  cooldown: 1min, 2 charges
  description: 'Reduces damage taken by 40% for 12 seconds and applies a DoT. Use offensively to buff Fire damage via Fiery
    Demise.'
- name: Sigil of Spite
  cooldown: 1.5min
  description: Deals massive Chaos damage and spawns 3 Soul Fragments. Use on cooldown for damage and resource generation.
- name: Fel Devastation
  cooldown: 40s
  description: Channels heavy Fire damage and heals. No longer procs Metamorphosis (Demonic removed).
- name: Soul Carver
  cooldown: 1min
  description: Deals Fire damage and generates Soul Fragments over time. Strong offensive/defensive hybrid.
- name: Last Resort
  cooldown: 8min
  description: Passive cheat death that triggers 15s of Metamorphosis.
concepts:
- 'Voidfall Management: Fracture has a 35% chance to grant a stack of Voidfall. At 3 stacks, your next spender drops meteors.
  Avoid using Fracture or Metamorphosis (with Mass Acceleration) when at 3 stacks to prevent wasting procs.'
- 'Untethered Rage: Consuming Soul Fragments with spenders has a chance to grant a 10-second Metamorphosis. This increases
  defensive uptime and allows more aggressive use of cooldowns for damage.'
- 'World Killer: Every time you spend 3 Voidfall stacks to call down meteors, the cooldown of Metamorphosis is reduced by
  10 seconds.'
- 'Soul Fragment Scaling: Spenders deal increased damage based on Soul Fragments consumed. Aim to consume the maximum (3 for
  Soul Cleave, 6 for Spirit Bomb with Untethered Rage) for peak efficiency.'
- 'Defensives as Offensives: Fiery Brand and Metamorphosis are significant damage multipliers. Align them with burst windows
  (Voidfall/Dark Matter) when survival is not at immediate risk.'
- 'Mobility: Use Infernal Strike (off-GCD) for movement and extra damage. Keep 1 charge for mechanics.'
- 'Charred Flesh: Casting Immolation Aura extends the duration of your active Fiery Brand. Paired with 2-charge Fiery Brand
  and Fiery Demise, this keeps your Fire-damage multiplier running for most of the fight.'
- 'Infernal Armor: Passive class-tree talent. Immolation Aura increases your Armor while active, smoothing physical damage
  intake during rotational windows.'
- 'Damage profile in logs: Annihilator''s biggest damage numbers come from TRIGGERED effects, not casts. In a damage
  breakdown you should expect to see "Voidfall Meteor", "Meteor Shower", "World Killer", "Catastrophe", and "Dark Matter"
  at or near the top of the list when the rotation is working. These are triggered effects — the meteor drop is deterministic
  when you spend Soul Cleave or Spirit Bomb at 3 Voidfall stacks; Meteor Shower / Dark Matter fire from Metamorphosis via
  Mass Acceleration. Only the Voidfall STACK generation itself is a proc (35% chance per Fracture cast). These damage
  events do NOT appear in cast counts. When grading a player''s rotation, look for meteor/World Killer damage as the
  primary health-check; a breakdown that only lists Soul Cleave / Spirit Bomb / Fracture as damage sources is missing the
  spec''s main output and may understate the player''s actual performance.'
commonMistakes:
- Overcapping Voidfall stacks by using Fracture or Metamorphosis while at 3 stacks
- Overcapping Soul Fragments (holding more than 6) instead of spending them on Soul Cleave or Spirit Bomb
- 'Holding Metamorphosis too long; Annihilator relies on frequent usage to benefit from World Killer CDR'
- Not aligning Fiery Brand with Metamorphosis and Voidfall meteors for maximum damage
- Letting Demon Spikes drop during periods of heavy physical damage when other defensives are down
- 'Low Voidfall Meteor / World Killer / Meteor Shower damage relative to Soul Cleave — indicates Voidfall stacks are being
  wasted (Fracture at 3 stacks, Meta at 3 stacks, or finishers not consumed after reaching 3)'
patchChanges:
  12.0.1: Annihilator focuses on Voidfall stacks and meteor procs. World Killer talent added to reduce Metamorphosis cooldown
    via meteors.
  '12.0': 'Fiery Brand reworked to a flat 40% damage reduction buff. Painbringer and Frailty no longer stack; baseline values
    increased. Spirit Bomb moved to a 25s hasted cooldown. Demonic and The Hunt removed for Vengeance.'
