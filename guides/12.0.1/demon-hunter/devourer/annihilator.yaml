specId: 1480
className: Demon Hunter
specName: Devourer
role: DPS
heroTalent: Annihilator
patch: "12.0.1"
guideVersion: 2
sources:
  - "Icy Veins 12.0.1 Devourer Demon Hunter Rotation Guide"
resourceManagement:
  primaryResource: Fury
  secondaryResource: Soul Fragments
  resourceNotes: >
    Devourer is a Dual Resource specialization balancing Fury and Soul Fragments.
    Fury cap is 120 for Annihilator. Generated by Consume, Voidblade/Hungering Slash,
    Soul Immolation, collecting Soul Fragments (4 Fury each), and Voidglare Boon
    (10 Fury after Void Ray channel completes). Void Ray costs 100 Fury outside
    Void Metamorphosis; inside Void Metamorphosis abilities no longer cost Fury,
    instead Fury passively drains — form ends when Fury runs out. Soul Fragments
    fill your secondary resource bar: 50 collected (35 with Soul Glutton) grants
    Void Metamorphosis. During Void Metamorphosis, every 30 Souls generated grants
    one Collapsing Star cast. Max 10 Souls on the ground at once; any beyond this
    are auto-collected when a new one spawns. Souls collected beyond the 50/35 cap
    are wasted.
maintenanceBuffs:
- spellId: 0
  spellName: Voidfall
  targetUptimePct: 0
  importance: critical
  coachingTip: >
    Consume/Devour has a 35% chance to grant a Voidfall stack. At 3 stacks, your
    next Reap calls down void meteors on your target for massive AoE damage.
    Meteoric Rise grants one stack from Void Ray — spend stacks before casting
    Void Ray to avoid overcapping. Upon entering Void Metamorphosis, Annihilator
    resets Reap cooldown and instantly generates 3 Voidfall stacks.
removedMechanics:
- Traditional Metamorphosis (Devourer uses Void Metamorphosis, resource-gated not timer-based)
- Eye Beam / Demonic Window (Devourer uses Void Ray instead — different mechanic entirely)
- Chaos Strike / Blade Dance / Annihilation / Death Sweep (Devourer uses Consume, Reap, Cull, Devour)
- Sigil of Flame (not part of Devourer kit)
- Demon's Bite / Demon Blades (Devourer uses Consume as builder)
- Sinful Brand (removed in 12.0)
- Elysian Decree (removed in 12.0)
- Fodder to the Flame (removed in 12.0)
rotation:
  singleTarget: |
    [Outside Void Metamorphosis]
    1. Cast Reap with 3 stacks of Voidfall.
    2. Cast Void Metamorphosis when available.
    3. Cast Void Ray with 100+ Fury. Aim to cast right before Void Metamorphosis to leverage the Fury refund (entry refills Fury bar).
    4. Cast Consume (filler, generates Fury and Soul Fragments; castable while moving).

    [During Void Metamorphosis]
    1. Cast Voidblade before Collapsing Star (triggers Devourer's Bite damage amp).
    2. Cast Cull with 3 stacks of Voidfall.
    3. Cast Collapsing Star when at 30 Souls.
    4. Cast Void Ray (on 16s hasted cooldown, reduced to 14s by Voidpurge; pauses Fury drain during and briefly after channel).
    5. Cast Devour (replacement for Consume; filler, castable while moving).

    [Gameplay Notes]
    - Goal is to extend Void Metamorphosis as long as possible via Emptiness. Aim for 4-5 Collapsing Stars per window.
    - Consume/Devour can be cast while moving to gather nearby Souls toward Void Metamorphosis and Collapsing Star.
    - Reap is used frequently throughout the rotation. Look to use it whenever at 3 Voidfall stacks.
    - Void Ray is used aggressively: outside meta, cast whenever at 100+ Fury (no cooldown). Inside meta, cast on cooldown to pause Fury drain.
    - Full Void Ray channel rewards: Voidglare Boon (10 Fury), Eradicate (upgrades next Reap to 25-yard frontal cone), Moment of Craving (resets Reap cooldown and increases soul consumption to 10, boosting damage via Soulshaper), Final Breath (300% damage on final tick). Never cancel early.
    - For Annihilator, Voidblade is used to trigger Devourer's Bite damage amp before Collapsing Star and/or Moment of Craving-buffed Cull.
    - Focused Ray increases Void Ray damage by 50% on single target. Avoid hitting off-targets in single-target.
    - Don't waste Fury or Souls. Check before you Reap — Reap collects Souls and generates 4 Fury each, so hold off if it will significantly overcap resources.
    - Leverage the Fury refill: Void Metamorphosis entry refills Fury bar. Siphon Fury off with Void Ray before entry.
  aoe: |
    [Outside Void Metamorphosis]
    1. Cast Reap / Eradicate with 3 stacks of Voidfall.
    2. Cast Void Metamorphosis with 35+ Souls.
    3. Cast Eradicate (after full Void Ray channel — 25-yard frontal cone).
    4. Cast Void Ray with 100+ Fury. Aim to cast before meta for Fury refund.
    5. Cast Consume.

    [During Void Metamorphosis]
    1. Cast Eradicate.
    2. Cast Void Ray (on cooldown).
    3. Cast Collapsing Star when at 30 Souls.
    4. Cast Cull with 4+ Soul Fragments on the ground for increased priority damage.
    5. Cast Devour.

    [AoE Gameplay Notes]
    - In AoE, Reap/Cull casts are replaced in favour of Eradicate procs. Eradicate triggers immediately after Void Ray via Moment of Craving, which naturally aligns. Inside Void Metamorphosis, Cull can be used with 4+ Soul Fragments for priority damage. The only exception is before entering Void Metamorphosis — use Reap to consume Voidfall stacks.
    - Void Ray is used even more aggressively in AoE due to the Fury and Souls feedback loop. Outside meta, cast whenever at 100 Fury. Inside meta, on cooldown.
    - Emptiness vs Soul Glutton depends on pull size/duration: Soul Glutton for shorter/smaller pulls, Emptiness for larger/longer pulls. Aim for as many Collapsing Star casts as possible.
    - Consume/Devour while moving to gather nearby Souls toward Void Metamorphosis/Collapsing Star.
  opener: |
    [Annihilator Single-Target Opener]
    Note: Annihilator single-target build has very few cooldowns to cycle through, so it has no real opening sequence. It opens straight into its standard rotation.

    1. Pre-cast Consume 1 second before pull.
    2. Cast Reap when you can proc Voidfall.
    3. Cast Consume until you reach 100 Fury.
    4. Cast Void Ray (channel fully).
    5. Repeat the above until Void Metamorphosis is ready.
    6. Cast Reap.
    7. Cast Voidblade.
    8. Cast Void Metamorphosis.
    9. Cast Void Ray.
    10. Cast Collapsing Star.
    11. Cast Cull.

    [Opener Notes]
    - Due to Devourer beginning fights with 25 Souls via Entropy, the opener is basic — build up to first Void Metamorphosis.
    - If playing AoE variant, first Void Ray should be followed by Eradicate.
    - Watch Voidfall stacks in opener. If you reach 3 before first Void Metamorphosis, use Reap/Eradicate before starting your window.
    - If you have leftover Souls from a previous pull, skip ahead to Void Metamorphosis and follow main priority.
    - Upon entering Void Metamorphosis, Annihilator resets Reap cooldown and instantly generates 3 Voidfall stacks, giving strong up-front burst.
cooldowns:
- name: Void Metamorphosis
  cooldown: resource-gated
  description: >
    Primary transformation. Accessed by collecting 50 Souls (35 with Soul Glutton). Not timer-based.
    Fury passively drains; when empty, form ends. Void Ray pauses drain during and briefly after channel.
    Extend via Emptiness. Aim for 4-5 Collapsing Stars per window. On entry: Fury bar refills,
    Midnight Apex spawns 5 Souls and grants free Collapsing Star, Annihilator resets Reap cooldown
    and generates 3 Voidfall stacks.
- name: Collapsing Star
  cooldown: resource-gated
  description: >
    Massive damage ability granted every 30 Souls during Void Metamorphosis. Significantly slows
    Fury drain during cast. Has long cast time — needs safe positioning. Midnight Apex grants free
    cast on Void Metamorphosis entry.
- name: Void Ray
  cooldown: 100 Fury outside meta / 16s hasted CD inside meta
  description: >
    25-yard range, channels up to 3s (reduced by Haste), roots you. Outside meta: no cooldown, costs
    100 Fury. Inside meta: 16s hasted CD (14s with Voidpurge), pauses Fury drain. Full channel rewards:
    Eradicate (upgrades next Reap), Moment of Craving (resets Reap CD, increases soul consumption to 10),
    Voidglare Boon (10 Fury), Final Breath (300% last tick). Focused Ray +50% damage on single target.
- name: Reap
  cooldown: 8s base (affected by Haste)
  description: >
    Instant cast, deals Cosmic damage, consumes up to 4 Soul Fragments. Scythe's Embrace generates
    10 Fury. Second Helping grants second charge. Transforms into Eradicate after full Void Ray channel
    (25-yard frontal cone, retains all bonuses). Transforms into Cull during Void Metamorphosis (increased
    damage, CD reduced by 1s per Devour cast).
- name: Voidblade
  cooldown: 30s
  description: >
    Leap to target, Cosmic damage, generates Fury. Triggers Devourer's Bite damage amp. Use before
    Collapsing Star and/or Moment of Craving-buffed Cull.
- name: Soul Immolation
  cooldown: 30s with Tempered Soul / passive via Spontaneous Immolation
  description: >
    Deals Fire damage to self, generates 30 Fury and shatters 3 Souls over 5 seconds.
- name: Blur
  cooldown: 1min, 2 charges
  description: 'Primary defensive; 25% damage reduction for 10s.'
- name: Darkness
  cooldown: 5min
  description: 'Group defensive; 15% chance (30% in dungeons) to avoid all damage from incoming attacks.'
- name: Void Nova
  cooldown: 45s
  description: 'Ranged AoE stun (30-yard range, 3s duration).'
- name: Disrupt
  cooldown: 15s
  description: '30-yard range interrupt.'
concepts:
- 'CRITICAL SPELL TRANSFORMATION: Reap transforms into Eradicate after fully channeling Void Ray.
  Eradicate upgrades Reap to deal damage in a 25-yard cone, retaining all Reap bonuses (Soulshaper,
  Moment of Craving, Voidfall). In combat logs, Eradicate casts ARE transformed Reap casts. When
  analyzing rotation gaps for Reap, ALWAYS include Eradicate casts.'
- 'CRITICAL SPELL TRANSFORMATION: Reap transforms into Cull during Void Metamorphosis. Cull cooldown
  is reduced by 1 second each Devour cast. In combat logs, Cull casts ARE transformed Reap casts.'
- 'Annihilator hooks into Reap via Voidfall. Consume/Devour triggers grant Voidfall stacks (35% chance).
  At 3 stacks, next Reap calls down void meteors. Upon Void Metamorphosis entry, Annihilator resets
  Reap CD and instantly grants 3 Voidfall stacks for strong up-front burst.'
- 'Void Ray dual function: outside meta costs 100 Fury, no cooldown. Inside meta has 16s hasted CD
  (14s with Voidpurge), pauses Fury drain. Always fully channel for rewards.'
- 'Devourer is a CASTER spec at 25-yard range. Unlike melee Havoc, main damage (Void Ray, Collapsing
  Star) has long cast times interrupted by movement. Use Shift (20s CD, up to 3 charges, 30-yard dash),
  Consume/Devour (castable while moving), Reap (instant), Glide, and Vengeful Retreat for movement.'
- 'This is NOT Havoc DH. There is no Eye Beam, Chaos Strike, Blade Dance, or Sigil of Flame in the
  Devourer kit.'
keyTalentChoices:
- node: "Soul Glutton / Emptiness"
  description: "Soul Glutton reduces Void Metamorphosis threshold to 35 Souls — better for shorter/smaller pulls. Emptiness extends Void Metamorphosis duration — better for larger/longer pulls."
commonMistakes:
- 'Not fully channeling Void Ray — missing Eradicate transformation, Moment of Craving Reap reset, Voidglare Boon Fury, and Final Breath damage'
- 'Casting Reap/Eradicate before 3 Voidfall stacks — wasting the void meteor AoE bonus'
- 'Overcapping Voidfall stacks by casting Void Ray before spending stacks (Meteoric Rise grants a stack from Void Ray)'
- 'Not using Collapsing Star before it expires during Void Metamorphosis'
- 'Wasting Fury by overcapping — Fury cap is 120 for Annihilator'
- 'Wasting Souls beyond the 50 cap by not entering Void Metamorphosis or casting Collapsing Star when available'
- 'Not siphoning Fury with Void Ray before entering Void Metamorphosis — entry refills Fury bar, wasting any remaining'
- 'Letting Reap/Cull sit at max charges — use aggressively'
- 'Moving during Void Ray or Collapsing Star channels — use Shift, Consume, or Reap for movement instead'
patchChanges:
  12.0.1: 'Tier Set: 2pc Void Ray damage +10%. 4pc Collapsing Star damage +10% and generates 10 Fury. All damage reduced by 4% (Aura nerf).'
  '12.0': 'Devourer spec introduced as a new Demon Hunter specialization. Annihilator Hero Talent tree added.'
