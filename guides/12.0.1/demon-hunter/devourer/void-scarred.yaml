specId: 1480
className: Demon Hunter
specName: Devourer
role: DPS
heroTalent: Void-Scarred
patch: "12.0.1"
guideVersion: 1
sources:
  - "Icy Veins 12.0.1 Devourer Demon Hunter Rotation Guide"
resourceManagement:
  primaryResource: Fury
  secondaryResource: Soul Fragments
  resourceNotes: >
    Devourer is a Dual Resource specialization balancing Fury and Soul Fragments.
    Fury cap is 120. Generated by Consume, Voidblade/Hungering Slash, Soul Immolation,
    collecting Soul Fragments (4 Fury each), and Voidglare Boon (10 Fury after Void
    Ray channel completes). Void Ray costs 100 Fury outside Void Metamorphosis; inside
    Void Metamorphosis abilities no longer cost Fury, instead Fury passively drains —
    form ends when Fury runs out. Soul Fragments fill your secondary resource bar: 50
    collected (35 with Soul Glutton) grants Void Metamorphosis. During Void Metamorphosis,
    every 30 Souls generated grants one Collapsing Star cast.
maintenanceBuffs:
- spellId: 0
  spellName: Chaos Brand
  targetUptimePct: 100
  importance: critical
  coachingTip: 'Ensure Chaos Brand is applied to all targets to increase magic damage taken by 5%.'
removedMechanics:
- Traditional Metamorphosis (Devourer uses Void Metamorphosis, resource-gated not timer-based)
- Eye Beam / Demonic Window (Devourer uses Void Ray instead — different mechanic entirely)
- Chaos Strike / Blade Dance / Annihilation / Death Sweep (Devourer uses Consume, Reap, Cull, Devour)
- Sigil of Flame (not part of Devourer kit)
- Demon's Bite / Demon Blades (Devourer uses Consume as builder)
- Sinful Brand (removed in 12.0)
- Elysian Decree (removed in 12.0)
- Fodder to the Flame (removed in 12.0)
rotation:
  singleTarget: |
    [Outside Void Metamorphosis]
    1. Cast Reap on cooldown whenever it is available.
    2. Cast Voidblade right before entering Void Metamorphosis (triggers Devourer's Bite damage amp).
    3. Cast Void Metamorphosis when available.
    4. Cast Void Ray with 100+ Fury. Aim to cast right before Void Metamorphosis to leverage the Fury refund (entry refills Fury bar).
    5. Cast Consume (filler, generates Fury and Soul Fragments; castable while moving).

    [During Void Metamorphosis]
    1. Cast Pierce the Veil before Collapsing Star or a Moment of Craving-buffed Cull (triggers Devourer's Bite damage amp).
    2. Cast Collapsing Star when at 30 Souls.
    3. Cast Cull with 4 Soul Fragments or if it will overcap charges.
    4. Cast Void Ray (on cooldown; pauses Fury drain during and briefly after channel).
    5. Cast Devour (replacement for Consume; filler, castable while moving).

    [Gameplay Notes]
    - Goal is to extend Void Metamorphosis as long as possible via Emptiness. Aim for 4-5 Collapsing Stars per window.
    - Reap is used rotationally due to its large damage. Regardless of transformation state, use on cooldown to deal high damage and generate Fury.
    - Void Ray is used aggressively: outside meta, cast whenever at 100+ Fury (no cooldown). Inside meta, cast on cooldown to pause Fury drain.
    - Full Void Ray channel rewards: Voidglare Boon (10 Fury), Eradicate (upgrades next Reap to 25-yard frontal cone), Moment of Craving (resets Reap cooldown and increases soul consumption to 10), Final Breath (300% damage on final tick). Never cancel early.
    - For Void-Scarred, the melee combo depends on target count. Voidblade / Pierce the Veil are only used as a damage amp with Devourer's Bite — use Voidblade right before entering Void Metamorphosis, then Pierce the Veil whenever it will buff Collapsing Star and/or a Moment of Craving-buffed Cull.
    - Focused Ray increases Void Ray damage by 50% on single target. Avoid hitting off-targets in single-target.
    - Don't waste Fury or Souls. Check before you Reap — Reap collects Souls and generates 4 Fury each, so hold off if it will significantly overcap resources.
  aoe: |
    [Outside Void Metamorphosis]
    1. Cast Hungering Slash.
    2. Cast Vengeful Retreat with Voidstep.
    3. Cast The Hunt to put it on cooldown.
    4. Cast Voidblade to put it on cooldown.
    5. Cast Void Metamorphosis with 35+ Souls.
    6. Cast Eradicate (after full Void Ray channel — 25-yard frontal cone).
    7. Cast Void Ray with 100+ Fury. Aim to cast before meta for Fury refund.
    8. Cast Consume.

    [During Void Metamorphosis]
    1. Cast Reaper's Toll.
    2. Cast Vengeful Retreat with Voidstep.
    3. Cast Pierce the Veil.
    4. Cast Eradicate.
    5. Cast Void Ray (on cooldown).
    6. Cast Collapsing Star when at 30 Souls.
    7. Cast Cull with 4+ Soul Fragments for priority damage.
    8. Cast Devour.

    [AoE Gameplay Notes]
    - Void-Scarred AoE is quite different from single-target, utilizing the full suite of Melee Talents for additional cleave damage.
    - The melee combo depends on your current form:
      Outside: The Hunt / Voidblade -> Hungering Slash -> Vengeful Retreat.
      Inside: Predator's Wake / Pierce the Veil -> Reaper's Toll -> Vengeful Retreat.
      These can be cast as isolated 3-part combos, or a longer extended 6-part cycle.
    - In AoE, Reap/Cull casts are replaced in favour of Eradicate procs. Eradicate triggers immediately after Void Ray via Moment of Craving.
    - Void Ray is used even more aggressively in AoE. Outside meta, cast whenever at 100 Fury. Inside meta, on cooldown.
    - Emptiness vs Soul Glutton depends on pull size/duration: Soul Glutton for shorter/smaller pulls, Emptiness for larger/longer pulls.
    - Consume/Devour while moving to gather nearby Souls.
  opener: |
    [Void-Scarred Single-Target Opener]
    1. Pre-cast Consume 1 second before pull.
    2. Cast Reap.
    3. Cast Reap.
    4. Cast Consume until 100 Fury.
    5. Cast Void Ray (channel fully).
    6. Cast Reap.
    7. Repeat the above until Void Metamorphosis is ready.
    8. Cast Reap.
    9. Cast Voidblade.
    10. Cast Void Metamorphosis.
    11. Use any on-use trinkets or potions.
    12. Cast Cull.
    13. Cast Void Ray.
    14. Cast Pierce the Veil.
    15. Cast Collapsing Star.
    16. Cast Cull.
    17. Cast Devour.

    [Void-Scarred AoE Opener]
    1. Pre-cast Consume 1 second before pull.
    2. Cast Consume until 100 Fury.
    3. Cast Void Ray.
    4. Cast Eradicate.
    5. Repeat until Void Metamorphosis is ready.
    6. Cast Voidblade.
    7. Cast Hungering Slash.
    8. Cast Vengeful Retreat.
    9. Cast The Hunt.
    10. Cast Void Metamorphosis.
    11. Cast Void Ray.
    12. Cast Eradicate.
    13. Cast Reaper's Toll.
    14. Cast Vengeful Retreat.
    15. Cast Cull.
    16. Cast Pierce the Veil.
    17. Cast Reaper's Toll.
    18. Cast Vengeful Retreat.
    19. Cast Predator's Wake.
    20. Cast Reaper's Toll.
    21. Cast Vengeful Retreat.
    22. Cast Devour.

    [Opener Notes]
    - Void-Scarred wants to sequence its melee combo at the start of the fight, making sure everything is on cooldown before first Void Metamorphosis.
    - If playing AoE variant, first Void Ray should be followed by Eradicate.
    - If you have leftover Souls from a previous pull, skip ahead to Void Metamorphosis and follow main priority.
cooldowns:
- name: Void Metamorphosis
  cooldown: resource-gated
  description: >
    Primary transformation. Accessed by collecting 50 Souls (35 with Soul Glutton). Not timer-based.
    Fury passively drains; when empty, form ends. Void Ray and Collapsing Star pause drain during cast.
    Extend via Emptiness. Aim for 4-5 Collapsing Stars per window. On entry: Fury bar refills,
    Midnight Apex spawns 5 Souls and grants free Collapsing Star.
- name: Collapsing Star
  cooldown: resource-gated
  description: >
    Massive damage ability granted every 30 Souls during Void Metamorphosis. Significantly slows
    Fury drain during cast. Midnight Apex makes it always crit and grants free cast on entry.
- name: Void Ray
  cooldown: 100 Fury outside meta / 16s hasted CD inside meta
  description: >
    25-yard range, channels up to 3s (reduced by Haste), roots you. Outside meta: no cooldown, costs
    100 Fury. Inside meta: 16s hasted CD, pauses Fury drain. Full channel rewards: Eradicate, Moment
    of Craving, Voidglare Boon (10 Fury), Final Breath (300% last tick). Focused Ray +50% damage on
    single target.
- name: Reap
  cooldown: 8s base (affected by Haste)
  description: >
    Instant cast, deals Cosmic damage, consumes up to 4 Soul Fragments. Used rotationally on cooldown
    for Void-Scarred. Transforms into Eradicate after full Void Ray channel. Transforms into Cull
    during Void Metamorphosis.
- name: Pierce the Veil
  cooldown: 30s
  description: >
    Void-Scarred melee ability. Triggers Devourer's Bite damage amp during Void Metamorphosis. Use
    before Collapsing Star and/or Moment of Craving-buffed Cull.
- name: Voidblade
  cooldown: 30s
  description: >
    Leap to target, Cosmic damage, generates Fury. Triggers Devourer's Bite damage amp. For Void-Scarred,
    use right before entering Void Metamorphosis.
- name: Soul Immolation
  cooldown: 30s with Tempered Soul / passive via Spontaneous Immolation
  description: >
    Deals Fire damage to self, generates 30 Fury and shatters 3 Souls over 5 seconds.
- name: Blur
  cooldown: 1min, 2 charges
  description: 'Primary defensive; 25% damage reduction for 10s.'
- name: Darkness
  cooldown: 5min
  description: 'Group defensive; 15% chance (30% in dungeons) to avoid all damage from incoming attacks.'
- name: Void Nova
  cooldown: 45s
  description: 'Ranged AoE stun (30-yard range, 3s duration).'
- name: Disrupt
  cooldown: 15s
  description: '30-yard range interrupt.'
- name: Shift
  cooldown: 20s, up to 3 charges
  description: '30-yard dash. Primary mobility tool for repositioning between melee and ranged.'
concepts:
- 'CRITICAL SPELL TRANSFORMATION: Reap transforms into Eradicate after fully channeling Void Ray.
  Eradicate upgrades Reap to deal damage in a 25-yard cone, retaining all Reap bonuses. In combat
  logs, Eradicate casts ARE transformed Reap casts.'
- 'CRITICAL SPELL TRANSFORMATION: Reap transforms into Cull during Void Metamorphosis. Cull cooldown
  is reduced by 1 second each Devour cast. In combat logs, Cull casts ARE transformed Reap casts.'
- 'Void-Scarred melee combo depends on form. Outside: The Hunt/Voidblade -> Hungering Slash -> Vengeful
  Retreat. Inside: Predator''s Wake/Pierce the Veil -> Reaper''s Toll -> Vengeful Retreat. Can be
  cast as isolated 3-part combos or a longer 6-part cycle.'
- 'Void Ray dual function: outside meta costs 100 Fury, no cooldown. Inside meta has 16s hasted CD,
  pauses Fury drain. Always fully channel for rewards.'
- 'Devourer is a hybrid caster/melee spec at 25-yard range. Void-Scarred requires weaving into melee
  for Voidblade/Pierce the Veil, then repositioning at range with Shift.'
- 'This is NOT Havoc DH. There is no Eye Beam, Chaos Strike, Blade Dance, or Sigil of Flame in the
  Devourer kit.'
keyTalentChoices:
- node: "Soul Glutton / Emptiness"
  description: "Soul Glutton reduces Void Metamorphosis threshold to 35 Souls — better for shorter/smaller pulls. Emptiness extends Void Metamorphosis duration — better for larger/longer pulls."
commonMistakes:
- 'Not fully channeling Void Ray — missing Eradicate transformation, Moment of Craving Reap reset, Voidglare Boon Fury, and Final Breath damage'
- 'Not using Collapsing Star before it expires during Void Metamorphosis'
- 'Wasting Fury by overcapping — use Void Ray to spend excess Fury'
- 'Wasting Souls beyond the 50 cap by not entering Void Metamorphosis or casting Collapsing Star when available'
- 'Not siphoning Fury with Void Ray before entering Void Metamorphosis — entry refills Fury bar, wasting any remaining'
- 'Failing to weave into melee for Voidblade before Void Metamorphosis entry and Pierce the Veil during'
- 'Moving during Void Ray or Collapsing Star channels — use Shift, Consume, or Reap for movement instead'
- 'Letting Reap/Cull sit at max charges — use aggressively'
patchChanges:
  12.0.1: 'Tier Set: 2pc Void Ray damage +10%. 4pc Collapsing Star damage +10% and generates 10 Fury. All damage reduced by 4% (Aura nerf). Midnight Apex: Collapsing Star always crits; entering Void Meta spawns 5 Souls.'
  '12.0': 'Devourer spec introduced as a new Demon Hunter specialization. Void-Scarred Hero Talent tree added.'
