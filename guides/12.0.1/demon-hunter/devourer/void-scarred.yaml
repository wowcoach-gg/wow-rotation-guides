# ═══════════════════════════════════════════════════════════════════════════════
# IMPORTANT: Void-Scarred has TWO distinct builds depending on gear (tier set).
#
# 1. CASTER BUILD (with 4-piece tier set):
#    - Drops all melee talents (Hungering Slash, The Hunt, Voidstep, etc.)
#    - Plays as a full 25-yard caster, only weaving melee for Voidblade/Pierce the Veil
#    - This is the dominant build at mythic raid level once you have 4pc
#
# 2. MELEE HYBRID BUILD (without 4-piece tier set, or early gearing):
#    - Takes full melee talent suite (Hungering Slash, The Hunt, Voidstep, Reaper's Toll, Predator's Wake)
#    - Plays as a hybrid with frequent melee combos woven between casts
#    - Best option before acquiring 4-piece tier; also viable in M+ for burst
#
# The AI coach should detect which build the player is using via spell usage patterns
# and coach accordingly. BOTH builds are valid — do NOT tell a player they are using
# the "wrong" build. Instead, coach them on the rotation for the build they are running.
# ═══════════════════════════════════════════════════════════════════════════════

resourceManagement:
  primaryResource: Fury
  secondaryResource: Soul Fragments
  resourceNotes: >
    Devourer is a Dual Resource specialization balancing Fury and Soul Fragments.
    Fury cap is 120. Generated by Consume, Voidblade/Hungering Slash, Soul Immolation,
    collecting Soul Fragments (4 Fury each), and Voidglare Boon (10 Fury after Void
    Ray channel completes). Void Ray costs 100 Fury outside Void Metamorphosis; inside
    Void Metamorphosis abilities no longer cost Fury, instead Fury passively drains —
    form ends when Fury runs out. Soul Fragments fill your secondary resource bar: 50
    collected (35 with Soul Glutton) grants Void Metamorphosis. During Void Metamorphosis,
    every 30 Souls generated grants one Collapsing Star cast.

maintenanceBuffs:
- spellId: 0
  spellName: Chaos Brand
  targetUptimePct: 100
  importance: critical
  coachingTip: 'Ensure Chaos Brand is applied to all targets to increase magic damage taken by 5%.'

playstyles:
  - id: void_scarred_caster
    name: "Void-Scarred Caster (4-piece tier)"
    description: >
      Full caster build used when you have 4-piece tier set. Drops all melee talents
      (Hungering Slash, The Hunt, Voidstep). Plays at 25-yard range, only weaving into
      melee briefly for Voidblade and Pierce the Veil to trigger Devourer's Bite. The
      4pc Collapsing Star Fury generation helps sustain longer Void Metamorphosis windows,
      making melee fillers unnecessary. This is the dominant build at mythic raid level.
    detectionCriteria:
      heroTalents:
        - "Void-Scarred"
      spellUsagePatterns:
        highUsage:
          - spellName: Void Ray
          - spellName: Collapsing Star
          - spellName: Consume
          - spellName: Pierce the Veil
        lowUsage:
          - spellName: Hungering Slash
          - spellName: The Hunt
          - spellName: Reaper's Toll
          - spellName: Predator's Wake

  - id: void_scarred_melee
    name: "Void-Scarred Melee Hybrid (pre-4-piece or M+)"
    description: >
      Melee hybrid build used before acquiring 4-piece tier set, or in M+ for burst-heavy
      scenarios. Takes the full melee talent suite (Hungering Slash, The Hunt, Voidstep,
      Reaper's Toll, Predator's Wake). Weaves 3-part melee combos between caster abilities
      for additional resource generation and damage. Void Metamorphosis windows are shorter
      but more frequent. This build has lower ceiling than caster but better resilience to
      downtime and interruptions.
    detectionCriteria:
      heroTalents:
        - "Void-Scarred"
      spellUsagePatterns:
        highUsage:
          - spellName: Hungering Slash
          - spellName: The Hunt
          - spellName: Reaper's Toll
          - spellName: Vengeful Retreat
          - spellName: Void Ray
        lowUsage: []

removedMechanics:
- Traditional Metamorphosis (Devourer uses Void Metamorphosis, resource-gated not timer-based)
- Eye Beam / Demonic Window (Devourer uses Void Ray instead — different mechanic entirely)
- Chaos Strike / Blade Dance / Annihilation / Death Sweep (Devourer uses Consume, Reap, Cull, Devour)
- Sigil of Flame (not part of Devourer kit)
- Demon's Bite / Demon Blades (Devourer uses Consume as builder)

rotation:
  singleTarget: |
    ════════════════════════════════════════════════
    CASTER BUILD (with 4-piece tier set)
    ════════════════════════════════════════════════
    This build does NOT use Hungering Slash, The Hunt, Reaper's Toll, or Predator's Wake.
    If the player is casting these abilities, they are using the Melee Hybrid build below.

    [Caster — Outside Void Metamorphosis]
    1. Cast Voidblade if Devourer's Bite is talented and your next cast will be Void Metamorphosis.
    2. Cast Void Metamorphosis when available.
    3. Cast Void Ray with 100+ Fury.
    4. Cast Soul Immolation on cooldown (skip if Spontaneous Immolation talented).
    5. Cast Reap on cooldown.
    6. Cast Consume (filler; castable while moving).

    [Caster — During Void Metamorphosis]
    1. Cast Collapsing Star if Void Metamorphosis is about to expire (emergency spend).
    2. Cast Void Ray if Void Metamorphosis is about to expire (emergency Fury drain pause).
    3. Cast Cull on cooldown.
    4. Cast Pierce the Veil (triggers Devourer's Bite damage amp; use before Collapsing Star or Moment of Craving-buffed Cull).
    5. Cast Void Ray on cooldown.
    6. Cast Collapsing Star when at 30 Souls.
    7. Cast Cull when buffed by Student of Suffering.
    8. Cast Cull.
    9. Cast Devour (filler; castable while moving).
    10. Cast Soul Immolation (filler if nothing else available).

    ════════════════════════════════════════════════
    MELEE HYBRID BUILD (without 4-piece tier set)
    ════════════════════════════════════════════════
    This build uses the full melee talent suite. If the player is NOT casting Hungering Slash
    or The Hunt, they are using the Caster build above.

    [Melee — Outside Void Metamorphosis]
    1. Cast Vengeful Retreat if buffed by Voidstep.
    2. Cast Hungering Slash.
    3. Cast The Hunt.
    4. Cast Voidblade (triggers Devourer's Bite; use right before Void Metamorphosis entry).
    5. Cast Void Metamorphosis when available.
    6. Cast Eradicate (after full Void Ray channel).
    7. Cast Void Ray with 100+ Fury.
    8. Cast Soul Immolation on cooldown (skip if Spontaneous Immolation talented).
    9. Cast Consume (filler).
    10. Cast Reap on cooldown.

    [Melee — During Void Metamorphosis]
    1. Cast Collapsing Star if Void Metamorphosis is about to expire (emergency spend).
    2. Cast Void Ray if Void Metamorphosis is about to expire (emergency Fury drain pause).
    3. Cast Vengeful Retreat if buffed by Voidstep.
    4. Cast Reaper's Toll.
    5. Cast Pierce the Veil (triggers Devourer's Bite damage amp).
    6. Cast Predator's Wake.
    7. Cast Eradicate (after full Void Ray channel).
    8. Cast Void Ray on cooldown.
    9. Cast Devour (filler).
    10. Cast Cull.
    11. Cast Soul Immolation (filler).

    [Gameplay Notes — Both Builds]
    - Goal is to extend Void Metamorphosis as long as possible. Aim for 4-5 Collapsing Stars per window (caster) or 2-3 (melee, shorter windows).
    - Void Ray is always used aggressively: outside meta at 100+ Fury, inside meta on cooldown to pause Fury drain.
    - Full Void Ray channel rewards: Voidglare Boon (10 Fury), Eradicate (upgrades next Reap to 25-yard frontal cone), Moment of Craving (resets Reap cooldown), Final Breath (300% damage on final tick). Never cancel early.
    - Focused Ray increases Void Ray damage by 50% on single target.
    - Don't waste Fury or Souls — check before Reap to avoid significant overcapping.
    - Void Metamorphosis entry refills Fury bar. Siphon Fury off with Void Ray before entry.

  aoe: |
    ════════════════════════════════════════════════
    CASTER BUILD AoE (with 4-piece tier set)
    ════════════════════════════════════════════════

    [Caster AoE — Outside Void Metamorphosis]
    1. Cast Voidblade if Devourer's Bite talented and next cast is Void Metamorphosis.
    2. Cast Void Metamorphosis with 35+ Souls.
    3. Cast Eradicate (after full Void Ray channel — 25-yard frontal cone).
    4. Cast Void Ray with 100+ Fury.
    5. Cast Soul Immolation (skip if Spontaneous Immolation talented).
    6. Cast Consume.
    7. Cast Reap.

    [Caster AoE — During Void Metamorphosis]
    1. Cast Collapsing Star when at 30 Souls.
    2. Cast Pierce the Veil (once, to proc Voidsurge).
    3. Cast Eradicate.
    4. Cast Void Ray on cooldown.
    5. Cast Devour.
    6. Cast Cull.
    7. Cast Soul Immolation (filler).

    ════════════════════════════════════════════════
    MELEE HYBRID BUILD AoE (without 4-piece tier set)
    ════════════════════════════════════════════════

    [Melee AoE — Outside Void Metamorphosis]
    1. Cast Hungering Slash.
    2. Cast Vengeful Retreat with Voidstep.
    3. Cast The Hunt to put it on cooldown.
    4. Cast Voidblade to put it on cooldown.
    5. Cast Void Metamorphosis with 35+ Souls.
    6. Cast Eradicate (after full Void Ray channel).
    7. Cast Void Ray with 100+ Fury.
    8. Cast Soul Immolation (skip if Spontaneous Immolation talented).
    9. Cast Consume.
    10. Cast Reap.

    [Melee AoE — During Void Metamorphosis]
    1. Cast Reaper's Toll.
    2. Cast Vengeful Retreat with Voidstep.
    3. Cast Pierce the Veil.
    4. Cast Predator's Wake.
    5. Cast Eradicate.
    6. Cast Void Ray on cooldown.
    7. Cast Collapsing Star when at 30 Souls.
    8. Cast Cull with 4+ Soul Fragments for priority damage.
    9. Cast Devour.

    [AoE Gameplay Notes — Both Builds]
    - In AoE, Reap/Cull casts are replaced by Eradicate procs after full Void Ray channel.
    - Melee build combo: Outside: The Hunt/Voidblade -> Hungering Slash -> Vengeful Retreat. Inside: Predator's Wake/Pierce the Veil -> Reaper's Toll -> Vengeful Retreat. Can be 3-part combos or a 6-part cycle.
    - Emptiness vs Soul Glutton depends on pull size: Soul Glutton for shorter pulls, Emptiness for longer.
    - Consume/Devour while moving to gather nearby Souls.

  opener: |
    ════════════════════════════════════════════════
    CASTER BUILD Opener (with 4-piece tier set)
    ════════════════════════════════════════════════

    [Caster Single-Target Opener]
    1. Pre-cast Consume 1 second before pull.
    2. Cast Reap.
    3. Cast Reap.
    4. Cast Consume until 100 Fury.
    5. Cast Void Ray (channel fully).
    6. Cast Reap.
    7. Repeat the above until Void Metamorphosis is ready.
    8. Cast Reap.
    9. Cast Voidblade.
    10. Cast Void Metamorphosis.
    11. Use any on-use trinkets or potions.
    12. Cast Cull.
    13. Cast Void Ray.
    14. Cast Pierce the Veil.
    15. Cast Collapsing Star.
    16. Cast Cull.
    17. Cast Devour.

    ════════════════════════════════════════════════
    MELEE HYBRID BUILD Opener (without 4-piece tier set)
    ════════════════════════════════════════════════

    [Melee Single-Target Opener]
    Note: The melee build opener follows the same general pattern as AoE — sequence your
    melee combo (Hungering Slash, Vengeful Retreat, The Hunt) to put everything on cooldown,
    then build toward Void Metamorphosis via Consume -> Void Ray cycles. Once in meta,
    follow the Melee During Void Metamorphosis priority list above.

    [Melee AoE Opener]
    1. Pre-cast Consume 1 second before pull.
    2. Cast Consume until 100 Fury.
    3. Cast Void Ray.
    4. Cast Eradicate.
    5. Repeat until Void Metamorphosis is ready.
    6. Cast Voidblade.
    7. Cast Hungering Slash.
    8. Cast Vengeful Retreat.
    9. Cast The Hunt.
    10. Cast Void Metamorphosis.
    11. Cast Void Ray.
    12. Cast Eradicate.
    13. Cast Reaper's Toll.
    14. Cast Vengeful Retreat.
    15. Cast Cull.
    16. Cast Pierce the Veil.
    17. Cast Reaper's Toll.
    18. Cast Vengeful Retreat.
    19. Cast Predator's Wake.
    20. Cast Reaper's Toll.
    21. Cast Vengeful Retreat.
    22. Cast Devour.

    [Opener Notes]
    - Melee build wants to sequence its melee combo at the start, getting everything on cooldown before first Void Metamorphosis.
    - Caster build opener is simpler — straight into Consume -> Void Ray cycle to reach meta ASAP.
    - If playing AoE variant, first Void Ray should always be followed by Eradicate.
    - If you have leftover Souls from a previous pull, skip ahead to Void Metamorphosis.

cooldowns:
- name: Void Metamorphosis
  cooldown: resource-gated
  description: >
    Primary transformation. Accessed by collecting 50 Souls (35 with Soul Glutton). Not timer-based.
    Fury passively drains; when empty, form ends. Void Ray and Collapsing Star pause drain during cast.
    Extend via Emptiness. Aim for 4-5 Collapsing Stars per window (caster) or 2-3 (melee). On entry:
    Fury bar refills, Midnight Apex spawns 5 Souls and grants free Collapsing Star.
- name: Collapsing Star
  cooldown: resource-gated
  description: >
    Massive damage ability granted every 30 Souls during Void Metamorphosis. Significantly slows
    Fury drain during cast. Midnight Apex makes it always crit and grants free cast on entry.
    4pc tier generates 10 Fury on completion, helping sustain longer meta windows.
- name: Void Ray
  cooldown: 100 Fury outside meta / 16s hasted CD inside meta
  description: >
    25-yard range, channels up to 3s (reduced by Haste), roots you. Outside meta: no cooldown, costs
    100 Fury. Inside meta: 16s hasted CD, pauses Fury drain. Full channel rewards: Eradicate, Moment
    of Craving, Voidglare Boon (10 Fury), Final Breath (300% last tick). Focused Ray +50% damage on
    single target.
- name: Reap
  cooldown: 8s base (affected by Haste)
  description: >
    Instant cast, deals Cosmic damage, consumes up to 4 Soul Fragments. Used rotationally on cooldown
    for Void-Scarred. Transforms into Eradicate after full Void Ray channel. Transforms into Cull
    during Void Metamorphosis.
- name: Pierce the Veil
  cooldown: 30s
  description: >
    Void-Scarred melee ability. Triggers Devourer's Bite damage amp during Void Metamorphosis. Use
    before Collapsing Star and/or Moment of Craving-buffed Cull. Used in BOTH caster and melee builds.
- name: Voidblade
  cooldown: 30s
  description: >
    Leap to target, Cosmic damage, generates Fury. Triggers Devourer's Bite damage amp. Used in BOTH
    builds — right before entering Void Metamorphosis.
- name: Hungering Slash
  cooldown: 12s
  description: >
    MELEE BUILD ONLY. Melee range cleave ability. Empowered into Reaper's Toll during Void Metamorphosis.
    Not talented in the caster (4pc) build.
- name: The Hunt
  cooldown: 1.5min
  description: >
    MELEE BUILD ONLY. Long-range charge into melee. Empowered into Predator's Wake during Void
    Metamorphosis. Not talented in the caster (4pc) build.
- name: Soul Immolation
  cooldown: 30s with Tempered Soul / passive via Spontaneous Immolation
  description: >
    Deals Fire damage to self, generates 30 Fury and shatters 3 Souls over 5 seconds.
    If Spontaneous Immolation is talented, this fires automatically and should be ignored in priority.
- name: Blur
  cooldown: 1min, 2 charges
  description: 'Primary defensive; 25% damage reduction for 10s.'
- name: Darkness
  cooldown: 5min
  description: 'Group defensive; 15% chance (30% in dungeons) to avoid all damage from incoming attacks.'
- name: Void Nova
  cooldown: 45s
  description: 'Ranged AoE stun (30-yard range, 3s duration).'
- name: Disrupt
  cooldown: 15s
  description: '30-yard range interrupt.'
- name: Shift
  cooldown: 20s, up to 3 charges
  description: '30-yard dash. Primary mobility tool for repositioning between melee and ranged.'

concepts: |
  CRITICAL — TWO VALID BUILDS EXIST FOR VOID-SCARRED:

  BUILD DETECTION:
  - If the player is casting Hungering Slash, The Hunt, Reaper's Toll, or Predator's Wake → they are using the MELEE HYBRID build (typically without 4-piece tier set).
  - If the player is NOT casting those abilities → they are using the CASTER build (typically with 4-piece tier set).
  - BOTH builds are valid. Do NOT tell a player they are using the wrong build. Coach them on whichever build they are running.
  - The build choice is driven by gear: with 4-piece tier, the Collapsing Star Fury generation makes melee talents unnecessary. Without 4-piece, melee talents provide needed resource generation and damage to fill gaps.

  CASTER BUILD OVERVIEW:
  - Full 25-yard ranged caster. Only weaves into melee briefly for Voidblade (before meta entry) and Pierce the Veil (during meta, for Devourer's Bite amp).
  - Higher damage ceiling, longer Void Metamorphosis windows (4-5 Collapsing Stars).
  - More vulnerable to movement and interruptions since main damage (Void Ray, Collapsing Star) requires standing still.

  MELEE HYBRID BUILD OVERVIEW:
  - Weaves 3-part melee combos between caster abilities. Outside meta: The Hunt/Voidblade -> Hungering Slash -> Vengeful Retreat. Inside meta: Predator's Wake/Pierce the Veil -> Reaper's Toll -> Vengeful Retreat.
  - Shorter but more frequent Void Metamorphosis windows (2-3 Collapsing Stars per window).
  - More resilient to downtime and movement since melee combos are instant-cast.
  - Better burst profile for M+ trash and short-lived targets.

  SHARED CONCEPTS:
  - CRITICAL SPELL TRANSFORMATION: Reap transforms into Eradicate after fully channeling Void Ray. Eradicate is a 25-yard frontal cone retaining all Reap bonuses. In combat logs, Eradicate casts ARE transformed Reap casts.
  - CRITICAL SPELL TRANSFORMATION: Reap transforms into Cull during Void Metamorphosis. Cull cooldown reduced by 1s per Devour cast. In combat logs, Cull casts ARE transformed Reap casts.
  - MELEE BUILD TRANSFORMATION: Hungering Slash becomes Reaper's Toll during Void Metamorphosis. The Hunt becomes Predator's Wake during Void Metamorphosis.
  - Void Ray dual function: outside meta costs 100 Fury, no cooldown. Inside meta has 16s hasted CD, pauses Fury drain. Always fully channel for rewards.
  - This is NOT Havoc DH. There is no Eye Beam, Chaos Strike, Blade Dance, or Sigil of Flame in the Devourer kit.

keyTalentChoices:
- node: "Melee Talents vs Caster Talents"
  description: >
    WITH 4-piece tier set: Drop Hungering Slash, The Hunt, Voidstep and take full caster talents.
    The 4pc Collapsing Star Fury generation sustains Void Metamorphosis without melee fillers.
    WITHOUT 4-piece: Take Hungering Slash, The Hunt, Voidstep for additional resource generation
    and damage during shorter Void Metamorphosis windows.
- node: "Soul Glutton / Emptiness"
  description: >
    Soul Glutton reduces Void Metamorphosis threshold to 35 Souls — better for shorter/smaller pulls
    and melee build. Emptiness extends Void Metamorphosis duration — better for larger/longer pulls
    and caster build.
- node: "Spontaneous Immolation / Tempered Soul"
  description: >
    Spontaneous Immolation makes Soul Immolation fire automatically — remove it from your priority.
    Tempered Soul gives manual control with a 30s cooldown.

commonMistakes:
- 'Not fully channeling Void Ray — missing Eradicate transformation, Moment of Craving Reap reset, Voidglare Boon Fury, and Final Breath damage. This applies to BOTH builds.'
- 'Not using Collapsing Star before it expires during Void Metamorphosis'
- 'Wasting Fury by overcapping — use Void Ray to spend excess Fury'
- 'Not siphoning Fury with Void Ray before entering Void Metamorphosis — entry refills Fury bar, wasting any remaining'
- '[CASTER BUILD] Not using Pierce the Veil before Collapsing Star or Moment of Craving-buffed Cull — missing Devourer''s Bite damage amp'
- '[MELEE BUILD] Not sequencing melee combos before Void Metamorphosis entry — The Hunt and Hungering Slash should be on cooldown before you enter meta'
- '[MELEE BUILD] Holding Vengeful Retreat when Voidstep is active — the movement and damage from the combo is wasted if you sit on it'
- 'Moving during Void Ray or Collapsing Star channels — use Shift, Consume, or Reap for movement instead'
- 'Letting Reap/Cull sit at max charges — use aggressively in both builds'

patchChanges:
  12.0.1: >
    Tier Set: 2pc Void Ray damage +10%. 4pc Collapsing Star damage +10% and generates 10 Fury on
    completion. The 4pc Fury generation is what enables the caster build by sustaining longer Void
    Metamorphosis windows without melee talent support. All damage reduced by 4% (Aura nerf).
    Midnight Apex: Collapsing Star always crits; entering Void Meta spawns 5 Souls.
  '12.0': 'Devourer spec introduced. Void-Scarred Hero Talent tree added.'
