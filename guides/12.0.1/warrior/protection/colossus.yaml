- Seismic Reverberation (removed in 12.0)

rotation:
  singleTarget: |-
    1. Cast Avatar on cooldown.
    2. Cast Demoralizing Shout on cooldown (sync with Avatar).
    3. Cast Champion's Spear.
    4. Cast Ravager on cooldown.
    5. Cast Demolish on cooldown (during Avatar/Demo Shout windows ideally).
    6. Cast Shield Charge on cooldown.
    7. Cast Shield Slam on cooldown (reduces Demolish CD via Colossal Might).
    8. Cast Thunder Clap to trigger Phalanx (Apex) buffs.
    9. Cast Wrecking Throw on cooldown (or Shattering Throw if talented).
    10. Cast Execute ONLY if: Deep Wounds is talented, Shield Slam AND Thunder Clap are on CD, AND you have 40+ Rage.
    11. Cast Revenge if Shield Slam and Thunder Clap are on CD (deals more damage than Thunder Clap for Colossus).
    Ignore Pain takes priority over ANY ability if next cast would cap Rage.
  aoe: |-
    1. Cast Avatar on cooldown.
    2. Cast Demoralizing Shout on cooldown.
    3. Cast Ravager on cooldown.
    4. Cast Champion's Spear on cooldown.
    5. Cast Shield Charge on cooldown.
    6. Cast Demolish on cooldown (position to hit all targets for Deep Wounds via Decimator).
    7. Cast Shield Slam on cooldown.
    8. Cast Thunder Clap on cooldown. Takes priority over Revenge if Rend is about to fall off.
    9. Cast Revenge for damage if survivability is not an issue.
    10. Ignore Pain to dump excess Rage (off-GCD).
  opener: |-
    1. Taunt as you cast Charge.
    2. Cast Ravager.
    3. Cast Avatar as you Charge.
    4. Cast Shield Block.
    5. Cast Shield Slam.
    6. Cast Demoralizing Shout.
    7. Cast Champion's Spear.
    8. Cast Demolish.
    9. Cast Shield Charge.
    10. Continue with single-target priority.

cooldowns:
- name: Demolish
  cooldown: 45s (reduced by Shield Slam via Colossal Might)
  description: 'Colossus signature. Hard-hitting channel, grants immunity to stuns/knockbacks/forced movement.
    Position so enemies are in front — movement cancels channel. Decimator talent applies Deep Wounds to
    all targets hit.'
- name: Avatar
  cooldown: 1.5min
  description: 'Major offensive cooldown. Increases damage and generates Rage. Sync with Demolish and
    Demoralizing Shout for maximum burst.'
- name: Demoralizing Shout
  cooldown: 45s
  description: 'Defensive and offensive (Booming Voice). Reduces enemy damage, increases your damage,
    generates 20 Rage with Booming Voice.'
- name: "Champion's Spear"
  cooldown: 1.5min
  description: 'Deals damage and generates Rage. Allows leaping to spear location. Important rotational
    cooldown — do not omit.'
- name: Shield Wall
  cooldown: 3min
  description: 'Major defensive. Reduces all damage taken. Now passively triggers Last Stand (increases
    max health).'
- name: Ravager
  cooldown: 90s
  description: 'Generates up to 60 Rage, deals AoE damage. Increases Thunder Clap and Revenge damage by
    50% while active.'
- name: Shield Charge
  cooldown: 45s
  description: 'Gap closer dealing damage, generating Rage, and granting Shield Block.'
- name: Spell Reflection
  cooldown: 25s
  description: 'Reduces magic damage taken and reflects certain spells.'
- name: Rallying Cry
  cooldown: 3min
  description: 'Group survivability. Increases health of all party/raid members.'
- name: Impending Victory
  cooldown: 25s
  description: 'Self-heal on short cooldown. Use freely whenever health dips.'

concepts:
- 'Colossal Might: Shield Slam casts reduce Demolish cooldown. This makes Shield Slam your most important
  rotational button — never delay it.'
- 'Demolish Mechanics: Channeled ability. Must position enemies in front. Movement cancels channel. Grants
  stun/knockback immunity during channel. Use to avoid forced movement mechanics.'
- 'Decimator: Demolish applies Deep Wounds to all targets hit. Critical for AoE setup.'
- 'Execute Conditions (Colossus): Only cast if (1) Deep Wounds is talented, (2) Shield Slam
  AND Thunder Clap are both on CD, (3) 40+ Rage. Otherwise skip it.'
- 'Revenge vs Thunder Clap: As Colossus, Revenge deals more damage than Thunder Clap. Spend excess Rage on
  Revenge for damage when survivability is not a concern.'
- 'Phalanx (Apex Talent): Thunder Clap buffs next Shield Slam to deal frontal cone damage. Weave Thunder
  Clap to trigger these force waves even as Colossus.'
- 'Mobility: Use Heroic Leap and Charge for positioning. Heroic Leap resets the cooldown of Taunt.'
- 'Utility: Use Shockwave, Storm Bolt, and Disrupting Shout for crowd control and interrupts.'

commonMistakes:
- Interrupting Demolish channel by moving or using movement abilities.
- Using Demolish when enemies are behind you or about to move out of frontal area.
- Missing Champion's Spear from rotation — it is a key cooldown.
- Prioritizing Thunder Clap over Revenge for Rage dumping (Colossus gains more from Revenge).
- Letting Shield Block drop while actively taking melee hits.
- Overcapping Rage instead of dumping with Ignore Pain or Revenge.
- Holding Avatar and Demolish too long instead of using rotationally.
- Not using Shield Slam on cooldown, delaying Demolish via Colossal Might.
- Casting Execute without Deep Wounds/Bloodborne talented or below 40 Rage.

patchChanges:
  12.0.1: 'Taunt duration increased to 6s. Deep Wounds is now talent-only (Execute or Decimator). Last Stand
    is passive on Shield Wall. Anger Management requires 20 Rage/sec (up from 10). Ravager increases Thunder
    Clap and Revenge damage by 50%.'
  '12.0': 'Thunderous Roar, Uproar, Immovable Object, Piercing Challenge removed. Colossus hero talent
    added with Demolish. Phalanx Apex talent added.'
