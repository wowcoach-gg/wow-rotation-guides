specId: 73
className: Warrior
specName: Protection
role: Tank
heroTalent: Colossus
patch: "12.0.1"
guideVersion: 3

resourceManagement:
  primaryResource: Rage
  secondaryResource: None
  resourceNotes: 'Generate Rage through Shield Slam, Thunder Clap, Ravager, auto-attacks, and taking damage.
    Spend Rage on Shield Block and Ignore Pain for mitigation, or Revenge and Execute for damage. Colossus
    focuses on Demolish as a hard-hitting channel, reduced by Shield Slam via Colossal Might. Never cap Rage
    — use Ignore Pain (off-GCD) to dump excess.'

maintenanceBuffs:
- spellId: 0
  spellName: Shield Block
  targetUptimePct: 95
  importance: critical
  coachingTip: 'Maintain while actively tanking blockable damage. Effective uptime matters more than raw
    uptime — ensure active during melee swings.'
- spellId: 0
  spellName: Ignore Pain
  targetUptimePct: 70
  importance: high
  coachingTip: 'Use to dump excess Rage and prevent capping. Prioritize if about to hit 100 Rage or taking
    non-blockable damage. Off-GCD — always takes priority over any ability if next cast would cap Rage.'
- spellId: 0
  spellName: Deep Wounds
  targetUptimePct: 90
  importance: medium
  coachingTip: 'Applied via Execute (with talent) or Demolish (via Decimator). Required for Execute to be
    worth casting. Talent bloodborne increases damage'

tankingGuide:
  survivalPriority: |-
    These abilities take absolute priority over the damage rotation below.
    1. Maintain Shield Block while actively tanking blockable damage (most melee hits).
       Effective uptime matters more than raw uptime — do not waste charges when not being attacked.
       Time Shield Block around enemy swing timers and high-damage blockable abilities.
       If not tanking, you may use Shield Block to buff Shield Slam damage (30% increase while active).
    2. Use Ignore Pain to spend excess Rage and smooth non-blockable damage.
       Off-GCD with its own internal cooldown — weave it between normal abilities.
       Shield Block takes priority over Ignore Pain when tanking blockable damage.
       Always use Ignore Pain if your next ability would cap Rage.
       Pool Rage and cast Ignore Pain before predictable damage spikes.
  defensiveCooldowns: |-
    - Shield Wall (3min): Primary defensive. Use proactively for heavy damage, not as a panic button.
      Passively triggers Last Stand (increases max HP). Reduced by Anger Management.
    - Demoralizing Shout (45s): Both defensive and offensive (Booming Voice). Use on cooldown for
      the DPS gain unless you need to hold it for a specific damage event. Thunderlord reduces CD further.
    - Spell Reflection (25s): 20% magic damage reduction for 5 seconds. Reflects certain spells.
      The magic DR persists even after a reflect consumes the buff. Know which abilities are reflectable.
    - Rallying Cry (3min): Group-wide HP increase. Coordinate with healer for dangerous moments.
    - Impending Victory: Self-heal on short cooldown. Use freely whenever health dips.
  stanceDancing: |-
    Defensive Stance: 20% damage reduction + 5% magic DR. Stay in this while actively tanking.
    Battle Stance: 3% Crit + 10% CC reduction. Swap to this ONLY when not tanking anything and
    taking no significant damage. The 3% crit is not worth losing 20%+ DR.
  rageManagement: |-
    Your rotation exists to generate Rage. Rage is spent on Shield Block and Ignore Pain for survival,
    or Revenge for damage. Never cap at 100 — capping wastes Indomitable healing (1% per 15 Rage spent)
    and Anger Management CDR (1s off Avatar/Shield Wall per 20 Rage). Ignore Pain (off-GCD) is your
    primary Rage dump. Colossus generates extra Rage through Demolish and Shield Slam spam (Colossal
    Might keeps Demolish cycling faster). Use Revenge for damage only when survivability is not a concern —
    Revenge deals more damage than Thunder Clap for Colossus.

