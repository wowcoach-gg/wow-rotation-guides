removedMechanics: |
  - Ritual of Ruin (Removed in 12.0)
  - Decimation (Removed in 12.0)
  - Eradication (Removed in 12.0)
  - Soul Conduit (Removed in 12.0)
  - Dimension Ripper (Removed in 12.0)
  - Unstable Rifts (Removed in 12.0)
  - Health Funnel (Removed in 12.0; healing moved to Drain Life via Infernal Beneficiary)
  - Shadowburn (Reworked: Now only usable on targets below 20% health unless Fiendish Cruelty procs)
  - Fiendish Cruelty (Reworked: Now a crit proc that allows a free Shadowburn on any target)
  - Roaring Blaze (Reworked: Now spreads Immolate to 3 nearby targets instead of a damage debuff)
  - Dimensional Rift (Reworked: Now a passive talent — 10% proc from Chaos Bolt/Shadowburn. No longer actively castable.)
  - Touch of Rancora (Reworked: Toned down to a minor damage buff)

rotation:
  singleTarget: |
    1. Maintain Immolate (or Wither for Hellcaller) at all times.
    2. Cast Summon Infernal on cooldown.
    3. Cast Shadowburn whenever available (Execute range or Fiendish Cruelty proc).
    4. Cast Soul Fire when available if below 4 shards.
    5. Cast Chaos Bolt if you are about to cap Soul Shards (at 4+ shards).
    6. Cast Cataclysm on cooldown (if talented for Immolate/Wither refresh).
    7. Cast Infernal Bolt if below 4 Shards (Diabolist only).
    8. Cast Channel Demonfire whenever available (if talented).
    9. Cast Conflagrate if you have 2 charges to avoid capping and to generate Backdraft.
    10. Cast Conflagrate to generate Soul Shards.
    11. Cast Incinerate to generate Soul Shards.
  aoe: |
    1. Maintain Immolate on the main target.
    2. Maintain Wither on as many targets as possible (Hellcaller).
    3. Cast Summon Infernal.
    4. Cast Malevolence (Hellcaller) with as many targets affected by Wither as possible.
    5. Apply Immolate on any secondary target that will last a minimum of 10 seconds.
    6. Use Conflagrate on the main target to spread Immolate/Wither to secondary targets (via Roaring Blaze).
    7. Cast Cataclysm on cooldown (if talented; delay slightly if more targets are about to spawn).
    8. Cast Shadowburn when available during Malevolence.
    9. Cast Rain of Fire if there are 5+ targets with Havoc up, or 3+ targets if Havoc is on cooldown.
    10. Cast Rain of Fire if there are 8+ targets outside of the Havoc window.
    11. Cast Shadowburn whenever available (Execute/Proc).
    12. Cast Soul Fire when available if below 4 shards.
    13. Cast Chaos Bolt if you have 5 Soul Shards (to avoid capping).
    14. Cast Infernal Bolt if below 4 Shards (Diabolist only).
    15. Apply Havoc if a secondary target is present.
    16. Cast Channel Demonfire when available (if talented).
    17. Cast Conflagrate to generate Soul Shards and Backdraft stacks.
    18. Cast Incinerate to generate Soul Shards.
  opener: |
    1. Pre-cast Soul Fire
    2. Pre-cast Incinerate
    3. Pre-cast Immolate
    4. Pre-cast Cataclysm (if talented)
    5. Cast Wither (if Hellcaller)
    6. Cast Conflagrate
    8. Cast Summon Infernal
    9. Use Trinkets and Racials
    10. Cast Malevolence (if Hellcaller)
    11. Cast Chaos Bolt
    12. Cast Conflagrate

cooldowns: |
  - Summon Infernal (3min): Main offensive cooldown. Generates shards and empowers spenders via Crashing Chaos. Use on cooldown.
  - Malevolence (1min): Hellcaller specific. Bolsters burst windows and interacts with Wither stacks.
  - Havoc (30s): Duplicates single-target spells onto a second target at 60% damage. Essential for shard generation and cleave.
  - Cataclysm (30s, if talented): Used primarily to apply Immolate/Wither to all targets in an area.
  - Dark Pact (1min): Strong shield based on health. Use proactively before predictable damage.
  - Unending Resolve (3min): Major defensive reduction and interrupt immunity.
  - Soulstone: Combat resurrection. Can be used reactively or preemptively.

concepts: |
  - Soul Shards: Core resource. Fragments are generated by builders; 10 fragments make 1 shard. Max 5 shards.
  - Pandemic: Refresh DoTs (Immolate/Wither) when they have <30% duration remaining to add the full new duration to the remainder.
  - Havoc Management: Lead into Havoc with high Soul Shards. Use it to duplicate Chaos Bolts for maximum efficiency.
  - Mastery (Chaotic Energies): Increases damage dealt by a random amount, and reduces damage taken by a random amount.
  - Diabolist Rituals: A cycle of summoning Overlord, Mother of Chaos, and Pit Lord by spending shards.
  - Hellcaller Wither: Replaces Immolate with a Shadowflame DoT that stacks and interacts with Malevolence.
  - Movement: Destruction is highly immobile. Use Conflagrate and Shadowburn to cover movement. Use Demonic Circle and Gateway to minimize travel time.
  - Pet Choice: Felhunter is standard for the interrupt (Spell Lock). Use Imp for defensive dispels or Sayaad for pure single-target damage if no swaps are needed.

commonMistakes:
  - 'Overcapping Soul Shards (reaching 5 shards and continuing to use builders)'
  - 'Letting Immolate or Wither drop off the primary target'
  - 'Using Rain of Fire on low target counts (use Chaos Bolt for <3 targets or <5 during Havoc)'
  - 'Wasting Havoc windows by starting them with zero Soul Shards'
  - 'Unnecessary movement (mirroring tank movement) that interrupts hard-casting'
  - 'Holding Summon Infernal for too long instead of using it on cooldown'

patchChanges: |
  12.0.1:
  - Diabolist: Touch of Rancora damage buff adjusted.
  - Diabolist: New talents Diabolic Oculi, Looks That Kill, and Mind's Eye added.
  - Hellcaller: New talents Through the Felvine, Devil Fruit, and Alzzin's Iniquity added.
  12.0:
  - Major rework of Shadowburn (Execute only) and Fiendish Cruelty.
  - Ritual of Ruin and Decimation removed.
  - Dimensional Rift redesigned to passive (10% proc from Chaos Bolt/Shadowburn). No longer actively castable.
  - Roaring Blaze reworked to spread Immolate.
  - New utility: Blights (powerful timed versions of Curses).
  - Health Funnel removed.