specId: 267
className: Warlock
specName: Destruction
role: DPS
patch: "12.0.1"
guideVersion: 2

resourceManagement:
  primaryResource: Soul Shards
  secondaryResource: Soul Shard Fragments
  resourceNotes: 'Destruction uses Soul Shards, which are divided into 10 fragments each (max 5 shards/50 fragments). Shards are generated by builders like Incinerate (2 fragments, +1 on crit), Conflagrate (5 fragments), and Immolate ticks. They are spent on Chaos Bolt (2 shards) and Rain of Fire (3 shards). Overcapping shards is a significant DPS loss; always spend before reaching 5 shards.'

maintenanceBuffs:
  - spellId: 0
    spellName: Immolate
    targetUptimePct: 95
    importance: critical
    coachingTip: 'Maintain Immolate at all times. Use the Pandemic window to refresh when less than 5.4 seconds remain (6.3s with Scalding Flames).'
  - spellId: 0
    spellName: Wither
    targetUptimePct: 95
    importance: critical
    coachingTip: 'Hellcaller only: Replaces Immolate. Maintain on as many targets as possible. Use Cataclysm (if talented) and Conflagrate (via Roaring Blaze) to help manage uptime on multiple targets.'

