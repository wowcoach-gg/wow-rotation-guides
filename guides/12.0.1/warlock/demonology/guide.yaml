resourceManagement:
  primaryResource: Soul Shards
  secondaryResource: Demonic Core
  resourceNotes: 'Soul Shards are the primary resource (max 5). Generate them with Shadow Bolt, Demonbolt,
    and Infernal Bolt (Diabolist only); spend them on Call Dreadstalkers (2 shards) and Hand of Gul''dan (always 3 shards).
    Demonic Core is a secondary resource (max 4 stacks) that makes Demonbolt instant and deal 30% more damage.
    Wild Imps fading or being imploded have a 10% chance each to grant a Demonic Core stack.
    Overcapping shards or cores is a significant DPS loss. Always ensure you have 2 shards ready
    for Call Dreadstalkers on cooldown.'

