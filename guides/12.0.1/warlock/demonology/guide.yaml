rotation:
  singleTarget: |
    1. Cast Grimoire: Imp Lord / Fel Ravager (if talented). Highest damage-per-GCD cooldown.
    2. Cast Summon Demonic Tyrant. Its damage scales dynamically (+10% per active Wild Imp and Dreadstalker). With Dominion of Argus, every 2nd Hand of Gul'dan during Tyrant summons an extra demon from a portal.
    3. Cast Summon Doomguard (if talented). Its cooldown is reduced by spending Demonic Cores.
    4. Cast Power Siphon (if talented) with 2 or less Demonic Core and at least 2 Wild Imps out. Sacrifices 2 imps to grant 2 Demonic Core stacks.
    5. Cast Implosion with 6 Wild Imps out (only if To Hell and Back is talented). To Hell and Back spawns 1 Imp Gang Boss per 2 imps imploded, sustaining your AoE loop.
    6. Cast Call Dreadstalkers whenever available. Costs 2 shards, summons your strongest standard demons.
    7. Cast Hand of Gul'dan if you have 4-5 Soul Shards. Always costs 3 shards, summons 3 Wild Imps.
    8. Cast Demonbolt if you have 2+ stacks of Demonic Core. Instant cast, generates 2 shards, and deals 30% bonus damage.
    9. Cast Infernal Bolt when at 2 or less Soul Shards (Diabolist only). Preferred filler over Shadow Bolt when available.
    10. Cast Shadow Bolt to generate Soul Shards (lowest priority filler).
  aoe: |
    Demonology has little variation between single-target and AoE. Same priority, with these adjustments:
    1. Cast Grimoire: Imp Lord / Fel Ravager (if talented).
    2. Cast Summon Demonic Tyrant. Maximize Hand of Gul'dan casts during its window for Dominion of Argus portal summons.
    3. Cast Summon Doomguard (if talented).
    4. Cast Power Siphon (if talented) with 2 or less Demonic Core and at least 2 Wild Imps out.
    5. Cast Implosion with 6 Wild Imps out. Core AoE ability — consumes imps for burst AoE damage. With To Hell and Back, spawns Imp Gang Bosses to sustain the cycle.
    6. Cast Call Dreadstalkers whenever available.
    7. Cast Hand of Gul'dan if you have 4-5 Soul Shards.
    8. Cast Demonbolt if you have 2+ stacks of Demonic Core. Tab-target Demonbolt to different enemies to spread Doom.
    9. Cast Infernal Bolt when at 2 or less Soul Shards (Diabolist only).
    10. Cast Shadow Bolt to generate Soul Shards.
  opener: |
    1. Pre-cast Demonbolt (builds Demonic Core stacks and shards before pull).
    2. Pre-cast Demonbolt.
    3. Pre-cast Power Siphon with 2 Wild Imps out (if talented).
    4. Pre-cast Shadow Bolt.
    5. Cast Shadow Bolt.
    6. Cast Summon Doomguard (if talented).
    7. Cast Grimoire: Imp Lord / Fel Ravager (if talented).
    8. Cast Shadow Bolt x3-4 to fill shards.
    9. Cast Call Dreadstalkers.
    10. Cast Summon Demonic Tyrant (enter with 5 shards and 2+ Demonic Core ideally).
    11. Spam Hand of Gul'dan during Tyrant window. With Dominion of Argus Rank 3, each Hand of Gul'dan refunds 1 shard, enabling more casts.
    12. Cast Implosion with 6 Wild Imps out and 1 or less Demonic Core.
    13. Cast Power Siphon after the second Hand of Gul'dan.

cooldowns: |
  - Summon Demonic Tyrant (2min): Main cooldown. Lasts 20s. Damage scales dynamically by +10% per active Wild Imp and Dreadstalker. Does NOT buff or extend your demons — it deals its own damage based on demon count. With Dominion of Argus, every 2nd Hand of Gul'dan during Tyrant summons a portal demon. Focus on Hand of Gul'dan spam during this window.
  - Summon Doomguard: Offensive cooldown. Cooldown is dynamically reduced by spending Demonic Cores — the more cores you consume, the faster Doomguard returns.
  - Grimoire: Imp Lord / Fel Ravager (1min, if talented): Choice node. Imp Lord provides Singe Magic (dispel); Fel Ravager provides an extra interrupt/Spell Lock. Both deal significant damage.
  - Power Siphon (30s, if talented): Consumes 2 Wild Imps to grant 2 Demonic Core stacks and buff Demonbolt by 30%. Use when at 2 or fewer Demonic Core stacks with 2+ imps active.
  - Infernal Bolt (Diabolist only): Replaces Shadow Bolt as the preferred filler when available. Higher damage and better shard generation at low shard counts.
  - Dark Pact (1min): Major defensive shield based on health. Use proactively for predictable damage, not as an emergency button.
  - Unending Resolve (3min): Major defensive reduction and interrupt immunity.

concepts: |
  - Soul Shards: Primary resource (max 5). Hand of Gul'dan always costs 3 shards and summons 3 Wild Imps. Never overcap.
  - Demonic Core: Secondary resource (max 4). Wild Imps fading or being imploded each have a 10% chance to grant a stack. Enables instant Demonbolt with 30% bonus damage. Pool 2 stacks before Tyrant to fuel the Hand of Gul'dan spam window.
  - Tyrant Window (CRITICAL): Tyrant's damage scales dynamically with active demons — it does NOT snapshot, buff, or extend them. With Dominion of Argus, the goal is to maximize Hand of Gul'dan casts DURING Tyrant's 20s window, because every 2nd Hand of Gul'dan summons a portal demon. Rank 3 refunds 1 shard per Hand of Gul'dan, enabling more casts. Enter the window with 5 shards and 2+ Demonic Core.
  - Implosion + To Hell and Back: Implosion consumes 6 Wild Imps for burst AoE. With To Hell and Back talented, it spawns 1 Imp Gang Boss per 2 imps sacrificed (3 total), sustaining the imp cycle. Imp Gang Bosses deal 100% increased damage and their Fel Firebolt jumps to 3 additional targets. Worth using even in single target when talented.
  - Doom Management: Doom deals damage on expiration or target death. Hand of Gul'dan reduces its duration by 3s. In AoE, spread Doom by tab-targeting Demonbolt to different enemies.
  - Diabolist: Revolves around a cycle of Overlord, Mother of Chaos, and Pit Lord summoned via Diabolic Ritual. High burst potential.
  - Soul Harvester: Focuses on aggressive shard spending to trigger DoT effects and Sataiel's Volition for more Demonic Cores. Sataiel's Volition increases Wild Imp damage by 35%.
  - M+ Pack Transitions: Starting a new pack without resources means low damage while Shadow Bolt rebuilds shards. Carry Soul Shards, Demonic Core stacks, and Wild Imps between packs. Do not Implosion at the end of a dying pack — save imps for the next pull.
  - Tyrant Hold Decision (M+): In M+, do not Tyrant if the pack will die in under 20 seconds. The damage window is wasted on a pack that's already dying. Hold for the next big pull or boss.
  - Movement: Use instant Demonbolt procs to cover movement. Use Demonic Gateway and Demonic Circle proactively for encounter mechanics.
  - Pet Choice: Always use Felguard. Axe Toss serves as both an interrupt and a stun.
  - Doomguard Cooldown Loop: Spending Demonic Cores reduces Doomguard's cooldown. The more aggressively you consume cores (via Demonbolt), the faster Doomguard returns.

commonMistakes:
  - "Overcapping Soul Shards (max 5) instead of spending on Hand of Gul''dan"
  - 'Letting Demonic Core stacks reach 4 and wasting subsequent procs (each faded/imploded imp has a 10% chance to grant a stack)'
  - 'Casting Implosion in single target without the To Hell and Back talent'
  - 'Entering a Summon Demonic Tyrant window with 0 Demonic Core stacks — pool at least 2 and have 5 shards ready'
  - 'Not having 2 Soul Shards ready when Call Dreadstalkers comes off cooldown'
  - 'Failing to use Demonbolt to spread Doom debuffs in multi-target scenarios'
  - 'Holding defensive cooldowns like Dark Pact for emergencies instead of using them proactively'
  - 'Using Shadow Bolt when Infernal Bolt is available (Diabolist only) — Infernal Bolt is the preferred filler at low shards'
  - 'Imploding at the end of a dying M+ pack instead of carrying imps and resources to the next pull'
  - 'Casting Summon Demonic Tyrant on a pack that will die in under 20 seconds — hold for the next pull'

patchChanges: |
  12.0.1:
  - Fixed opener for situational talent choices.
  - Updated rotations to include Apex Talent (Dominion of Argus) logic.
  12.0:
  - Hand of Gul'dan shard cost fixed to 3.
  - Removal of Soul Strike, Demonic Strength, and Bilescourge Bombers.
  - Summon Demonic Tyrant reworked to scale dynamically and no longer extend pets.
  - Summon Vilefiend merged into Summon Dreadstalkers.
  - Grimoire: Felguard replaced by Grimoire: Imp Lord/Fel Ravager choice node.
  - New Apex Talents (Dominion of Argus) added.
