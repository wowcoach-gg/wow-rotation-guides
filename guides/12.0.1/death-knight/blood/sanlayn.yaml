rotation:
  singleTarget: |-
    Outside of Dancing Rune Weapon:
    1. Cast Death Strike if about to die, >70 RP, or Coagulopathy about to fade.
    2. Cast Consumption if available. Blood Boil immediately before for rank 3 (max healing).
    3. Cast Dancing Rune Weapon on cooldown.
    4. Cast Blood Boil if Boiling Point proc.
    5. Cast Vampiric Strike if proc enables it.
    6. Use Death's Caress if Bone Shield <3 seconds or out of melee range.
    7. Cast Death and Decay if not currently active.
    8. Cast Marrowrend if 5 or fewer Bone Shield charges (and DRW not about to come off CD).
    9. Spend RP on Death Strike if above 75 RP or to maintain Icy Talons.
    10. Cast Blood Boil to prevent charge capping.
    11. Use Heart Strike as filler (keep 3 runes recharging).

    During Dancing Rune Weapon (Gift of the San'layn):
    DO NOT CAST Consumption during DRW!
    1. Death Strike if about to die, >70 RP, or Coagulopathy fading.
    2. Death and Decay if Crimson Scourge proc and Visceral Strength not active.
    3. Maintain 1+ Bone Shield charges.
    4. Blood Boil for charges or Boiling Point procs.
    5. Vampiric Strike as filler (replaces Heart Strike during DRW).
  aoe: |-
    1. Maintain Death and Decay for Cleaving Strikes (Heart Strike/Vampiric Strike hit 3 extra targets).
    2. Blood Boil to apply/maintain Blood Plague on all targets.
    3. Blood Boil even during DRW if target count is high (Heart Strike is target-capped).
    4. Consumption at rank 3 (after Blood Boil) for massive AoE healing and damage.
    5. Follow ST priority, prioritizing Blood Boil for Blood Plague on all targets.
  opener: |-
    1. Pre-place Death and Decay.
    2. Pull from range with Death's Caress.
    3. Cast Dancing Rune Weapon and Raise Dead.
    4. Blood Boil to apply Blood Plague (and copies from DRW).
    5. Death Strike if >35 RP, Blood Boil if Boiling Point procs, Vampiric Strike otherwise until DRW ends.
    6. Empower DRW to rank 1.
    7. Blood Boil to re-apply Blood Plague.

cooldowns:
- name: Dancing Rune Weapon
  cooldown: 120s base (90s with Insatiable Blade)
  description: 'Primary cooldown. 20% parry, replicates attacks. For San''layn, activates Gift of the San''layn
    (Heart Strike becomes Vampiric Strike, Essence stacks tripled). Duration reduced to 12s in 12.0.1.'
- name: Vampiric Blood
  cooldown: 1.5min (reduced by Red Thirst)
  description: 'Increases max HP by 30% and all healing/absorbs by 30%. Use proactively for big hits.'
- name: Anti-Magic Shell
  cooldown: 1min
  description: 'Absorbs magic damage and prevents magic debuff application.'
- name: Icebound Fortitude
  cooldown: 3min
  description: '30% DR and stun immunity. San''layn (Bloody Fortitude) increases DR based on missing health.'
- name: Lichborne
  cooldown: 1.5min (base 2min, reduced 30s by Unholy Endurance)
  description: '15% Leech and immunity to Fear/Sleep/Charm. San''layn (Vampiric Aura) grants 2% Leech to
    allies.'
- name: Anti-Magic Zone
  cooldown: 3min (base 4min, reduced 60s by Assimilation)
  description: 'Reduces magic damage for group by 15%. Also 15% personal DR vs magic.'
- name: "Gorefiend's Grasp"
  cooldown: 1.5min
  description: 'AoE grip and 3s silence. Target someone other than yourself to group enemies.'
- name: Raise Dead
  cooldown: 2min
  description: 'Summons ghoul pet for 1 minute. Macro with DRW opener.'

concepts:
- 'Essence of the Blood Queen: Core San''layn mechanic. Vampiric Strike generates stacks providing
  multiplicative Haste. Must maintain stacks between DRW windows.'
- 'Gift of the San''layn: During DRW, Heart Strike becomes Vampiric Strike. Triples Essence and Frenzied
  Bloodthirst bonuses. This is your primary burst and resource window.'
- 'Vampiric Strike: Shadow damage replacement for Heart Strike. Heals 1% max HP, chance to spawn Blood Beast.'
- 'Blood Beasts: Spawned by Vampiric Strike. Attack for 10s, explode to heal. Pact of the San''layn stores
  10% of Shadow damage.'
- 'Consumption: Now an empower spell consuming Blood Plague duration to heal. Cast at rank 3 (after Blood
  Boil) and ONLY outside of DRW.'
- 'Visceral Strength: Crimson Scourge proc (free DnD) grants 12% Strength for 12 seconds.'
- 'Cleaving Strikes: While in Death and Decay, Heart Strike/Vampiric Strike hits up to 3 additional
  targets. Effect persists 4s after leaving DnD.'
- 'Death Grip: Displaces the target toward you, which interrupts any cast in progress. While not a
  traditional interrupt like Mind Freeze, Death Grip is excellent for repositioning dangerous caster adds
  and stopping their casts. Especially valuable on fights with adds that must be gripped or displaced for
  interrupts (e.g., Muzrukh Salabar). Death''s Echo grants an extra charge.'

commonMistakes:
- Casting Consumption during Dancing Rune Weapon (Gift of the San'layn).
- Using Marrowrend too frequently during DRW (DRW already generates massive stacks).
- Holding DRW for defensive parry instead of using for resource generation.
- Letting Essence of the Blood Queen stacks drop between DRW windows.
- Standing outside Death and Decay, losing Sanguine Ground and Blood-Soaked Ground.
- Capping Runic Power instead of spending on Death Strike for Coagulopathy.

patchChanges:
  12.0.1: 'Heart Strike +20%. Consumption reworked to empower spell. Carnage reset changed. DRW duration
    reduced to 12s, parry to 20%. Death Strike base window reduced to 20%.'
  '12.0': 'Bonestorm, Tombstone, Soul Reaper, Rune Tap, Blood Tap removed. San''layn hero talent added with
    Vampiric Strike, Essence of the Blood Queen, Blood Beasts.'
