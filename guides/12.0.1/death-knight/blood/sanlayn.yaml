specName: Blood
role: Tank
heroTalent: San'layn
patch: "12.0.1"
guideVersion: 3

resourceManagement:
  primaryResource: Runes
  secondaryResource: Runic Power
  resourceNotes: 'Dual resource system. 6 Runes; spending generates 10 RP per Rune. At most 3 Runes recharge
    simultaneously — keep at least 3 on cooldown. Spend RP on Death Strike for reactive healing and to
    maintain Coagulopathy. San''layn revolves around Vampiric Strike procs during Gift of the San''layn (DRW)
    to build Essence of the Blood Queen stacks for Haste/Mastery/AP.'

maintenanceBuffs:
- spellId: 0
  spellName: Bone Shield
  targetUptimePct: 100
  importance: critical
  coachingTip: 'Maintain at least 1 stack for Armor and Haste. Stay above 5 stacks for Ossuary (reduces
    Death Strike cost). Use Marrowrend at 7 or fewer stacks.'
- spellId: 0
  spellName: Blood Plague
  targetUptimePct: 100
  importance: high
  coachingTip: 'Apply via Blood Boil. Damage increased by Coagulopathy stacks from Death Strike.'
- spellId: 0
  spellName: Essence of the Blood Queen
  targetUptimePct: 95
  importance: high
  coachingTip: 'Generated by Vampiric Strike. Each stack provides multiplicative Haste. Stacks up to 7 with
    Frenzied Bloodthirst. Tripled during Gift of the San''layn (DRW window).'
- spellId: 0
  spellName: Coagulopathy
  targetUptimePct: 90
  importance: medium
  coachingTip: 'Stacks to 5 via Death Strike. Increases Blood Plague damage. Do not let this fade.'
- spellId: 0
  spellName: Death and Decay
  targetUptimePct: 90
  importance: high
  coachingTip: 'Stand in DnD for 5% DR (Blood-Soaked Ground), 6% damage, and 5% healing (Sanguine Ground).
    Cleaving Strikes persists 4 seconds after leaving.'

tankingGuide:
  survivalPriority: |-
    These abilities take absolute priority over the damage rotation below.
    1. Death Strike is your primary survival tool. Heals for 20% of damage taken in the last 5 seconds.
       Time Death Strike AFTER large hits for maximum healing. Do not waste at full health with no recent damage.
       Mastery: Blood Shield creates a physical damage absorb from Death Strike overhealing (physical only).
    2. Maintain Bone Shield at 5+ stacks for Ossuary (reduces Death Strike cost by 5 RP).
       Use Marrowrend at 7 or fewer stacks. During DRW, minimize Marrowrend — DRW generates stacks.
    3. Stand in Death and Decay for Sanguine Ground (6% damage, 5% healing) and Blood-Soaked Ground (5% physical DR).
       Cleaving Strikes persists 4 seconds after leaving DnD.
    4. San'layn self-healing: Vampiric Strike heals 1% max HP per cast. Blood Beasts explode for healing.
       Pact of the San'layn stores 10% of Shadow damage for additional healing.
  defensiveCooldowns: |-
    - Vampiric Blood (1.5min, reduced by Red Thirst): Increases max HP by 30% and all healing/absorbs by 30%.
      Use proactively before known damage. Amplifies Death Strike and Vampiric Strike healing.
    - Icebound Fortitude (3min): 30% DR and stun immunity. San'layn (Bloody Fortitude) increases DR based
      on missing health — more effective at low HP.
    - Anti-Magic Shell (1min): Absorbs magic damage and prevents magic debuff application. Use aggressively.
    - Anti-Magic Zone (3min, base 4min reduced 60s by Assimilation): 15% magic DR for group + personal 15% magic DR.
    - Lichborne (1.5min, base 2min reduced 30s by Unholy Endurance): 15% Leech and Fear/Sleep/Charm immunity.
      San'layn (Vampiric Aura) also grants 2% Leech to nearby allies.
    - Gorefiend's Grasp (1.5min): AoE grip + 3s silence. Target someone other than yourself to group enemies.
  resourceManagement: |-
    Dual resource: Runes generate Runic Power (10 per Rune spent). Keep at least 3 Runes recharging.
    Spend RP on Death Strike for reactive healing and Coagulopathy maintenance. Never cap RP.
    During DRW (Gift of the San'layn), Heart Strike becomes Vampiric Strike — your primary resource
    window. Essence of the Blood Queen stacks must be maintained between DRW windows.

