rotation:
  singleTarget: |
    [San'layn] Priority during Dancing Rune Weapon:
    1. DO NOT CAST Consumption during Dancing Rune Weapon.
    2. Cast Death Strike if you are about to die, have >70 Runic Power, or Coagulopathy is about to fade.
    3. Cast Marrowrend if you have an Exterminate charge available and Coagulopathy is not about to fade.
    4. Cast Death and Decay if you have a Crimson Scourge proc and Visceral Strength is not active.
    5. Maintain 1+ Bone Shield charges (use Marrowrend to get back to 10 if you drop off).
    6. Cast Blood Boil to keep charges rolling or if you have a Boiling Point proc.
    7. Use Vampiric Strike as your filler to consume Runes.

    [Deathbringer] Priority during Dancing Rune Weapon:
    1. Cast Death Strike if you are about to die, have >70 Runic Power, or Coagulopathy is about to fade.
    2. Cast Death and Decay if you have a Crimson Scourge proc and Visceral Strength is not active.
    3. Maintain 1+ Bone Shield charges.
    4. Cast Blood Boil to apply plague copies from Dancing Rune Weapon if not on target, or if you have a Boiling Point proc.
    5. Use Heart Strike as your filler to consume Runes (keep 3 recharging).

    Priority Outside of Dancing Rune Weapon (Both Playstyles):
    1. Cast Death Strike if you are about to die, have >70 Runic Power, or Coagulopathy is about to fade.
    2. Cast Consumption if available. (San'layn: Use Blood Boil before it to cast at rank 3; Deathbringer: Cast on cooldown).
    3. Cast Reaper's Mark if available (Deathbringer).
    4. Cast Dancing Rune Weapon on cooldown.
    5. Cast Blood Boil if you have a Boiling Point proc.
    6. Cast Vampiric Strike if you have a proc that enables it.
    7. Use Death Grip or Death's Caress if Bone Shield is <3 seconds or you are out of range.
    8. Cast Marrowrend if you have an Exterminate charge.
    9. Cast Death and Decay if not currently active.
    10. Cast Marrowrend while at 5 or fewer Bone Shield charges (if DRW is not about to come off cooldown).
    11. Spend Runic Power on Death Strike if >75 Runic Power or to keep Icy Talons stacks.
    12. Cast Blood Boil to keep charges from capping.
    13. Use Heart Strike as filler (keep 3 runes recharging).
  aoe: |
    1. Maintain Death and Decay for Cleaving Strikes (Heart Strike hits up to 3/5 targets).
    2. Cast Blood Boil to apply Blood Plague to all targets and generate threat.
    3. [San'layn] Use Blood Boil even during Dancing Rune Weapon if Heart Strike is target-capped and you need overall AoE threat/damage.
    4. [Deathbringer] Prioritize Marrowrend when empowered by Exterminate to trigger Shadowfrost scythe cleaves.
    5. Use Gorefiend's Grasp to group enemies for efficient AoE.
    6. Follow the standard priority list, ensuring Blood Boil charges do not cap.
  opener: |
    [San'layn Opener]
    1. Pre-place Death and Decay.
    2. Pull from range with Death's Caress.
    3. Cast Dancing Rune Weapon and Raise Dead.
    4. Cast Blood Boil to apply Blood Plague and copies.
    5. Cast Death Strike (if >35 RP), Blood Boil (if Boiling Point proc), or Vampiric Strike until DRW ends.
    6. Empower Dancing Rune Weapon to rank 1.
    7. Cast Blood Boil to re-apply Blood Plague.

    [Deathbringer Opener]
    1. Pre-place Death and Decay.
    2. Pull from range with Death's Caress.
    3. Cast Reaper's Mark and Raise Dead.
    4. Cast Dancing Rune Weapon.
    5. Cast Blood Boil.
    6. Cast Marrowrend to consume Exterminate charge.
    7. Cast Death Strike.
    8. Continue Death Strike, Blood Boil, and Heart Strike until DRW fades.

cooldowns: |
  - Dancing Rune Weapon (120s base, 90s with Insatiable Blade) - Primary resource and throughput CD. Increases Parry by 20% and copies attacks. Use on cooldown.
  - Vampiric Blood (1.5 min) - Increases Max HP by 30% and all healing/absorbs by 30%. Use proactively for big hits.
  - Anti-Magic Shell (1 min) - Absorbs magic damage and prevents magic debuff application.
  - Icebound Fortitude (3 min) - 30% damage reduction and stun immunity. Use for major tankbusters.
  - Lichborne (2 min, 1.5min with Unholy Endurance) - 6% Leech and immunity to Fear/Charm/Sleep. NOT a damage reduction cooldown.
  - Anti-Magic Zone (4 min base, 3 min with Assimilation) - 15% magic damage reduction for the group.
  - Gorefiend's Grasp (1.5 min) - Mass grip utility, silences targets for 3s.
  - Raise Dead (2 min) - Summons a ghoul for 1 minute to provide extra DPS.

concepts: |
  - Blood DK is a "builder-spender" tank. Generate Runic Power with Runes, spend on Death Strike to heal back damage taken in the last 5 seconds.
  - Mastery: Blood Shield creates a physical damage absorb based on Death Strike healing. It does NOT absorb magic damage.
  - Bone Shield Management: Keep 5+ stacks for the Ossuary talent (cheaper Death Strike) and Improved Bone Shield (10% Haste).
  - Dancing Rune Weapon is a throughput cooldown first, defensive second. It doubles RP generation from Heart Strike and grants free Bone Shield charges from Marrowrend.
  - Death and Decay: Essential for "Cleaving Strikes," allowing Heart Strike to hit multiple targets.
  - San'layn focuses on "Essence of the Blood Queen" stacks (Haste) and "Gift of the San'layn" during DRW.
  - Deathbringer revolves around "Reaper's Mark" and "Exterminate" procs for burst damage and physical/magic damage reduction (Rune Carved Plates).
  - Anti-Magic Shell can "immune" mechanics if the shield isn't broken by the initial hit.
  - Purgatory is an uncapped cheat death; you must heal the "death shroud" amount to survive.

commonMistakes:
  - 'Holding Dancing Rune Weapon for too long as a defensive instead of using it for resource generation'
  - 'Letting Bone Shield stacks drop below 5, losing the Runic Power discount on Death Strike'
  - 'Capping Runic Power and wasting potential self-healing'
  - 'Standing outside of Death and Decay and losing the Sanguine Ground/Cleaving Strikes buffs'
  - 'Using Marrowrend excessively during Dancing Rune Weapon (DRW grants 6+ charges per cast, easily overcapping)'
  - 'Not using Anti-Magic Shell proactively to prevent magic debuffs'
  - "Casting Consumption during Dancing Rune Weapon as San'layn"

patchChanges: |
  12.0.1:
  - Carnage: Reset behavior changed to trigger off any damage while Mastery: Blood Shield is active (1.1ppm hasted).
  12.0:
  - Massive ability pruning: Tombstone, Bonestorm, Soul Reaper, Rune Tap, and Blood Tap removed.
  - Death Strike healing and window reduced.
  - Dancing Rune Weapon duration and parry chance reduced.
  - New Apex Talents added: Dance of Midnight (chance to spawn extra DRWs).
  - Armor values on base items increased to compensate for loss of Reinforced Bones.