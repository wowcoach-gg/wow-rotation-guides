tankingGuide:
  survivalPriority: |-
    These abilities take absolute priority over the damage rotation below.
    1. Death Strike is your primary survival tool. Heals for 20% of damage taken in the last 5 seconds.
       Time Death Strike AFTER large hits for maximum healing. Do not waste at full health with no recent damage.
       Mastery: Blood Shield creates a physical damage absorb from Death Strike overhealing (physical only).
    2. Maintain Bone Shield at 5+ stacks for Ossuary (reduces Death Strike cost by 5 RP).
       Use Marrowrend at 7 or fewer stacks. During DRW, DRW generates stacks — minimize Marrowrend usage.
    3. Stand in Death and Decay for Sanguine Ground (6% damage, 5% healing received).
       Cleaving Strikes persists 4 seconds after leaving DnD.
    4. Rune Carved Plates: Deathbringer passive providing up to 7.5% DR from spending and regenerating runes.
       Stay active to maintain stacks.
  defensiveCooldowns: |-
    - Vampiric Blood (1.5min, reduced by Red Thirst): Increases max HP by 30% and all healing/absorbs by 30%.
      Use proactively before known damage. Amplifies Death Strike healing significantly.
    - Icebound Fortitude (3min): 30% DR and stun immunity. Save for heavy physical damage or stun mechanics.
    - Anti-Magic Shell (1min): Absorbs magic damage and prevents magic debuff application. Use frequently
      against magic damage — short cooldown means aggressive usage.
    - Anti-Magic Zone (3min, base 4min reduced 60s by Assimilation): 15% magic DR for group + personal 15% magic DR. Coordinate with healer.
    - Lichborne (1.5min, base 2min reduced 30s by Unholy Endurance): 15% Leech and Fear/Sleep/Charm immunity.
  resourceManagement: |-
    Dual resource: Runes generate Runic Power (10 per Rune spent). Keep at least 3 Runes recharging at
    all times. Spend RP on Death Strike for reactive healing and Coagulopathy maintenance. Never cap RP —
    every capped point is a wasted Death Strike. Rune Carved Plates rewards constant rune cycling.

