- Blood Tap (removed in 12.0)

rotation:
  singleTarget: |-
    Outside of Dancing Rune Weapon:
    1. Cast Death Strike if about to die, >70 RP, or Coagulopathy about to fade.
    2. Cast Consumption if available (do NOT delay — drifting out of DRW sync hurts damage/healing).
    3. Cast Reaper's Mark if available.
    4. Cast Dancing Rune Weapon on cooldown.
    5. Cast Blood Boil if Boiling Point proc.
    6. Use Death's Caress if Bone Shield <3 seconds or out of melee range.
    7. Cast Marrowrend if Exterminate charge available.
    8. Cast Death and Decay if not currently active (Cleaving Strikes persists 4s after leaving).
    9. Cast Marrowrend if 5 or fewer Bone Shield charges (and DRW not about to come off CD).
    10. Spend RP on Death Strike if above 75 RP or to maintain Icy Talons.
    11. Cast Blood Boil to prevent charge capping.
    12. Use Heart Strike as filler (keep 3 runes recharging).

    During Dancing Rune Weapon:
    1. Death Strike if about to die, >70 RP, or Coagulopathy fading.
    2. Blood Boil for Boiling Point procs or to apply DRW plague copies.
    3. Marrowrend to consume Exterminate charges.
    4. Heart Strike as filler until DRW fades.
  aoe: |-
    1. Maintain Death and Decay for Cleaving Strikes (Heart Strike hits 3 targets).
    2. Reaper's Mark on primary target.
    3. Blood Boil to apply Blood Plague to all targets (Bind in Darkness makes Shadowfrost).
    4. Marrowrend to consume Exterminate charges (scythe cleaves all enemies in front).
    5. Heart Strike as filler within Death and Decay.
    6. Death Strike to spend RP and maintain Coagulopathy/Icy Talons.
  opener: |-
    1. Pre-place Death and Decay.
    2. Pull from range with Death's Caress.
    3. Cast Reaper's Mark and Raise Dead (can macro together — always align).
    4. Cast Dancing Rune Weapon.
    5. Blood Boil.
    6. Marrowrend to consume Exterminate charge from Echoing Fury.
    7. Death Strike.
    8. Continue Death Strike, Blood Boil, Heart Strike until DRW fades.

cooldowns:
- name: "Reaper's Mark"
  cooldown: 45s (30s with talent)
  description: 'Primary Deathbringer burst. 12s DoT stacking up to 40 from Shadow/Frost damage. Explodes
    for massive damage based on stacks. Grants Exterminate charges on detonation.'
- name: Dancing Rune Weapon
  cooldown: 120s base (90s with Insatiable Blade)
  description: '20% parry, copies attacks. Primary resource and throughput cooldown. Duration 12s in 12.0.1.'
- name: Vampiric Blood
  cooldown: 1.5min (reduced by Red Thirst)
  description: 'Increases max HP by 30% and all healing/absorbs by 30%. Use proactively.'
- name: Anti-Magic Shell
  cooldown: 1min
  description: 'Absorbs magic damage and prevents magic debuff application.'
- name: Icebound Fortitude
  cooldown: 3min
  description: '30% DR and stun immunity.'
- name: Lichborne
  cooldown: 1.5min (base 2min, reduced 30s by Unholy Endurance)
  description: '15% Leech and immunity to Fear/Sleep/Charm.'
- name: Anti-Magic Zone
  cooldown: 3min (base 4min, reduced 60s by Assimilation)
  description: 'Reduces magic damage for group by 15%. Also personal 15% magic DR.'

concepts:
- 'Reaper''s Mark: Core Deathbringer mechanic. 12s DoT stacking up to 40 from Shadow/Frost damage. Explosion
  damage scales with stacks. All Shadowfrost damage contributes (Blood Boil via Bind in Darkness, etc.).'
- 'Exterminate: After Reaper''s Mark explodes, next Marrowrend deals heavy Shadowfrost damage and cleaves.
  Echoing Fury grants an Exterminate charge when casting DRW.'
- 'Bind in Darkness: Converts Blood Boil to Shadowfrost damage, allowing it to generate Reaper''s Mark stacks.'
- 'Rune Carved Plates: Passive DR stacking to 7.5% from spending/regenerating runes.'
- 'Consumption: Now an empower spell consuming Blood Plague for healing. Do NOT delay — drifting out of
  DRW sync hurts damage and healing.'
- 'Cleaving Strikes: Stand in DnD for Heart Strike to hit 3 targets. Effect persists 4s after leaving.'
- 'Apex Talent (Dance of Midnight): Spending runes has a 10% chance to spawn a 6-second Dancing Rune
  Weapon. This is passive and cannot be controlled — just maintain normal rune spending.'
- 'Death Grip: Displaces the target toward you, which interrupts any cast in progress. While not a
  traditional interrupt like Mind Freeze, Death Grip is excellent for repositioning dangerous caster adds
  and stopping their casts. Especially valuable on fights with adds that must be gripped or displaced for
  interrupts (e.g., Muzrukh Salabar). Death''s Echo grants an extra charge.'

commonMistakes:
- Capping Runic Power instead of spending on Death Strike.
- Using Marrowrend too frequently during DRW, wasting Rune Weapon procs.
- Wasting Exterminate charges on regular Marrowrend when Reaper's Mark is not active.
- Letting Bone Shield drop below 5 stacks, losing Ossuary discount.
- Using Death Strike at full health with no recent damage, wasting heal potential.
- Standing outside Death and Decay, losing Cleaving Strikes and Sanguine Ground.

patchChanges:
  12.0.1: 'Consumption reworked to empower spell. Heart Strike +20%. Carnage reset changed. DRW duration
    reduced to 12s, parry to 20%. Death Strike base window reduced to 20%.'
  '12.0': 'Bonestorm, Tombstone, Soul Reaper, Rune Tap, Blood Tap removed. Deathbringer hero talent added
    with Reaper''s Mark, Exterminate, Bind in Darkness, Rune Carved Plates.'
