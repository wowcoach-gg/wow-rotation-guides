guideVersion: 3

resourceManagement:
  primaryResource: Runes
  secondaryResource: Runic Power
  resourceNotes: 'Dual resource system. Spend Runes on Heart Strike and Marrowrend to generate RP (10 per
    Rune). Spend RP on Death Strike for reactive healing. Deathbringer adds Exterminate charges empowering
    Marrowrend to deal heavy Shadowfrost damage and cleave. Reaper''s Mark is the primary burst cooldown.'

