- spellId: 0
  spellName: Bone Shield
  targetUptimePct: 100
  importance: critical
  coachingTip: 'Maintain at least 1 stack for Armor/Haste. Keep 5+ stacks for Ossuary (reduces Death Strike
    cost). Avoid overcapping during DRW.'
- spellId: 0
  spellName: Coagulopathy
  targetUptimePct: 95
  importance: high
  coachingTip: 'Stacks to 5 via Death Strike. Increases Blood Plague damage. Do not let this fade.'
- spellId: 0
  spellName: Rune Carved Plates
  targetUptimePct: 90
  importance: high
  coachingTip: 'Deathbringer passive. Stacks up to 7.5% DR by spending and regenerating runes. Stay active
